      { heading: "Front Cover", content: `<div class="cover-page"><svg viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="1020" fill="#0d1b2a"/><rect width="680" height="200" fill="#06080f"/><rect y="300" width="680" height="300" fill="#102040"/><circle cx="80" cy="40" r="1.2" fill="#fff" opacity="0.8"/><circle cx="240" cy="55" r="1.4" fill="#fff" opacity="0.9"/><circle cx="380" cy="45" r="1.1" fill="#fff" opacity="0.7"/><circle cx="530" cy="15" r="1.3" fill="#fff" opacity="0.6"/><circle cx="600" cy="50" r="0.8" fill="#fff" opacity="0.7"/><circle cx="640" cy="25" r="1" fill="#fff" opacity="0.9"/><circle cx="160" cy="25" r="0.8" fill="#fff" opacity="0.6"/><circle cx="450" cy="30" r="0.9" fill="#fff" opacity="0.8"/><ellipse cx="150" cy="120" rx="140" ry="60" fill="#1a1f2e" opacity="0.9"/><ellipse cx="300" cy="100" rx="170" ry="70" fill="#141926" opacity="0.95"/><ellipse cx="500" cy="130" rx="160" ry="65" fill="#1c2133" opacity="0.9"/><ellipse cx="350" cy="160" rx="200" ry="55" fill="#0e1320" opacity="0.9"/><circle cx="590" cy="80" r="22" fill="#e8d89a" opacity="0.2"/><circle cx="590" cy="80" r="16" fill="#f0e4b0" opacity="0.3"/><polyline points="420,100 405,175 420,175 402,250" stroke="#c8d8ff" stroke-width="1.5" fill="none" opacity="0.6"/><rect x="0" y="530" width="680" height="490" fill="#061220"/><path d="M0 545 Q60 530 120 545 Q180 560 240 545 Q300 530 360 545 Q420 560 480 545 Q540 530 600 545 Q640 552 680 545 L680 570 L0 570Z" fill="#0a1e35"/><path d="M0 575 Q50 558 110 570 Q170 582 240 568 Q310 554 380 568 Q450 582 520 568 Q580 558 640 570 L680 570 L680 600 L0 600Z" fill="#0f2d4e"/><path d="M0 595 Q40 578 90 592 Q150 610 220 590 Q290 572 360 590 Q430 608 500 590 Q560 575 620 588 L680 588 L680 625 L0 625Z" fill="#122f50"/><path d="M0 630 Q60 608 130 628 Q200 648 280 624 Q360 602 440 624 Q520 646 590 624 Q640 612 680 622 L680 670 L0 670Z" fill="#152f4c"/><path d="M0 665 Q80 638 170 660 Q260 682 350 654 Q440 628 530 654 Q610 676 680 655 L680 710 L0 710Z" fill="#1a3555"/><path d="M0 710 Q90 682 190 705 Q290 728 390 700 Q490 674 580 698 L680 700 L680 760 L0 760Z" fill="#1e3a5c"/><path d="M0 760 Q100 730 210 758 Q320 786 430 755 Q540 726 640 752 L680 752 L680 820 L0 820Z" fill="#22405f"/><rect x="0" y="820" width="680" height="200" fill="#243f5e"/><g transform="translate(310,490) rotate(-12)"><path d="M-120 60 Q-110 90 -80 100 L80 100 Q110 90 120 60 Q100 55 0 50 Q-100 55 -120 60Z" fill="#2c1810"/><path d="M-120 60 L-90 10 L90 10 L120 60Z" fill="#3a2015"/><rect x="-90" y="-5" width="180" height="18" fill="#4a2820" rx="2"/><rect x="-70" y="25" width="14" height="10" fill="#1a0e08" rx="1"/><rect x="-35" y="25" width="14" height="10" fill="#1a0e08" rx="1"/><rect x="0" y="25" width="14" height="10" fill="#1a0e08" rx="1"/><rect x="35" y="25" width="14" height="10" fill="#1a0e08" rx="1"/><line x1="-40" y1="8" x2="-40" y2="-190" stroke="#3a2810" stroke-width="5"/><line x1="20" y1="5" x2="20" y2="-240" stroke="#3a2810" stroke-width="6"/><line x1="80" y1="8" x2="80" y2="-120" stroke="#3a2810" stroke-width="4"/><line x1="-85" y1="5" x2="-160" y2="-50" stroke="#3a2810" stroke-width="4"/><path d="M-40 -190 Q-90 -140 -80 -60 Q-60 -40 -40 -50 Q-20 -140 -40 -190Z" fill="#8a7a60" opacity="0.85"/><path d="M20 -240 Q-50 -180 -55 -80 Q-40 -50 20 -60 Q80 -50 95 -80 Q90 -180 20 -240Z" fill="#8a7a60" opacity="0.9"/><path d="M20 -240 Q-10 -210 -15 -170 Q0 -155 20 -160 Q40 -155 55 -170 Q50 -210 20 -240Z" fill="#9a8a70" opacity="0.8"/><path d="M80 -120 Q50 -90 48 -40 Q60 -25 80 -30 Q100 -25 112 -40 Q110 -90 80 -120Z" fill="#857565" opacity="0.85"/><line x1="-40" y1="-190" x2="20" y2="-240" stroke="#5a4530" stroke-width="1.5" opacity="0.8"/><line x1="20" y1="-240" x2="80" y2="-120" stroke="#5a4530" stroke-width="1.5" opacity="0.8"/><line x1="-85" y1="5" x2="-40" y2="-190" stroke="#5a4530" stroke-width="1" opacity="0.7"/></g><text x="340" y="940" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="700" fill="#e8d8b0" letter-spacing="2">The Wreck</text><text x="340" y="990" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="400" fill="#c8b888" letter-spacing="4">of the Aldena</text></svg></div>` },
      { heading: "Chapter One — The Storm and the Sacrifice", content: `<p>The <em>Aldena</em> — a Dutch merchant vessel three months out of Amsterdam — groaned like something alive.</p><p>Below deck, Margriet Voss clutched baby Sofie to her chest and pressed herself against the cabin wall, one arm hooked around Nella, who wasn't crying — she was watching, wide-eyed, which was almost worse. Bram had wedged himself into the corner beside a barrel and was grinning, which was absolutely worse.</p><p>Hendrik appeared in the doorway, soaked through, hair plastered to his forehead. Pieter stood just behind him, thirteen and trying hard to look like it hadn't been the most terrifying hour of his life.</p><p>"We're going to run aground," Hendrik said, calm as a man announcing supper.</p><p>"Hendrik—"</p><p>"It will be loud. Hold onto something that's bolted down."</p><p>He was gone before she could answer.</p><p>Up on deck, the world was nothing but black water and white spray. Pieter gripped the railing until his knuckles ached, watching the crew move with a practiced fury that made him feel very young and very useless.</p><p>"Stay close to me," Hendrik said in his ear.</p><p>"I'm not scared," Pieter said.</p><p>"I didn't say you were. I said stay close."</p><p>The first mate, a broad man named De Waal, caught Hendrik's eye and shook his head once. Hendrik nodded back. Pieter didn't know what that meant. He didn't ask.</p><p>Below, Bram had stopped grinning. The ship was tilting in a way that felt wrong — not the rolling he'd gotten used to over three months at sea, but something steeper, longer, like the ocean was making a decision.</p><p>"Mama," Nella said quietly.</p><p>"I know," Margriet said, though she didn't know anything except that she was not going to let her voice shake. Sofie had fallen asleep somehow, her small face perfectly peaceful against Margriet's shoulder.</p><p>Bram crawled across the tilting floor and pressed himself against his mother's side without saying a word. She held him.</p>` },
      { heading: "Chapter One — continued", content: `<p>De Waal found them on deck before the dust had settled. "The ship won't hold. We have one longboat."</p><p>"How many can it take?"</p><p>"Four or five. Maybe six if they're small." His eyes moved to Margriet, appearing from below with Sofie strapped to her chest. "Take your family."</p><p>"And your men—"</p><p>"Will manage." De Waal said it the way Hendrik said things — like the decision was already made and discussing it was a formality.</p><p>The crew loaded them fast and without ceremony — blankets, tools, a crate of dried food, rope, two lanterns, two empty water casks, Margriet's bag, whatever Bram tried to grab that wasn't nailed down.</p><p>"Other side of the island," De Waal said quietly. "Row left. The rocks go on for a mile the other way. This side, you'll make it."</p><p>The shore came up fast. The crewman dragged the bow up onto the sand, gave the hull one firm slap like a farewell, and waded back into the dark.</p><p>They stood on the beach. All six of them. Breathing.</p><p>Then Bram said, "Is that—"</p><p>The wave hit the <em>Aldena</em> like a fist. Not a wave — a wall. It came from nowhere and everywhere and the sound was enormous, and what had been a ship became in seconds a chaos of timber and rope and dark shapes tumbling in white water.</p><p>"Move!" Hendrik was already running. "Everything — get it up the beach — <em>now!</em>"</p><p>Nella screamed. It caught her ankles and pulled — just for a moment — before Pieter's hand closed around her wrist and yanked her forward and they were all standing above the tideline, soaked and gasping, and the water sucked back down the beach and was gone.</p><p>Bram looked down at his soaking feet. Then up at no one in particular.</p><p>"That," he said, "was <em>excellent.</em>"</p>` },
      { heading: "Chapter Two — What Washed Ashore", content: `<p>Morning came slow and golden, and with it, sound.</p><p>The jungle behind the beach was alive with it. Margriet had not slept. She sat with her back against the supply crate, Sofie in her arms, watching the treeline.</p><p>"There could be anything in there," she said quietly.</p><p>"Yes," Hendrik said.</p><p>"Savages. Animals."</p><p>"Yes."</p><p>"Hendrik."</p><p>"I know." He stood. "Pieter. Help me go through what came ashore."</p><p>Most of it was ruined. But the sea gave back what it could. A coil of rope. Three blankets, soaked but salvageable. A folding knife. A tin box that Pieter pried open to find — miraculously — dry powder and shot. And beneath a tangle of sail canvas, wrapped in oilcloth: two muskets.</p><p>Hendrik held one up and looked at it a long moment. Margriet's shoulders came down half an inch.</p><p>Bram appeared from nowhere. "Can I—"</p><p>"No," said everyone.</p><p>They sorted what they had. Six days of food, maybe seven. Hendrik didn't say the number out loud. He looked at the sea instead.</p><p>They went to the rocks at the far end of the beach and spent the afternoon fishing. Three fish the first afternoon, small but real. Margriet cooked them over a fire and nobody said anything about how good it was. They just ate.</p><p>Then Nella said, "What do we drink?"</p><p>They all looked at each other. The sea stretched in every direction. Beautiful, blue, and completely useless.</p><p>"There will be a river," Hendrik said. "Or a spring. We walk the island. All the way around if we have to."</p><p>It was Bram who found the dog. Something large and matted dragged itself out of the surf and collapsed three feet away from him — enormous, brown and white under all the filth, looking like it had fought the entire ocean and nearly lost.</p><p>"PAPA," Bram screamed, in a register that sent every bird on the island airborne.</p><p>Nella pushed past Hendrik, sat down in the wet sand beside the dog, and put her hand gently on its side. "He's from the ship. He made it."</p><p>Nobody argued with her. Margriet went and got the second blanket. They called him Anker — the only thing that held.</p>` },
      { heading: "Chapter Three — The Spring", content: `<p>They set out at first light, Hendrik with a musket, Pieter with the knife and two empty casks, Anker trotting ahead like he owned the island.</p><p>Anker had been given nothing to drink since morning. Hendrik had felt guilty about it. He'd done it anyway.</p><p>It took twenty minutes. The dog's nose went down, then his whole body changed — purpose replacing leisure — and he was off through the undergrowth at a pace that had Bram sprinting and everyone else jogging.</p><p>They heard it before they saw it — a low sound, almost a hiss, water moving over rock — and then they came through the trees and there it was. A natural hole in the rock face, water welling up cold and clear.</p><p>Anker had his entire face in it before they'd stopped moving.</p><p>Hendrik crouched and cupped his hands and drank. "Clean," he said.</p><p>The wind here was different — sharper. Through the trees on the far side the sky was a different color. The sound of waves was louder and angrier.</p><p>"That's the other side," Pieter said.</p><p>"Yes." Hendrik was already looking at the slope — the long steady grade back toward camp. "We're downhill from here. All the way back to camp."</p><p>They looked at each other.</p><p>"A pipe," Pieter said.</p><p>"Eventually. When we have the materials. Until then we walk. Once a week. One hour each way — it's nothing."</p><p>Bram was lying flat on the rock with his whole arm down the hole. Nella was watching Anker drink with an expression of complete happiness. Margriet stood with her eyes closed, face turned into the cool air.</p><p>"Same time next week," she said.</p>` },
      { heading: "Chapters Four & Five — Bram Goes Missing / The Cave", content: `<p>They were twenty minutes down the shore when Pieter heard it — a rustle, slightly too rhythmic, keeping pace with them through the undergrowth.</p><p>"Bram." Silence. "Bram, we can hear you."</p><p>A pause. Then Bram emerged from the treeline with a large palm frond over his head, apparently believing this had been a functioning disguise.</p><p>When they came back into camp, Margriet was standing at the edge of the treeline. She'd been crying — recently, and not a little.</p><p>"I thought you'd run away," she said quietly.</p><p>Bram blinked. Genuinely confused, for once. "Where would I go?"</p><p>She pulled him into her arms so hard he made a small <em>oof</em> sound, and didn't let go for a while.</p><hr/><p>Margriet woke at first light and knew immediately. The space where Bram should have been was empty and cold — not just-got-up cold, but gone-a-while cold.</p><p>They searched for two hours. Then, at the edge of the treeline, crashing and cheerful and absolutely fine — Bram.</p><p>"I found something! A house! A cave. It's better than this." He gestured at the canvas shelter with the diplomacy of someone who had not built it. "It has rooms. Sort of. And a sound."</p><p>The cave was a twenty-minute walk up the slope — half-hidden behind a shelf of rock. Inside, it opened. Not enormous — but enough. A thin stream ran along a channel in the back, dark and cold and clear.</p><p>Hendrik crouched beside it. Dipped his hand. Raised it to his lips. "It's the same water. From the spring. It runs underground."</p><p>"We wouldn't have to carry casks anymore," Pieter said. "Or build a pipe."</p><p>"No," Hendrik said. "The island did it for us."</p><p>Margriet stood in the center of the cave, turning slowly. "It doesn't leak?"</p><p>Hendrik almost smiled. "Not yet."</p><p>"It's better than the tent," she said finally. Not happily yet. But honestly.</p><p>Bram, from inside his claimed indent: "I told you."</p>` },
      { heading: "Chapters Six & Seven — Smooth Walls / Building the Dream", content: `<p>They moved in the same day and smoothed the walls with flat stones and shell paste, working until the cave was pale and almost white. Nella pressed a pattern of small shells along one section before the paste dried. Nobody told her to. Nobody told her not to.</p><p>The fireplace was Hendrik's idea. The problem with fire in a cave was smoke — so he built a clay-lined pipe that ran low along the wall, curved up through the passage, and ended behind a shelf of stone that broke the smoke apart before it could rise in any direction that pointed back to the cave.</p><p>Pieter did the pipe work. It took six days and more cursing than Margriet officially acknowledged hearing.</p><p>The first time they lit a fire and watched the smoke disappear silently behind the rock shelf outside — "No one would know," Pieter said. "That's the idea," Hendrik said. Bram made a noise usually reserved for things that exploded.</p><hr/><p>They went back to the wreck and found everything the ship had kept dry: iron fittings, metal stock, and woodworking tools wrapped in oilcloth. A proper hand axe. Two chisels. An adze. A draw knife. A mallet.</p><p>"The ship knew," Bram said. "Ships don't know things." "This one did."</p><p>They built the table first — dense jungle hardwood, sanded until the surface was almost silky. Then chairs. Then the kitchen: a stone counter at exactly the height Margriet specified, a channel bringing running water from the stream, two stone stoves.</p><p>The first evening Margriet cooked properly for the first time since Amsterdam, and the smell of it moved through the cave and out the entrance and Bram appeared from wherever he'd been within approximately forty seconds.</p><p>That night they ate together at the table, all six of them. After supper, Bram leaned back with the confidence of a man who had built everything around him himself.</p><p>"I knew this island was good," he said. Pieter opened his mouth. "Don't," Hendrik said quietly. Because the thing was — Bram wasn't wrong.</p>` },
      { heading: "Chapters Eight & Nine — The Rain / Super Nice", content: `<p>The rain came on a Tuesday and did not stop. By the fourth day the stream had overflowed onto the kitchen floor. They found where rainwater was funneling into the cave, packed it with clay and stone, came back soaked through, ate supper, and in the morning the stream was lower.</p><p>"The outside is still a problem," Margriet said. Rain sheeted in through the entrance whenever the wind came from the wrong direction.</p><p>"A door," Hendrik said. "And something under it. High enough to keep the water out."</p><p>There was a tree — six feet across the trunk, the largest any of them had ever seen up close. When it came down the sound was enormous and Bram let out a yell that was probably heard on the other side of the island.</p><p>The door took four days. When Hendrik closed it the first time and the rain outside became a muffled murmur instead of a roar, Margriet stood in the sudden quiet and closed her eyes. "Oh," she said.</p><p>Bram opened and closed the door four times immediately. "I'm testing the hinge." "You're not." "The second one feels different." "Bram." Bram stopped talking.</p><hr/><p>Pieter found the rock by accident — a seam in the passage wall, hollow air behind it. Three days to shift it. When it finally moved and the lantern light spilled through: two chambers, side by side, dry and quiet. Almost perfectly dark.</p><p>Bram appeared in approximately thirty seconds. "Bedrooms." "Yes." "Which one's mine?" "You share. You and Pieter in one, Nella and Sofie in the other."</p><p>They made the bedrooms super nice. Smooth walls. Bed frames. Pegs for clothes. A small shelf in each room. Bram said "super nice" with the authority of a man who had coined a phrase and intended to use it.</p><p>It was also Bram who did the floor — not intentionally. He set a carved piece of hardwood down on the stone and it sat perfectly. He stared at it. Then he went and got Pieter. Then they both went and got Hendrik.</p><p>"The whole floor. Every room. With the big tree planks." Three weeks. When it was done Margriet walked through every room in bare feet and didn't say anything for a long time. Then she went to the kitchen and while she cooked she was humming something none of them recognized, low and almost too quiet to hear. Hendrik sat at the table and listened and said nothing at all.</p>` },
      { heading: "Chapter Ten — The Steam Engine", content: `<p>Pieter had been thinking about it for weeks — the way they walked everywhere, carrying things on their backs. He built a cart. It worked, technically. On the beach it sank into the sand. He looked at it for a long time. Then he started thinking about the steam engine.</p><p>He worked in the second passage in the evenings and on mornings when he woke before the others. A boiler from bent iron sheet. A piston sleeve. A valve he remade seven times before it seated right. Two months. The first time he got it running he shut it off in four seconds. The noise bounced off the walls like a cannon. He stood in it with his heart going and listened. No footsteps. Sofie had apparently been crying at exactly the right moment.</p><p>The opportunity came on a Thursday. "Beach walk," Margriet announced. Pieter said he'd rather stay. She looked at him one moment longer than was comfortable, then let it go. He waited until their voices had faded. Then five more minutes. Then he ran.</p><p>He had the engine mounted in twenty minutes. He got the fire going. He sat on the cart's plank seat with the engine ticking and hissing and building, the whole thing trembling like something coming alive. He opened the valve. The cart lurched forward so hard he nearly went off the back.</p><p>It was loud. It was smoky. Anker retreated to the maximum extent of his rope and watched with profound alarm. Pieter was grinning so hard his face hurt.</p><p>He came around the curve of the beach and saw them — all five of them — and then Nella grabbed Margriet's arm and Bram ran two steps toward the jungle before stopping. The cart stopped ten feet from them in a cloud of steam.</p><p>Pieter stood up, slightly singed, still grinning. "Hello," he said.</p><p>Bram made a sound that had no word for it and sprinted the ten feet and climbed onto the cart before it had finished cooling.</p><p>"Two months," Hendrik said quietly. He'd noticed the evenings. He'd said nothing. He put his hand on Pieter's shoulder and didn't say anything for a moment.</p><p>"If we die," Margriet said, "I want it on record that I had concerns." "Noted," Pieter said. They all got in.</p>` },
      { heading: "Chapters Eleven & Twelve — The Feast / The Amsterdam House", content: `<p>It was Nella who found the first one — following Anker up a slope east of the cave, where the jungle stayed damp even in dry weather. Anker stopped at a vine. Nella looked at what it was growing and came back at a run.</p><p>The melon was the size of Bram's torso. The slope was covered in them, dozens, the smell extraordinary. They found three kinds of fruit, a tree whose small red fruit was so sweet it made Nella's eyes go wide, and a grove of wild sugar cane. By midday the cave table was covered. Fruit piled on fruit, colours none of them had seen since Amsterdam.</p><p>Margriet stood at the kitchen counter and did something none of them had seen her do in a long time. She laughed. Not a polite laugh. A real one.</p><p>The party was Nella's idea: a feast, tonight, on the beach. Nobody argued. The sun went down while they were eating. The stars came out — the same impossible quantity they'd seen on the first night, but different now. Then they were just beautiful. Hendrik raised his tin cup. "To the <em>Aldena</em>." They raised theirs. Even Bram, without a joke.</p><hr/><p>"If something happened to the cave, we'd have nothing," Hendrik said. Fire. Rockfall. A flood worse than the last. They needed a second home — somewhere completely separate, somewhere no one could find.</p><p>It took four days to find a way into the center of the island: the densest part, where the trees grew so thick that from ten feet away it was invisible. But the center existed. A natural clearing, ringed by great trunks, quiet in a way the beach never was. Large enough for a house. Private in a way that felt absolute.</p><p>They built it like Amsterdam — steep roofline to shed rain, large shuttered windows, two floors, the upper for sleeping. The walls were planked and tight. When it was done, Nella stood in front of it for a long time. "It looks like home. But different." "Both," Margriet said. "Yes. Both."</p><p>Bram had already gone inside. Anker got halfway up the ladder, reconsidered, and came back down with the careful dignity of a dog pretending the ladder had never interested him.</p><p>"Super nice!" Bram called down. Something in Hendrik's face shifted — not quite a smile, but close. "Super nice," he agreed.</p>` },
      { heading: "Chapter Thirteen — The Veldt-Hoen", content: `<p>They found Bram twenty minutes up a slope, standing completely still with his arms at his sides and an expression of concentrated calm that looked entirely wrong on his face.</p><p>In front of him, three feet away, was a bird — reddish-brown, round-bodied, amber eyes regarding him with mild curiosity. Anker sat six feet behind Bram, also completely still. Behind the bird, half-visible in the undergrowth, were more. A lot more.</p><p>"They've never seen people," Nella said softly.</p><p>Bram very slowly crouched down. He extended his hand, palm up, fingers flat. The bird walked forward and stood on it. Bram looked up at his family with an expression that needed no words.</p><p>They spent the rest of the morning in the clearing. The veldt-hoen moved around them freely, investigating boots and fingers and the hem of Margriet's apron with calm thoroughness. Sofie was approached by two simultaneously and responded by trying to grab one, which stepped neatly aside and went back to whatever it had been doing.</p><p>They loaded six birds into the cart carefully — no chasing, no grabbing. Bram simply held open a section of the cart bed and waited, and four of them climbed in of their own accord. Anker rode on the back of the cart and spent the entire journey pretending he was not watching the birds with every fiber of his being.</p><p>The coop took four days and was, by any measure, too large. "We have six birds," Pieter said. "For now," Bram said. "We want them to feel comfortable," Nella said, in the tone that ended discussions. "They've never been kept before. It needs to feel like nothing changed."</p><p>By the end of the first week there were nine eggs. Margriet held one in her palm and looked at it for a moment. Then she went into the kitchen, and for the first time in months, she made something that wasn't fish.</p>` },
      { heading: "Chapters Fourteen & Fifteen — The First Ship / Hiding the Cave", content: `<p>"Ship," Pieter said in the cave entrance, still breathing hard. Everyone moved at once.</p><p>They watched from the treeline. A two-masted merchant vessel, not military. The crew moved normally. No tension. Hendrik lowered the muskets. "We go out."</p><p>The longboat came ashore with five figures. The captain — a compact Dutchman named Verhoef — looked at the family, the cave entrance up the slope, the cart, which he regarded with open confusion.</p><p>"We have been looking," he said in Dutch, "for the <em>Aldena.</em>" "She's there," Hendrik said, nodding toward the shallows. "And the crew?" A silence. "Three are buried above the treeline. The others the sea kept. They gave us the longboat. All of them." Verhoef removed his hat. "We thought you were dead. All of you. For nearly two years."</p><p>In the morning, Verhoef asked carefully if they wanted to go home. Hendrik and Margriet walked up the slope alone. She said "Amsterdam" — trying the word out. Then: "And this?"</p><p>"My mother is going to be furious," Margriet said finally. "Yes. She is."</p><p>They told Verhoef they were staying. "I thought so when I saw the floor." He raised his coffee cup. "I'll be back. In the spring, if the wind is right." "We'll be here," Hendrik said.</p><p>Bram was first to speak after the ship disappeared. "So we're staying." "Yes." "Good. I already told the veldt-hoen." Nobody asked what that meant.</p><hr/><p>Hendrik noticed it first — you could see the cave entrance from the beach. They transplanted nine trees across the slope using the engine as a pulling mechanism. Bram dug every root ball with exceptional care. When it was done they walked to the waterline and turned around. The cave was gone.</p><p>Six houses in a circle around a courtyard. One larger than the rest — the family's, properly furnished. When visitors came, they'd do the water run the old way. They'd live on the beach, same as them. Nobody would know the cave existed.</p>` },
      { heading: "Chapters Sixteen & Seventeen — The Village / The Grandparents", content: `<p>They built the courtyard first — flat beach stones fitted tight, a fire pit at the center. When it was done it already felt like somewhere. Anker lay in the center with his chin on his paws, apparently having decided this was now his spot, a position he would defend for years.</p><p>Nella pressed a border of dark stones along the base of every wall in every room, running continuous like a signature. Bram built every bed, sanding each surface until the wood had the quality of something old and cared-for. "They're better than good," he said, without any particular boastfulness. Just as a fact. He was right.</p><p>Four months. When it was done, Margriet stood in the courtyard in the evening, turning slowly. "It's a village," Nella said. "Our village." "Ours."</p><hr/><p>Two ships. Pieter spotted them before dawn. The family had an hour and a half to make the courtyard look lived-in. Pieter got fires going. Margriet cooked for the smells. Nella scattered fronds casually. Bram arranged boots by the door in the exact configuration of people who hadn't thought about it. He left a half-carved piece of wood on the step with a knife beside it, blade closed. Pieter parked the Admiral with the easy familiarity of something used every week and left muddy footprints from a morning that hadn't happened.</p><p>"Sit down. Everyone. Act like it's Tuesday."</p><p>The longboat came through the light morning swell with five figures. Pieter shaded his eyes. Then he stood up very slowly. "Mama." Margriet was already standing. She'd seen them.</p><p>Griet walked straight to Margriet and took her face in both hands. Then she pulled her in. Jan gripped his son's arm with both hands, the way you hold something you thought was gone.</p><p>Bram, pressed into his grandmother's arms, said something muffled. "What?" He surfaced. "I said we built all of this." She looked at the courtyard. Then at him. "I can see that." "It took a while." "I imagine it did."</p>` },
      { heading: "Chapters Eighteen & Nineteen — The Best Week / A Ship Full of Everything", content: `<p>Griet had arrived expecting to find her daughter surviving. She had not expected to find her thriving. She and Margriet cooked together every morning. Jan demanded to be shown the jungle; he and Pieter were gone six hours and came back with the particular ease of men who have walked somewhere difficult together.</p><p>Bram took his grandparents to the veldt-hoen and explained every bird's individual personality, which took considerably longer than anything else. Griet stood in the run with three veldt-hoen investigating her boots. "You were always like this," she said. "Like what?" "Like this." She gestured broadly at all of it. "Is that good?" "Most of the time."</p><p>Nella showed Jan the fruit slope. He confirmed the feathery grove was sugar cane. On the fifth day Pieter drove them around the island. When they rounded the far headland and saw the bad side — the rocks, the grey water — everyone went quiet. Jan looked for a long time. "De Waal brought you to the good side." "Yes."</p><p>On the last evening, Griet said: "You're not coming home." "No." "This is home." "Yes." She put her hand over Margriet's. "Then we'll come here."</p><hr/><p>Jan was not on the second ship when it left. Nobody had asked him to stay. He'd simply moved his bag to the guest house. Margriet handed him a coffee. That was the end of it.</p><p>The first ship was still at anchor — loaded. Three days unloading it by longboat: timber, iron, glass, tools, cloth, seeds, food, medicine, books, rope, leather, nails. Jan had made a list and doubled it. Griet had added everything he'd forgotten, which was considerable.</p><p>Then Hendrik looked at the bay's shallow eastern flat. "We need a proper dock." Two months. They dove every morning, shifted stone by stone. When the dock was done Hendrik walked its full length, said nothing, walked back. "Good." That was enough.</p>` },
      { heading: "Chapters Twenty & Twenty-One — The Underground Railway / The Canoes", content: `<p>Three villages: a plateau with a view in every direction, a cove with warm shallow water, and a jungle station — Nella's: platforms in a ring with the canopy overhead, inside and outside at the same time.</p><p>The underground track was Pieter's. Two lanes. A main line from the dock through Central, branching to the plateau, the cove, and a spur to the jungle. Jan contributed knowledge about underground drainage at critical moments without making a performance of it. When Bram announced the flooded junction station the best day so far, everyone believed him.</p><p>The first full run — dock to plateau — took eleven minutes. Anker rode in the cargo bed with his ears pinned back, doing this under protest but refusing to be left behind.</p><p>"That was nothing. We just went from the dock to the top of the island in nothing." Hendrik didn't answer right away. "We didn't need the cave floors either. Or Bram's bed headboards. Some things you do because they're worth doing."</p><hr/><p>Nella saw the canoes first — three of them, eighteen men, coming unhurriedly around the eastern headland. She walked to the jungle station, took the cart to Central, was at the beach village in four minutes. "Canoes. Eighteen men. Not moving fast."</p><p>The men were unarmed. They touched everything with the focused interest of men filing information away. One crouched and looked at the floor joints the way a carpenter looks at another carpenter's work. Two hours. They took nothing — one man picked up two coconuts, set one back. Then they left.</p><p>"They'll be back. With more." Eleven days later, seven canoes, forty men, armed.</p><p>On the fourth day of preparation Bram said quietly: "What if we aimed the surface cart at them? Throttle rigged, no driver. It's loud. And it smokes. And it comes fast." "Work out how to rig the throttle," Hendrik said.</p><p>Three musket shots from three positions — from the courtyard, it sounded like a small army. Then Pieter started the engine. The cart came through the entrance at full speed, driverless, hit the far post with a bang that shook the porch roof. The courtyard emptied in thirty seconds.</p><p>"That was my idea." "It was." "Are you going to say it was a good idea?" "It was a good idea." Bram nodded once, with dignity.</p><p>Jan: "They won't come back. You're the people with the thunder sticks and the fire machine. That's enough."</p>` },
      { heading: "Chapter Twenty-Two — The Island", content: `<p>They came in three ships that spring — twenty-three visitors total. Every guest house full. Hammocks strung between the courtyard porches for the overflow.</p><p>Jan was on the dock when Griet's ship anchored. He didn't say anything when she stepped out, just offered his hand and got a look in return. They walked up the dock together without further discussion.</p><p>The party assembled itself — someone produced a fiddle, someone else a drum that had no business being on a Caribbean island but was there nonetheless. The veldt-hoen watched from the coop fence with the alert curiosity of animals who recognized a significant occasion.</p><p>Pieter gave rides on the underground railway. Nella showed three visitors the fruit slope. Bram showed everyone everything, in a sequence that suggested he had prepared an itinerary, which he had. Sofie, four years old now, appointed herself guide to the younger visitors and took the job seriously. Anker moved through the party like a host — steady, unhurried — always ending up beside Bram at the end of the evening.</p><p>On the third night the music went late and the fire burned down to coals, until only the family remained in the courtyard — the six of them, the same six who had stood on this beach with nothing but wet blankets and two muskets and a dog who'd fought the whole ocean.</p><p>Then Bram said: "They'll come back." "Yes." "And more will come." "Probably." "Good."</p><p>In the morning the ships were gone. The courtyard needed sweeping. The kitchens needed setting right. There were cups to wash.</p><p>Margriet stood in the courtyard doorway with her coffee and looked at the empty bay. Nella came and stood beside her. "They always leave in the night. Or early. Before you have to watch them go."</p><p>"Do you think they know that's how we like it?"</p><p>Margriet looked at the bay, the morning light on the water, the island going about its business around them. "I think they know," she said.</p><p>She finished her coffee. Set the cup on the courtyard table. Picked up the broom.</p><p>The island was theirs again. It always would be. And whenever anyone wanted to find it, they knew where it was — a day's sail from Hispaniola, good side, the beach with the dock and the courtyard and the six houses and a family who would feed you and give you somewhere to sleep and wave you off in the early morning without making you feel the leaving.</p><p>That was enough. That was everything. That was the island.</p><p style="text-align:center;font-style:italic;margin-top:2rem;color:#8a6020;font-size:1.1rem;">— The End —</p>` },
      { heading: "Back Cover", content: `<div class="cover-page"><svg viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="1020" fill="#87ceeb"/><rect width="680" height="180" fill="#5bb8e8"/><rect y="300" width="680" height="220" fill="#a8ddf5"/><circle cx="520" cy="90" r="55" fill="#fff5c0" opacity="0.4"/><circle cx="520" cy="90" r="32" fill="#ffdd60" opacity="0.8"/><circle cx="520" cy="90" r="24" fill="#ffef90" opacity="0.95"/><ellipse cx="100" cy="130" rx="80" ry="35" fill="#fff" opacity="0.9"/><ellipse cx="150" cy="115" rx="65" ry="30" fill="#fff" opacity="0.95"/><ellipse cx="320" cy="80" rx="70" ry="28" fill="#fff" opacity="0.8"/><ellipse cx="630" cy="160" rx="65" ry="28" fill="#fff" opacity="0.8"/><path d="M0 380 Q80 310 180 350 Q260 380 350 320 Q440 262 530 310 Q600 348 680 330 L680 420 L0 420Z" fill="#2d7a3a" opacity="0.5"/><path d="M60 500 Q160 380 300 360 Q400 345 480 370 Q560 395 620 460 L680 500 L680 540 L0 540Z" fill="#2d8c40"/><path d="M80 500 Q170 395 300 375 Q400 360 470 382 Q540 404 600 458 L680 500 L680 540 L0 540Z" fill="#35a04a"/><ellipse cx="200" cy="430" rx="30" ry="20" fill="#268c35" opacity="0.7"/><ellipse cx="330" cy="395" rx="28" ry="19" fill="#248a32" opacity="0.7"/><ellipse cx="460" cy="418" rx="24" ry="16" fill="#229030" opacity="0.6"/><rect x="0" y="500" width="680" height="520" fill="#0096b4"/><path d="M0 540 Q120 520 250 532 Q380 544 500 525 Q590 514 680 522 L680 580 L0 580Z" fill="#00b8d8" opacity="0.9"/><path d="M0 558 Q100 542 220 550 Q340 558 460 542 Q560 530 680 538 L680 590 L0 590Z" fill="#40d4f0" opacity="0.7"/><path d="M0 590 Q80 575 180 582 Q300 592 420 578 Q520 567 640 577 L680 578 L680 640 L0 640Z" fill="#f5e8c0"/><path d="M0 598 Q100 588 220 594 Q360 602 480 588 Q570 578 680 586 L680 650 L0 650Z" fill="#faf0d0"/><line x1="120" y1="640" x2="148" y2="480" stroke="#5a3a1a" stroke-width="8"/><path d="M145 460 Q95 430 60 448 Q85 458 145 460Z" fill="#228b35"/><path d="M145 460 Q110 410 80 415 Q105 430 145 460Z" fill="#26a03c"/><path d="M145 460 Q140 400 125 390 Q130 415 145 460Z" fill="#228b35"/><path d="M145 460 Q175 405 185 395 Q168 418 145 460Z" fill="#26a03c"/><path d="M145 460 Q185 428 210 438 Q185 452 145 460Z" fill="#228b35"/><circle cx="148" cy="472" r="5" fill="#8b6530"/><path d="M540 640 Q548 580 560 520 Q565 490 558 468" stroke="#5a3a1a" stroke-width="8" fill="none"/><path d="M558 468 Q505 445 468 460 Q495 472 558 468Z" fill="#228b35"/><path d="M558 468 Q520 418 492 422 Q518 440 558 468Z" fill="#26a03c"/><path d="M558 468 Q552 408 538 398 Q544 422 558 468Z" fill="#228b35"/><path d="M558 468 Q598 440 622 448 Q596 458 558 468Z" fill="#228b35"/><path d="M558 468 Q590 415 602 405 Q582 428 558 468Z" fill="#26a03c"/><circle cx="560" cy="480" r="5" fill="#8b6530"/><path d="M0 660 Q100 645 220 655 Q360 668 480 650 Q570 638 680 648 L680 720 L0 720Z" fill="#00c8e8" opacity="0.6"/><rect x="0" y="720" width="680" height="300" fill="#0080a0"/><path d="M0 740 Q120 722 260 736 Q400 750 530 728 Q620 716 680 724 L680 780 L0 780Z" fill="#0098bc" opacity="0.8"/><rect x="0" y="870" width="680" height="150" fill="#0a1520" opacity="0.85"/><text x="340" y="920" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#c8b888" letter-spacing="3">A NOVEL</text><text x="340" y="960" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#e8d8b0" letter-spacing="2">The Wreck of the Aldena</text><text x="340" y="995" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#a09870" letter-spacing="2">— a day's sail from Hispaniola, good side —</text></svg></div>` },
      { heading: "A Note from the Author", content: `<p>I didn't set out to write a book.</p><p>I had an idea — a family, a shipwreck, an island — and I liked it, so I followed it. That was enough.</p><p>Most of the things in this story came from pieces of other stories I'd loved: the cave that becomes a home, the impossible machine built by a clever teenager, the dog who survives against all odds, the family that chooses to stay somewhere instead of going back to what they knew. I took the parts that felt right and put them together into something new.</p><p>Bram came almost entirely by himself.</p><p>The island doesn't exist. But the feeling of finding somewhere so good you stop wanting to leave — that part I borrowed from real life, because it's the truest thing in the book.</p><div class="end-note">Thank you for reading.</div>` }
    ]
  },
  {
    title: "Gone by Morning",
    blurb: "A Dutch family is taken from their home before sunrise and left on the plains north of New Mexico with almost nothing. They build more than they expected — and find the place harder to leave than they'd imagined.",
    cover: `<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="400" fill="#c8dff0"/><rect width="680" height="160" fill="#7ab8e0"/><rect y="120" width="680" height="120" fill="#a8d0ec"/><circle cx="480" cy="90" r="36" fill="#ffd060" opacity="0.7"/><circle cx="480" cy="90" r="24" fill="#ffea80" opacity="0.9"/><ellipse cx="150" cy="65" rx="90" ry="30" fill="#fff" opacity="0.8"/><ellipse cx="210" cy="54" rx="70" ry="26" fill="#fff" opacity="0.85"/><path d="M0 200 Q170 180 340 190 Q510 200 680 182 L680 260 L0 260Z" fill="#c8a850"/><path d="M0 220 Q200 208 400 216 Q540 224 680 210 L680 280 L0 280Z" fill="#c0a040" opacity="0.7"/><rect x="0" y="270" width="680" height="130" fill="#b89830"/><path d="M0 310 Q340 298 680 310" fill="none" stroke="#a08020" stroke-width="1" opacity="0.5"/><path d="M0 340 Q340 328 680 340" fill="none" stroke="#a08020" stroke-width="0.8" opacity="0.4"/><path d="M42 400 Q47 285 54 235" stroke="#1a0c06" stroke-width="5" fill="none"/><path d="M54 235 Q18 252 6 272 Q28 275 54 235Z" fill="#2a6030"/><path d="M54 235 Q88 252 100 272 Q76 275 54 235Z" fill="#347038"/><path d="M54 265 Q14 285 4 308 Q28 308 54 265Z" fill="#246028"/><path d="M54 265 Q94 287 106 310 Q80 310 54 265Z" fill="#2a6830"/><path d="M54 298 Q10 320 2 346 Q28 344 54 298Z" fill="#246028"/><path d="M54 298 Q98 322 108 348 Q82 346 54 298Z" fill="#2a6830"/><path d="M54 332 Q8 356 2 382 Q28 380 54 332Z" fill="#246028"/><path d="M54 332 Q100 358 110 384 Q84 382 54 332Z" fill="#2a6830"/><path d="M630 400 Q636 296 642 246" stroke="#1a0c06" stroke-width="5" fill="none"/><path d="M642 246 Q606 262 594 282 Q616 285 642 246Z" fill="#2a6030"/><path d="M642 246 Q678 262 692 280 Q668 283 642 246Z" fill="#347038"/><path d="M642 276 Q600 298 590 322 Q614 322 642 276Z" fill="#246028"/><path d="M642 276 Q684 300 696 324 Q670 324 642 276Z" fill="#2a6830"/><path d="M642 310 Q598 334 590 360 Q616 358 642 310Z" fill="#246028"/><path d="M642 310 Q686 336 698 362 Q670 360 64     pages: [
      { heading: "Front Cover", content: `<div class="cover-page"><svg viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="1020" fill="#c8dff0"/><rect width="680" height="320" fill="#7ab8e0"/><rect y="200" width="680" height="200" fill="#a8d0ec"/><circle cx="480" cy="130" r="48" fill="#ffe090" opacity="0.5"/><circle cx="480" cy="130" r="36" fill="#ffd060" opacity="0.7"/><circle cx="480" cy="130" r="26" fill="#ffea80" opacity="0.9"/><ellipse cx="160" cy="100" rx="90" ry="32" fill="#fff" opacity="0.8"/><ellipse cx="220" cy="88" rx="70" ry="28" fill="#fff" opacity="0.85"/><ellipse cx="580" cy="140" rx="75" ry="28" fill="#fff" opacity="0.7"/><ellipse cx="340" cy="75" rx="60" ry="22" fill="#fff" opacity="0.65"/><path d="M0 340 Q80 270 180 300 Q260 325 340 270 Q420 218 500 260 Q580 298 680 275 L680 380 L0 380Z" fill="#6a8aaa" opacity="0.5"/><path d="M0 360 Q100 295 200 320 Q300 345 400 295 Q480 255 560 295 Q630 325 680 305 L680 400 L0 400Z" fill="#7a9aba" opacity="0.55"/><rect x="0" y="370" width="680" height="300" fill="#c8a850"/><path d="M0 370 Q120 355 240 365 Q360 375 480 358 Q580 345 680 355 L680 420 L0 420Z" fill="#d4b860" opacity="0.9"/><path d="M0 400 Q150 388 300 396 Q450 404 600 390 L680 390 L680 450 L0 450Z" fill="#c0a040" opacity="0.7"/><path d="M0 430 Q170 420 340 428 Q510 436 680 422" fill="none" stroke="#b09030" stroke-width="1" opacity="0.5"/><path d="M0 460 Q200 448 400 456 Q540 462 680 450" fill="none" stroke="#b09030" stroke-width="0.8" opacity="0.4"/><path d="M0 490 Q180 480 360 488 Q530 496 680 482" fill="none" stroke="#a88020" stroke-width="0.8" opacity="0.4"/><rect x="0" y="580" width="680" height="90" fill="#c8b870" opacity="0.5"/><rect x="0" y="630" width="680" height="40" fill="#d4c890" opacity="0.6"/><path d="M0 660 Q120 635 250 648 Q380 660 510 638 Q600 622 680 632 L680 720 L0 720Z" fill="#7aaa50"/><path d="M0 680 Q150 660 300 672 Q450 684 600 664 L680 662 L680 740 L0 740Z" fill="#8aba60"/><path d="M0 700 Q100 68

y="Georgia,serif" font-size="54" font-weight="700" fill="#e8d8b0" letter-spacing="1">Gone by Morning</text><text x="340" y="976" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="400" fill="#c8a850" letter-spacing="3">A Novel</text><text x="340" y="1008" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="400" fill="#a09060" letter-spacing="2">— north of New Mexico, early spring —</text></svg></div>` },
            { heading: "Chapter One — Gone by Morning", content: `<p>They came before sunrise.</p><p>Joost heard Tor first — not barking, which would have meant a coyote or a wandering horse, but that low continuous sound the dog made when something was wrong with a person. Joost was sitting up in bed before he was fully awake, and then the door came off its hinges and the room was full of men and noise and Elisabeth was already on her feet with Riet in her arms, turning to face them, which was the bravest and most useless thing Joost had ever seen anyone do.</p><p>He counted seven. Armed, organized, not angry — which was somehow worse than angry. Angry men make mistakes. These men had done this before.</p><p>The one in front looked at Joost the way you look at a problem you&#39;ve already solved. &quot;Get up,&quot; he said. &quot;All of you. Now.&quot;</p><p>&quot;My children—&quot;</p><p>&quot;Will come with you.&quot; He said it pleasantly. &quot;Or won&#39;t. Your choice.&quot;</p><p>Cas appeared in the doorway from the back room — he&#39;d heard, he&#39;d gotten up, he&#39;d done the thing Joost had always hoped he would do and assessed instead of reacted. His eyes moved across the seven men and came to rest on his father&#39;s. One quick look. I see them. I&#39;m counting.</p><p>Pip appeared behind him, rubbing his eyes, wearing one boot.</p><p>&quot;Where&#39;s the other one?&quot; Elisabeth said, because she was Elisabeth.</p><p>&quot;I couldn&#39;t find it,&quot; Pip said. This was not the moment anyone had expected to be discussing footwear.</p><p>They were outside in four minutes — the seven men moved them fast and without cruelty, which established immediately that this wasn&#39;t about cruelty. The farmhouse receded behind them in the grey pre-dawn, the door still off its hinges, one of Pip&#39;s boots still somewhere inside.</p><p>Tor came. Nobody had said he could. Nobody had said he couldn&#39;t. He simply fell in beside Mieke and stayed there, and none of the seven men seemed to feel it was worth a fight.</p><p>Joost walked beside Elisabeth. Riet, asleep against her shoulder with the total confidence of a baby who had not yet learned that the world was capable of this, shifted and settled and slept on.</p><p>&quot;Where?&quot; Joost said quietly to the man beside him.</p><p>&quot;North,&quot; the man said.</p><p>&quot;How far north?&quot;</p><p>The man looked at the horizon, where the sky was just beginning to go grey. &quot;Far enough,&quot; he said.</p><p>* * *</p><p>Joost looked back once. The farmhouse was already small. Whatever they&#39;d left inside — the other boot, the good knife, three months of work — was already gone in the way that things become gone when you can&#39;t go back for them.</p><p>He faced north.</p><p>Mieke had found his hand in the dark without looking. He held it.</p><p>&quot;Papa,&quot; she said quietly, not a question.</p><p>&quot;I know,&quot; he said.</p><p>Behind them, Pip had found someone&#39;s stirrup to walk beside, apparently having decided that if he was going to be kidnapped he was going to do it at the most convenient height. Nobody stopped him. Tor walked at Mieke&#39;s other side, steady and quiet, ears up, watching everything.</p><p>The sun came up over the plains like it had no idea what it was interrupting.</p>` },
      { heading: "Chapter Two — North", content: `<p>They walked for two days.</p><p>On the first morning, just before the sun got high enough to be useful for direction, the men stopped the group and produced strips of dark cloth. Joost had time to say &quot;don&#39;t&quot; to Cas with his eyes before Cas said anything with his mouth, and Cas, to his considerable credit, didn&#39;t.</p><p>They tied the blindfolds themselves. Joost helped Elisabeth with Riet, making sure the knot sat to the side of her head so she could still manage the baby. Pip submitted to his with the suspicious calm of someone storing information for later. Mieke stood perfectly still, chin up, and Joost thought — not for the first time — that his daughter had a quality he couldn&#39;t name, something that wasn&#39;t bravery exactly but was harder than bravery.</p><p>They walked blind for a long time. Hours. The ground changed under Joost&#39;s feet — packed earth becoming scrubby grass becoming something softer, then a long stretch of stone, then grass again. He counted his paces until he lost count, then started again. He noted the angle of warmth on his face. He listened.</p><p>At some point Pip said &quot;I stepped on something&quot; and somebody on the other end of the rope — not a family member — said &quot;keep moving&quot; and Pip kept moving.</p><p>Tor made no sound. Joost could hear him, just — the soft fall of paws, always close to Mieke.</p><p>On the second day it got colder. The smell changed. When they finally stopped and the blindfolds came off, Joost blinked against the light and understood immediately where they were and approximately what had been done to them.</p><p>Plains. Wide, gold-grey, winter-bare, running in every direction to the horizon — except behind them, where a line of mountains rose with the sudden confidence of things that had always been there. The nearest slope started not half a mile off, dark with pine and scrub oak, the kind of woods that had water in them. He could tell by the color. He&#39;d grown up knowing that color.</p><p>Seven men on horseback. The leader looked at Joost without particular expression. Then he reached into the saddlebag and dropped something on the ground between them.</p><p>A roll of canvas. A cook pot and a pan. A bundle of woodworking tools — hammer, chisels, a small saw. Nails. Two days of food, wrapped in cloth, not much but real.</p><p>He said nothing. He didn&#39;t need to.</p><p>Then they rode south, and within ten minutes the plains had swallowed them and there was nothing in any direction but grass and sky and the mountains at their backs and the six of them and Tor.</p><p>Pip looked at the pile of supplies. Then at the mountains. Then at his family.</p><p>&quot;Are we camping?&quot; he said.</p><p>* * *</p><p>&quot;We need the tent up before dark,&quot; Joost said, and that was the end of standing around.</p><p>The woods came up fast once they started walking toward them — what had looked like a line of trees resolved into something deep and real, proper cover, a creek sound somewhere inside it. Joost walked the near edge until he found what he wanted: three big pines growing close, their lower branches interlocking into something almost like a ceiling. Ground dry underneath. Sight lines clear to the plains.</p><p>&quot;Cas,&quot; he said. &quot;Before the tent. I want a snare out there. Something on the game trail.&quot;</p><p>He pointed to where the grass was pressed down in a narrow corridor running along the treeline — the kind of path that gets made by the same animals walking the same route every morning. Cas crouched and looked at it, then at the rise in the ground nearby, then back.</p><p>&quot;Rabbit?&quot; Cas said.</p><p>&quot;Whatever comes.&quot;</p><p>Cas picked up the rope without further discussion.</p><p>The tent went up between the three pines the way a tent goes up when everyone works without being asked — Joost and Elisabeth on the canvas, Mieke cutting cord length with the small knife from the bundle, Pip carrying stakes with the gravity of a man on assignment. The trees did most of the work. What came out was low and tight and practically invisible from twenty feet, a pale roof sloping down into the pine needles, the dark interior smelling of canvas and cold air and the faint sweetness of the pines above.</p><p>Joost set the cook pot in the doorway. Something between a kitchen and a fortress.</p><p>&quot;It&#39;s good,&quot; Elisabeth said, sitting back on her heels.</p><p>&quot;It&#39;s enough,&quot; Joost said.</p><p>She looked at him. &quot;I said it&#39;s good.&quot;</p><p>Cas came back from the snare just before the light went. He ate without saying much. After supper Joost went out and checked the game trail in the dim evening light and came back and told Cas it was well set, which it was.</p><p>The plains turned silver in the last light. Nothing moved on them.</p><p>Inside the tent, Pip had found two sticks of roughly equal length and was explaining to Mieke the rules of a game he appeared to be inventing in real time. The rules were numerous and contradictory and Mieke was listening with perfect seriousness, suggesting amendments, and Pip was accepting some and rejecting others on grounds that were not entirely clear. Riet was asleep between them in a nest of canvas scraps and Elisabeth&#39;s shawl. Tor lay at the tent opening with his chin on his paws, watching the plains the way a dog watches something it has decided is its job.</p><p>Joost and Elisabeth sat at the back of the tent and watched their children play with sticks.</p><p>&quot;All right,&quot; she said, quietly enough that only he could hear.</p><p>&quot;All right,&quot; he said.</p><p>Outside, the stars came out over the plains — more of them than made any sense, the kind of sky you only get when there&#39;s nothing between you and it. Pip had apparently won the stick game, or changed the rules so that he had, and was explaining this to Mieke, who accepted the outcome with diplomatic grace.</p><p>It was cold. They were a thousand miles from anywhere they&#39;d meant to be.</p><p>And for now, at least, they were safe.</p>` },
      { heading: "Chapter Three — The First Morning", content: `<p>Cas was up before anyone.</p><p>Joost heard him go — the soft shift of canvas, the careful step over Pip&#39;s outstretched legs — and lay still and listened to the plains breathing in the dark outside. Nothing wrong in the sound. He closed his eyes again.</p><p>When the smell of woodsmoke came through the tent opening, Elisabeth stirred. &quot;Cas?&quot; she said, without opening her eyes.</p><p>&quot;Probably,&quot; Joost said.</p><p>It was Cas, and it was a rabbit, and it was already skinned. He&#39;d strung a small fire between two stones at the edge of the treeline — modest, practical, positioned so the smoke went up through the pine branches and dispersed before it became visible. Joost looked at the fire, the rabbit, the stones. He looked at his son.</p><p>&quot;Early start,&quot; he said.</p><p>&quot;The snare needed checking.&quot; Cas turned the rabbit on the stick. &quot;And I was awake.&quot;</p><p>Joost crouched beside the fire and held his hands out to it. The plains were pale grey in the early light, frost on the grass, the mountains above them going pink at the peaks. A good morning if you weren&#39;t thinking too hard about how you&#39;d come to be in it.</p><p>&quot;We need a proper kitchen,&quot; Joost said.</p><p>Cas nodded. He&#39;d already been thinking it.</p><p>* * *</p><p>They built it after breakfast, while the frost was still burning off the ground. Two flat stones for a base, then a careful arrangement of smaller ones around a central firebox — nothing elaborate, just enough to hold the cook pot steady and keep the wind from killing the flame. Elisabeth directed the height from where she sat nursing Riet, and the height was correct, and nobody suggested she come and look at it herself.</p><p>Pip was officially in charge of finding more stones. He took this responsibility extremely seriously and arrived every few minutes with increasingly ambitious specimens from increasingly far afield, explaining the particular merits of each. Some were rejected. Pip received these rejections with dignity and immediately went looking for better ones.</p><p>Mieke found the stream.</p><p>She came back and said only &quot;water&quot; and pointed, and they followed her fifty yards into the trees to where a narrow creek ran cold and clear over flat stones, barely a foot across, quick and utterly reliable. Joost crouched and drank. Cold enough to ache. Clean.</p><p>&quot;Same as last time,&quot; Pip said.</p><p>Everyone looked at him. &quot;Last time what?&quot; Cas said.</p><p>Pip frowned. &quot;I don&#39;t know. It just felt like something Papa would say.&quot;</p><p>Joost put his hand briefly on the back of Pip&#39;s neck. &quot;Go find us another stone.&quot;</p><p>* * *</p><p>The bowls took the rest of the morning.</p><p>The wood was Joost&#39;s — two pieces of pine from a fallen branch, dry enough to work, dense enough to hold water if the grain ran right. He sat against the big pine and carved while Elisabeth managed the fire, the slow curl of shavings building up around his boots.</p><p>Pip sat beside him for a while watching, then began carving his own piece of bark into something he described as a boat, then as a house, then as a different kind of boat. Joost said nothing and kept working.</p><p>The first bowl was for the family — wide and deep, the inside smoothed down with the back of the chisel until it held water without seeping. The second was smaller and shallower. When Joost set it in front of Tor and filled it from the cook pot, the dog drank the whole thing without stopping, then sat back and looked at Joost with the mild benevolence of an animal whose opinion of a person had just improved.</p><p>&quot;He likes it,&quot; Mieke said.</p><p>&quot;He likes the water,&quot; Joost said.</p><p>&quot;He likes the bowl,&quot; Mieke said, in the tone that ended discussions.</p><p>By midday the kitchen was working — the fire steady in its stone box, the cook pot hung just right, water brought in the canvas bag from the creek and set to warm for the afternoon. Cas had reset the snare on a second trail he&#39;d found running parallel to the first. The tent was still standing. The mountains were there when you looked up, enormous and quiet, going about their own business.</p><p>Elisabeth stood at the kitchen in the pale spring sunlight and stirred something that was mostly water but smelled, against all reason, like something good.</p><p>&quot;All right,&quot; Joost said, to no one in particular.</p><p>&quot;I&#39;ve been saying that,&quot; Elisabeth said.</p>` },
      { heading: "Chapter Four — Not Enough", content: `<p>The second rabbit came on the third morning, and the third morning was when they did the math.</p><p>Joost laid it beside the first — smaller than yesterday&#39;s, barely worth the snare — and looked at it for a moment. Six people. One dog. Two rabbits in two days. He didn&#39;t say anything out loud because there was no point in saying it out loud. They all knew.</p><p>&quot;Bigger snares,&quot; Cas said.</p><p>&quot;And more of them,&quot; Joost said. &quot;Further in. Something&#39;s using those trails but we&#39;re only catching the small end of what&#39;s using them.&quot;</p><p>Cas had already been thinking about the rope. There wasn&#39;t much left of it, but enough if he was careful. He went into the woods after breakfast and didn&#39;t come back until midday, and when he did he didn&#39;t say what he&#39;d set or where, just washed his hands in the creek and sat down and ate. Joost didn&#39;t ask. The boy knew what he was doing.</p><p>* * *</p><p>It was Riet who found the clay.</p><p>Nobody saw it happen. One moment she was sitting at the edge of the creek where Elisabeth could watch her, and the next she was sitting in a patch of grey-blue earth two feet upstream with both hands in it up to the wrists, deeply satisfied with herself and absolutely filthy.</p><p>Elisabeth said &quot;Riet&quot; in the tone that meant several things at once.</p><p>Joost crouched beside the patch and pressed his thumb into it. Dense. Smooth. Almost no grit. He worked a piece between his fingers and watched it hold its shape.</p><p>He looked at the stone kitchen. He looked at the clay.</p><p>&quot;Pip,&quot; he said. &quot;I need a bucket&#39;s worth of that. Without eating any.&quot;</p><p>Pip looked offended. &quot;I wasn&#39;t going to eat it.&quot;</p><p>&quot;Without tasting it,&quot; Joost said.</p><p>They lined the firebox that afternoon — packing the clay into every gap between the stones, smoothing it flat along the inner walls, building up the back into a proper curved surface that would hold and reflect heat instead of losing it to the air. Elisabeth shaped the area around the pot hook with the focused efficiency of someone who had strong feelings about where things should go and the clay to act on them.</p><p>It took most of the day to dry. When the fire went in that evening the difference was immediate — less fuel, more heat, the pot coming to boil faster than it had any right to in open air. Pip stood over it watching the steam with an expression of personal pride, as if he had invented fire.</p><p>&quot;Good clay,&quot; Joost said to no one in particular.</p><p>&quot;Riet found it,&quot; Mieke said.</p><p>Riet, still faintly grey around the ears despite two washings, accepted this credit with the serenity of someone who knew her own worth.</p><p>* * *</p><p>They extended the tent on the fourth day — Joost and Cas pulling the canvas out from the back wall and restringing it between two more pines, lower and wider, a second room that was more shadow than shelter but gave them space to stand up and move without waking whoever was sleeping. Mieke claimed the new section immediately and spent an hour arranging pine needles into a floor until it was, by her own assessment, acceptable.</p><p>Pip helped. His contributions to the floor were enthusiastic and geometrically unconventional and Mieke incorporated them without comment.</p><p>* * *</p><p>They saw the buffalo on the fifth evening.</p><p>Not close — a quarter mile out on the plains, moving slowly north in a group of eight or nine, dark shapes in the gold light. They stood at the treeline and watched. Joost counted. Tor sat at Mieke&#39;s side and watched them with the careful stillness of an animal doing calculations.</p><p>Eight. Nine. The smallest one was four times the size of a man.</p><p>Joost looked at the tent. He looked at the plains. He looked at the tent again.</p><p>The canvas was good canvas. It would stop rain and wind and cold. It would not stop a buffalo that had decided, for any of the reasons buffalo decide things, to walk through it.</p><p>&quot;We need walls,&quot; Elisabeth said, beside him.</p><p>Not a question. Not a suggestion.</p><p>&quot;Yes,&quot; Joost said.</p><p>Behind them Pip said &quot;they&#39;re enormous&quot; in a voice that was mostly delight and only slightly afraid, which was about the right proportion for Pip.</p><p>&quot;They&#39;re a long way off,&quot; Cas said.</p><p>&quot;For now,&quot; Joost said.</p><p>They watched until the herd moved over a low rise and disappeared. The plains went quiet again. The tent stood between the three pines looking, all of a sudden, extremely temporary.</p><p>&quot;Tomorrow,&quot; Joost said. &quot;We start on something real.&quot;</p>` },
      { heading: "Chapter Five — Something Real", content: `<p>Joost found the cliff on the first morning of looking.</p><p>It wasn&#39;t hard to find — the mountain announced it plainly enough, a face of pale granite rising thirty feet straight up out of the slope, flat at the base, overhung slightly at the top so that the ground beneath it was dry even after rain. He stood at the base and put his hand on it. Cold. Solid. The kind of solid that had been there ten thousand years and intended to continue.</p><p>He turned around. The treeline was forty feet ahead. The plains were invisible from here — the slope and the trees took care of that — but the approach from below was open enough to see anyone coming. Not perfect. Good enough to build on.</p><p>&quot;Here,&quot; he said.</p><p>Cas looked at the cliff, the trees, the ground. He was already pacing out dimensions.</p><p>* * *</p><p>They built the back wall first, which was no wall at all — just the cliff face, mortared with clay along the base where the stone met the earth, sealed tight enough to keep the wind from finding gaps. The side walls went up log by log, Joost notching each corner while Cas dragged timber from the deadfall further up the slope. Big pine, some of it, dry and straight. The kind of wood that wanted to be a wall.</p><p>Pip carried nails. He kept count of every nail he carried, announced the running total at intervals, and took the responsibility with a seriousness that would have been more helpful if he hadn&#39;t also occasionally sat down to examine an interesting rock and lost count entirely.</p><p>&quot;How many?&quot; Joost said.</p><p>&quot;Forty-something,&quot; Pip said. &quot;Or sixty. One of those.&quot;</p><p>Mieke, passing with an armload of clay, said &quot;fifty-three&quot; without breaking stride.</p><p>The front wall went up last, with a doorframe Joost cut square and true, and a door he hung on leather hinges that would do until he could make better ones. When he pushed it closed the first time and the wind outside became nothing, Pip walked through the doorway four times in a row just to use the door.</p><p>&quot;Pip.&quot;</p><p>&quot;I&#39;m testing the hinge.&quot;</p><p>&quot;You&#39;re not.&quot;</p><p>&quot;The second time felt different.&quot;</p><p>&quot;Pip.&quot;</p><p>Pip stopped. The hinge was, by any measure, excellent.</p><p>* * *</p><p>The kitchen was Elisabeth&#39;s from the start. She stood in the back corner — cliff wall on one side, log wall on the other, the natural angle between them forming something almost like a chimney if you added clay, which she did — and pointed at where things would go with the authority of someone who had been planning this since the tent.</p><p>The firebox was bigger than the outdoor one, built up from flat stones hauled from the creek bed, clay-lined inside and out, with a proper flue that ran up the cliff face and out above the overhang. It drew on the first try. Joost watched the smoke go straight up and out and disappear and said nothing because there was nothing to say that the smoke wasn&#39;t already saying.</p><p>She had a counter by the end of the second day. Not a fine one — split log, surface smoothed down with the back of the chisel — but flat and real and at exactly the right height, and she stood at it that evening and worked in a way she hadn&#39;t been able to work since they&#39;d left home.</p><p>* * *</p><p>The stream was Cas&#39;s idea, and it was either brilliant or an enormous amount of work for something that might not succeed, and it turned out to be both.</p><p>There was water higher up the slope — they&#39;d heard it from the first day, somewhere above the cliff face, moving fast over rock. Cas went up alone one morning and came back an hour later with mud on his boots and a look on his face that meant he&#39;d figured something out.</p><p>&quot;It&#39;s thirty feet above us,&quot; he said. &quot;Maybe forty. And there&#39;s a natural channel in the rock that runs almost the whole way down. If we extend it with clay — pack it tight, keep the grade — it&#39;ll come to us.&quot;</p><p>Joost looked up the cliff. He looked at their remaining clay supply. He looked at Cas.</p><p>&quot;Show me,&quot; he said.</p><p>It took four days. Cas and Joost worked the upper channel while Elisabeth and Mieke mixed and carried clay from the creek bed, Pip ferrying loads up the slope in the cook pot, which was not its intended purpose but served. They packed the channel in sections, testing each one before moving to the next, water finding every gap they&#39;d missed and making their opinions known.</p><p>On the morning of the fifth day Joost pulled the last clay plug from the top of the channel and stepped back.</p><p>The water came down the rock in a clean line, following the channel they&#39;d built, losing almost nothing to the sides, and ran out through a clay-lined spout Cas had fitted into the kitchen wall at counter height — a small steady stream, cold and clear, running directly into the stone basin below it.</p><p>Pip watched this for a long moment.</p><p>&quot;It just comes,&quot; he said.</p><p>&quot;Yes,&quot; Cas said.</p><p>&quot;By itself.&quot;</p><p>&quot;That&#39;s how water works.&quot;</p><p>Pip continued watching it with the expression of someone who understood perfectly well how water worked and was choosing to find it remarkable anyway.</p><p>Elisabeth filled the pot without moving from the counter. She didn&#39;t say anything. She didn&#39;t need to.</p>` },
      { heading: "Chapter Six — Up", content: `<p>It was Mieke who asked first.</p><p>She&#39;d been looking at the mountain every morning since they&#39;d arrived — not with longing exactly, more with the focused attention of someone reading a book they intended to finish. On the morning after the water came through the spout she stood at the door of the house and said, &quot;Can we go up?&quot;</p><p>Joost looked at the slope above them. Then at the sky — clear, cold, the kind of spring morning that stays honest. Then at Elisabeth.</p><p>&quot;I&#39;ll stay with Riet,&quot; Elisabeth said, before he could ask. &quot;Go.&quot;</p><p>* * *</p><p>They went up in a loose group — Joost first, then Cas, then Mieke, then Pip, then Tor, who had his own opinions about the correct order but kept them to himself. The slope was steep for the first hundred feet, loose stone and pine duff, then leveled into a long traverse through old-growth timber, the trees here enormous and widely spaced, the ground between them open and soft.</p><p>Pip found the berries first, which surprised no one who knew Pip. A whole hillside of low bushes, last year&#39;s canes still holding clusters of dried fruit, and beneath them — Mieke crouched and pushed the dead leaves aside — the first green shoots of this year&#39;s growth coming up through the cold ground.</p><p>&quot;In a month,&quot; Joost said.</p><p>&quot;More than a month,&quot; Cas said.</p><p>&quot;Not much more,&quot; Mieke said. She was usually right about things like this.</p><p>Joost pulled a handful of the dried fruit and tasted one. Tart, still good. He filled his pockets. Pip had already eaten a considerable number and was studying a bush with the critical eye of a man with professional opinions.</p><p>&quot;These are the best ones,&quot; Pip said, pointing.</p><p>&quot;They&#39;re all the same bush,&quot; Cas said.</p><p>&quot;They&#39;re not, though,&quot; Pip said, and moved to the next one.</p><p>* * *</p><p>The meadow appeared without warning — the treeline simply ended and there it was, a flat open space the size of a large field, south-facing, protected on three sides by the slope and a long rocky ridge to the north. The grass here was different from the plains below: shorter, denser, already green despite the season, fed by snowmelt running in thin clear threads across the surface.</p><p>Joost stood at the edge of it and felt something shift in his thinking.</p><p>Good grass. South-facing. Protected. Water already present.</p><p>&quot;Papa,&quot; Cas said, quietly.</p><p>&quot;I see it,&quot; Joost said.</p><p>A meadow like this, in a place like this, meant things. It meant animals came here. It meant plants grew. It meant that if a person wanted to, a person could — he stopped that thought and filed it away for later and kept walking.</p><p>Tor put his nose down and quartered the meadow in a fast systematic sweep, then came back to Mieke and sat, which meant whatever had been here recently wasn&#39;t here now.</p><p>* * *</p><p>The cave was Pip&#39;s find, and for once in his life he discovered it by accident rather than by going somewhere he wasn&#39;t supposed to go.</p><p>He&#39;d sat down to retie his boot — the surviving one, worn now on the wrong foot because it fit better that way — against the rocky ridge at the north end of the meadow, and when he stood up he turned and there was a gap in the rock face behind him, low and wide, exhaling a breath of cool air that smelled of stone and darkness and something else, something dry and old.</p><p>&quot;There&#39;s a hole,&quot; Pip said.</p><p>Joost took the flint from his pocket and got a small flame going and crouched through the entrance.</p><p>Inside it opened. Not enormously — maybe twenty feet across, the ceiling high enough to stand in the center. Dry. The floor was flat stone covered in a thin layer of fine dust undisturbed enough to show, clearly, the prints of animals who used it as shelter: deer, from the look of it, and something smaller he couldn&#39;t name. Old prints. Nobody home.</p><p>He stood in the center and held up the light. The walls were solid. The ceiling was solid. At the back, a natural shelf of rock ran the full width of the cave at waist height, as if someone had built it for the purpose.</p><p>He brought everyone in one at a time. Mieke ran her hand along the shelf. Cas measured the space with his feet, heel to toe, counting quietly. Pip looked at the animal prints and crouched over them with scientific interest.</p><p>&quot;Deer,&quot; Pip announced.</p><p>&quot;Yes,&quot; Joost said.</p><p>&quot;Big ones.&quot;</p><p>&quot;Yes.&quot;</p><p>&quot;They have good taste,&quot; Pip said, looking around the cave with approval.</p><p>* * *</p><p>Near the top of the meadow, where the snowmelt ran thickest, Mieke stopped at a cluster of dead stalks still standing from last autumn, tall and dry, their heads heavy with seeds. She broke one open in her palm. Small, dark, oily — she brought it to her nose, then held it out to Joost without saying anything.</p><p>He looked at it. Then at the stalks. Then at the ground near the house in his mind — the south-facing patch between the kitchen wall and the treeline, sheltered, with the runoff from the channel keeping it damp.</p><p>&quot;All of them,&quot; he said.</p><p>They stripped every stalk they could reach, Pip collecting seeds in his cupped hands with extraordinary concentration, delivering them to Joost&#39;s coat pocket in careful installments. Mieke worked systematically along the meadow&#39;s edge and found three more varieties — something with flat papery seeds, something small and round, a pod plant she didn&#39;t recognize but whose seeds smelled right.</p><p>&quot;We won&#39;t know what they are until they come up,&quot; Cas said.</p><p>&quot;We&#39;ll know when they come up,&quot; Mieke said.</p><p>On the way back down Joost stopped at the south-facing patch and stood there a moment, calculating. Good soil — the runoff had been keeping it loose. Enough light. Sheltered from the wind by the house itself. It would want turning, and a low border to hold the water, and time.</p><p>&quot;Garden,&quot; he said to Cas.</p><p>Cas looked at the patch. Looked at the mountain above them, the meadow invisible now behind the treeline. &quot;How big?&quot;</p><p>Joost measured it with his eyes. &quot;As big as we can make it.&quot;</p><p>* * *</p><p>They came down the mountain in the late afternoon with full pockets and a great deal to think about. Dried berries, a bundle of herbs Mieke had identified along the ridge, three good flat stones for the kitchen, a piece of quartz the size of Pip&#39;s fist that had no practical purpose and was coming anyway.</p><p>And the meadow. And the cave.</p><p>Joost said nothing about either on the way down. But when they came through the door and Elisabeth looked at his face she said, &quot;What did you find?&quot;</p><p>Joost set the berries on the counter. &quot;Quite a lot,&quot; he said.</p>` },
      { heading: "Chapter Seven — The Second House", content: `<p>The garden came first.</p><p>Joost and Cas turned the south-facing patch with the chisel and the saw handle — not good digging tools, but they worked — breaking the soil in long strips until it was loose enough to plant in. Mieke made the border herself, half-buried stones pressed tight into the earth to hold the water where it was wanted. She did it with the patience of someone who understood that the difference between a garden and a patch of dirt was mostly this kind of attention.</p><p>They planted by feel and memory and Mieke&#39;s nose — the oily dark seeds in the sunniest section, the flat papery ones where the runoff would keep them damp, the small round ones along the border where the soil was thinnest. The pod plant went in last, in the corner, because nobody was sure about it and the corner was a good place for experiments.</p><p>Pip planted three seeds in a spot he&#39;d selected himself, on grounds he declined to share. They were from a plant nobody had identified. When Joost asked what he expected to come up, Pip said he didn&#39;t know but he had a feeling. This was accepted.</p><p>&quot;Now we wait,&quot; Mieke said.</p><p>&quot;Now we wait,&quot; Joost said.</p><p>* * *</p><p>The cave door was Joost&#39;s next project, and he approached it the way he approached things that mattered — slowly at first, measuring twice, cutting once, not starting until he was sure.</p><p>The entrance was low and wide, irregular at the edges where the rock had fractured. He spent a morning with the chisel squaring it enough to fit a frame, working the stone carefully, the sound of it ringing out across the empty meadow. The frame went in tight — pine, green enough to swell with the season and grip the rock on its own over time. The door he hung on iron pins driven into the wood, heavy enough to stay closed against wind, light enough for Mieke to open alone.</p><p>When he swung it shut for the first time the meadow went silent.</p><p>He stood in the dark of the cave with his hand on the door and felt the difference between a hole in a mountain and a room.</p><p>* * *</p><p>They furnished it over the following week, making two trips up the slope every day — Joost and Cas carrying the heavy things, Mieke managing the careful things, Pip carrying everything else with the enthusiasm of someone who had not yet been told what anything weighed.</p><p>Lamps first. Four of them — hollowed stone cups, wicked with twisted bark, filled with rendered fat from the snares. Joost drove iron pins into the cave walls at head height and hung them at the four corners, and when they were lit the cave became something entirely different: warm-walled, shadow-filled, the rock above catching the light in a way that made the ceiling look like moving water.</p><p>&quot;Oh,&quot; Mieke said, when she saw it.</p><p>Pip said nothing, which was rarer and meant more.</p><p>The shelf at the back became the pantry. Salt went there first.</p><p>Joost had found it three days earlier, not looking for it — he&#39;d been looking for sand, something to use as an abrasive on the log floors, and had followed a dry gully up the north side of the ridge to where the rock changed color, going pale and crumbly, and when he&#39;d put his finger to it and tasted it, he&#39;d stood very still for a moment.</p><p>Salt. A seam of it running through the rock face, not thick but real, enough to scrape free in useful quantities if you were patient. He&#39;d told no one until he had a full coat pocket of it. Then he&#39;d come back to the house and set it on the counter without a word and let Elisabeth find it.</p><p>She&#39;d looked at it. Tasted it. Looked at him.</p><p>&quot;Where?&quot;</p><p>He showed her the next morning.</p><p>They scraped the seam carefully — not taking everything, leaving it to replenish, visiting it the way you visit something you want to keep. The salt that came free went into a sealed clay pot and up to the cave shelf.</p><p>Beside the salt: dried meat, smoked over the kitchen fire, packed tight. The snares had been generous that week — three rabbits, and Cas had come back one afternoon with something larger from the upper woods that nobody asked him to identify too closely but that smoked well and kept. Joost cut it thin and hung it until it was dry enough to store and then stored it, and the cave shelf began to look like the beginning of something.</p><p>The water tank was last and hardest. Joost and Cas built it from flat stones mortared with clay, inside the cave against the right wall — four feet across, three feet deep, the inside coated in so many layers of clay it had gone smooth and almost glassy. They filled it by hand over two days, carrying water up from the house in the cook pot and the canvas bag, until it stood full and cold and still in the lamplight.</p><p>Joost crouched beside it and looked at the surface. His own face looked back.</p><p>&quot;How long will it last?&quot; Cas asked.</p><p>&quot;The six of us? Four days. Five if we&#39;re careful.&quot; He paused. &quot;Long enough.&quot;</p><p>* * *</p><p>On the last evening of outfitting the cave Joost stood at the door and looked at what they&#39;d built. Lamps at the four corners. Salt and smoked meat on the shelf. Full water tank. Bedrolls stacked against the left wall. The door solid in its frame.</p><p>He went through the list in his head — everything here that wasn&#39;t also at the house. The second cook pot. The preserved food. The salt. The spare flint. The two good knives.</p><p>At the house they had the kitchen, the water spout, the garden, the tools. At the cave they had everything you needed if the house was suddenly not an option.</p><p>He thought about the buffalo. Eight, nine of them, the smallest one four times the size of a man.</p><p>He thought about the seven men who had ridden south without looking back.</p><p>He pulled the cave door shut behind him and tested the latch. Solid.</p><p>&quot;Done?&quot; Cas said, from behind him.</p><p>&quot;Done,&quot; Joost said.</p><p>They walked down the slope in the long evening light, the house visible below them through the trees, smoke coming from the kitchen flue in a thin straight line. From up here you could see the garden — just a dark rectangle of turned earth beside the wall, nothing showing yet, but there.</p><p>Joost watched it for a moment.</p><p>It would show. Everything showed, eventually.</p>` },
      { heading: "Chapter Eight — The Smoke", content: `<p>It was Cas who saw it first, and only because he was looking at something else.</p><p>He&#39;d been watching a hawk work the updrafts above the plains — the way it held still in moving air, barely a wingbeat, just riding — when his eye caught the thin vertical line rising at the edge of visibility. Not the hawk. Something beyond the hawk. Something on the ground.</p><p>He stood very still.</p><p>&quot;Papa.&quot;</p><p>Joost was at the woodpile. He came without hurrying, which meant he&#39;d heard something in Cas&#39;s voice. He followed Cas&#39;s line of sight out across the plains and found it — a column of smoke, pale grey, rising straight in the still morning air and then bending gently at the top where the high wind caught it.</p><p>Thin. Controlled. Not a grass fire. Not an accident.</p><p>&quot;How long has that been there?&quot; Elisabeth said, from the doorway.</p><p>Nobody answered, because the answer was the strange part. Joost looked at it and felt the peculiar sensation of recognizing something he had never seen before — the way it sat in the landscape, the color of it, the steadiness. Something about it said permanent. Said always.</p><p>&quot;I think,&quot; Mieke said slowly, from beside him, &quot;that it&#39;s always been there.&quot;</p><p>Joost said nothing. She wasn&#39;t wrong. That was the thing. She wasn&#39;t wrong.</p><p>* * *</p><p>They watched it for the rest of that day from the treeline, taking turns so there was always someone looking while the others worked. It didn&#39;t change. It didn&#39;t move. It rose at the same rate all morning and into the afternoon, thinning as the day warmed and the air shifted, thickening again toward evening. The behavior of a fire that was being managed. Fed at intervals. Tended by someone who knew what they were doing.</p><p>At supper Joost said, &quot;Indians,&quot; and nobody disagreed and nobody seemed surprised, because by then it felt obvious — the kind of obvious that had been true all along and simply unnoticed.</p><p>&quot;How far?&quot; Cas said.</p><p>&quot;Past the visible. Two miles. Maybe three.&quot; Joost turned his cup in his hands. &quot;Far enough that they haven&#39;t seen our smoke.&quot;</p><p>&quot;Or they have,&quot; Elisabeth said, &quot;and they&#39;re not concerned.&quot;</p><p>The table was quiet for a moment.</p><p>&quot;Either way,&quot; Joost said.</p><p>&quot;Either way,&quot; she agreed.</p><p>* * *</p><p>The smoke kept up for three days, and then four, and then a week, and with each day it became more ordinary and more unsettling at the same time. Ordinary because it was always there, same place, same color, same slow rise into the morning air. Unsettling for exactly the same reason.</p><p>Tor had known before any of them. Joost thought about that. The dog had been watching the plains with particular attention for — how long? Since the beginning, maybe. The careful watch of an animal that had already catalogued something and filed it under present but not threatening, monitor ongoing.</p><p>He found himself watching the plains differently now. Not for movement — for absences. For the shapes that weren&#39;t there. For what the land looked like when nothing was happening, so that he&#39;d know the difference when something was.</p><p>On the fifth day Mieke came to him and said, &quot;If they come, we go up.&quot;</p><p>Not a question.</p><p>&quot;Yes,&quot; Joost said.</p><p>&quot;All of us. Riet and everything.&quot;</p><p>&quot;Yes.&quot;</p><p>She nodded, as if confirming something she&#39;d already decided. &quot;I want to know the path in the dark,&quot; she said. &quot;I want to walk it at night so I know it.&quot;</p><p>Joost looked at her for a moment. Nine years old. He thought about what it cost her to think like this and whether it was right to let her. Then he thought about the cave door, solid in its frame, and the lamps waiting to be lit, and the water tank full and still in the dark.</p><p>&quot;Tonight,&quot; he said. &quot;We all walk it tonight.&quot;</p><p>* * *</p><p>They went up after supper — all of them, no lamp, the moon giving just enough. Joost first, then Elisabeth with Riet, then Mieke, then Cas, then Pip, who had been told this was important and was conducting himself accordingly, which meant he was quiet and careful and only tripped once.</p><p>Tor led. He went up the slope as if he&#39;d done it a hundred times in the dark, pausing at the difficult sections to wait, moving again when he heard them behind him. At the meadow he turned north without hesitation, crossed the grass in the silver light, and stopped at the cave door.</p><p>Joost opened it. They went in. He lit one lamp.</p><p>The cave looked the same as it always did — the shelf, the salt, the water tank, the bedrolls, the four dark corners. The same. Ready.</p><p>They stood in it for a moment, all six of them, the lamp throwing long shadows up the walls.</p><p>Then Pip said, &quot;Can we sleep here tonight?&quot;</p><p>&quot;No,&quot; Joost said.</p><p>&quot;Just asking.&quot;</p><p>They filed back out. Joost pulled the door shut behind them and tested the latch in the dark. Solid, same as always.</p><p>On the way down Mieke didn&#39;t need to watch her feet. She knew the path. That was the point.</p><p>The smoke was invisible in the dark, but Joost knew where to look, and when the clouds shifted and the moonlight came through clean he found the faint smudge of it against the stars — barely there, banked for the night, but there.</p><p>Always there.</p>` },
      { heading: "Chapter Nine — The Surprise", content: `<p>It was Pip who brought it up, which meant it had been Mieke&#39;s idea.</p><p>That was how it usually worked — Mieke would think of something, say nothing, and then Pip would announce it as if it had just occurred to him, and Mieke would let him, because she understood that certain requests landed better when they came from Pip.</p><p>&quot;We want to walk along the mountain,&quot; Pip said at breakfast. &quot;Just the three of us. Well, four with Tor.&quot;</p><p>Joost looked at Mieke. Mieke looked at her bowl.</p><p>&quot;How far?&quot; Joost said.</p><p>&quot;Just along.&quot; Pip made a vague gesture that encompassed approximately the entire visible mountain range. &quot;We&#39;d stay at the base. Not up. Just along.&quot;</p><p>&quot;We know the path,&quot; Cas said. He&#39;d been in on it from the start. &quot;I&#39;ve looked at it from the treeline. It&#39;s open. We&#39;d see anything before it saw us.&quot;</p><p>Joost and Elisabeth looked at each other across the table in the way that meant a conversation was happening that didn&#39;t require words. Elisabeth looked at Mieke. Mieke was still looking at her bowl but her chin was slightly up, which meant she was listening very carefully.</p><p>&quot;Back before dark,&quot; Joost said.</p><p>Pip&#39;s face did something complicated in its effort not to react too strongly. &quot;Yes,&quot; he said, with great dignity.</p><p>&quot;Tor stays close.&quot;</p><p>&quot;Tor always stays close.&quot;</p><p>&quot;All three of you together. No splitting up.&quot;</p><p>&quot;Yes, Papa.&quot;</p><p>Joost picked up his cup. &quot;Go.&quot;</p><p>They were out the door before he&#39;d finished the word.</p><p>* * *</p><p>They walked east along the mountain base for an hour, the cliff face rising on their left and the plains opening on their right, the grass here shorter and drier than near the house. Tor moved ten feet ahead of them in a constant patient sweep, nose working. Cas watched the plains. Mieke watched the rock face. Pip watched everything and narrated as he went, which the others had long since learned to hear as background.</p><p>It was Mieke who stopped.</p><p>Not at anything obvious — a section of cliff that looked, at first, exactly like the rest of the cliff. But there was a different quality to the shadow in one place, a darkness that went back further than it should. She stepped closer. Put her hand in. Air on the other side, cool and still.</p><p>&quot;Here,&quot; she said.</p><p>The entrance was narrow — sideways for Cas, barely — but it opened inside, and the smell that came out was old and dry and completely uninhabited. Mieke went in first. Cas got the flint going. They stood in a cave roughly twice the size of their own, the walls coated in a pale mineral crust that caught the light and threw it back in fragments.</p><p>Empty. Completely, obviously empty — not the emptiness of something recently vacated but the emptiness of somewhere nothing had been for a very long time. No prints in the dust. No smell of animals. Just stone and silence and the faint mineral smell of the walls.</p><p>&quot;Nobody&#39;s been here,&quot; Pip said.</p><p>&quot;Not for years,&quot; Cas said.</p><p>Mieke was already moving toward the back. The cave angled slightly downward as it went, and the floor changed — softer, darker, the pale dust giving way to something else. She crouched at the back corner and held the light down.</p><p>A depression in the rock. Natural, bowl-shaped, perhaps four feet across and two feet deep, the rock around it stained dark. In the depression: liquid. Black, still, faintly gleaming in the flint-light.</p><p>Cas crouched beside her.</p><p>&quot;What is it?&quot; Pip said, from behind them.</p><p>Cas dipped his finger and rubbed it against his thumb. Looked at it. Smelled it. Set the flint carefully aside so the flame was nowhere near his hand.</p><p>&quot;Oil,&quot; he said.</p><p>They looked at it for a long moment. The cave was perfectly still. Above the depression the rock overhung in a natural shelf that covered it completely — no rain, no debris, no sky. Whatever was in that hollow had been accumulating for a very long time, undisturbed, protected by the mountain itself.</p><p>Cas stood up slowly and looked at the cave entrance, then at the oil, then at Mieke.</p><p>She was already looking at him with the expression she wore when she&#39;d thought of something she hadn&#39;t said yet.</p><p>&quot;How much would we need?&quot; she said.</p><p>Cas thought about it. &quot;Depends on the barrel.&quot;</p><p>&quot;And the barrel?&quot;</p><p>&quot;I can make a barrel.&quot;</p><p>Pip looked between them. &quot;What are we making?&quot;</p>` },
      { heading: "Chapter Nine — The Surprise (continued)", content: `<p>Cas looked at Pip for a moment. Then at Mieke. Something passed between them that was partly a question and partly an answer.</p><p>&quot;A surprise,&quot; Cas said.</p><p>* * *</p><p>They told their parents they&#39;d found something good and were working on it, and that they&#39;d like to go back every day until it was done, and that it was a surprise, and that everyone would like it.</p><p>Joost looked at Cas for a long moment. Cas met his eyes without looking away.</p><p>&quot;Every day,&quot; Joost said.</p><p>&quot;Until it&#39;s done.&quot;</p><p>&quot;Together.&quot;</p><p>&quot;Together.&quot;</p><p>Joost picked up his tools and went back to work. That was all.</p><p>* * *</p><p>Eleven days. They came home each evening with oil-stained hands and said nothing except that it was going well, which it was. Cas built the barrel first — staved pine, clay-sealed, tight enough to hold water and therefore tight enough to hold oil. He built the transport sled to carry it the second day. On the third day they started filling it, cup by cup with the tin Mieke had fashioned from a scrap of iron fitting, and by the sixth day the barrel was half full and by the ninth it was full and sealed and sitting on the sled.</p><p>The gun took the rest of the time.</p><p>Cas had been thinking about it since the moment he&#39;d understood what the oil was. He&#39;d seen a demonstration once, years ago — an oil-fed weapon, a thing that threw burning liquid, crude and alarming and extraordinarily effective at communicating that a position was not worth pressing. He built it from iron fittings salvaged from the original supply bundle, a clay-lined chamber, a pump mechanism, a clay-sealed nozzle. He tested it empty first, then with water, then — on the last day, at the back of the empty cave with Mieke and Pip watching from the entrance — with oil.</p><p>The result was not subtle.</p><p>&quot;Oh,&quot; Pip said.</p><p>&quot;Yes,&quot; Cas said.</p><p>&quot;That&#39;s—&quot;</p><p>&quot;Yes.&quot;</p><p>* * *</p><p>They came home on the eleventh evening with the barrel on the sled and the gun wrapped in canvas under Pip&#39;s arm, Tor trotting alongside with the air of an animal who had witnessed something significant and was keeping professional about it.</p><p>Joost was at the woodpile. Elisabeth was at the kitchen. They both turned at the same moment.</p><p>Cas unwrapped the gun and set it on the ground. He uncovered the barrel. He explained, briefly and without embellishment, what the oil was, where it was, how much there was, and what the gun did.</p><p>Joost crouched and looked at the gun for a long time. He didn&#39;t touch it. He looked at the chamber, the pump, the nozzle. He looked at Cas.</p><p>&quot;Show me,&quot; he said.</p><p>They went to the edge of the treeline, into the open air, pointing at nothing. Cas pumped the chamber and opened the valve and the gun did what it had done in the cave, and the result was, if anything, more impressive in daylight.</p><p>Joost stood back and watched it for a moment. Then he stepped forward and looked at the nozzle. Then at Cas.</p><p>He put his hand on his son&#39;s shoulder and didn&#39;t say anything for a moment.</p><p>&quot;Fourteen years old,&quot; he said finally.</p><p>&quot;Almost fifteen,&quot; Cas said.</p><p>Joost almost smiled. &quot;Almost fifteen.&quot;</p><p>* * *</p><p>Elisabeth made everything she could think of that evening, which was more than usual and better than usual, and they ate outside in the last of the light with the barrel sitting at the edge of the treeline and the gun leaning against the house wall and the mountains above them going gold and then pink and then grey.</p><p>Pip explained to Riet what had happened, in full, in great detail, using a stick to demonstrate the key moments. Riet watched him with the focused attention she gave most things and then put the stick in her mouth, which Pip accepted as appreciation.</p><p>Mieke sat beside her father after supper and looked at the plains.</p><p>The smoke was there, faint at the horizon, same as always.</p><p>&quot;It&#39;s better now,&quot; she said.</p><p>Joost looked at the gun. Looked at the barrel. Looked at the smoke.</p><p>&quot;Yes,&quot; he said. &quot;It is.&quot;</p>` },
      { heading: "Chapter Ten — Home", content: `<p>Six months passed the way good months do — quickly, and with the feeling afterward that you hadn&#39;t looked enough.</p><p>The garden came up in May, tentative at first and then all at once, and what came up was mostly recognizable: something like turnips, something like broad beans, the pod plant turning out to be a variety of pea that Mieke declared the best thing they&#39;d grown, which was a high bar. Pip&#39;s three mystery seeds produced a plant nobody could identify that grew to four feet tall, flowered yellow, and then stopped doing anything interesting. Pip maintained it had potential.</p><p>The berries on the upper slope ripened in June and they spent three days picking, Elisabeth turning them into preserves in the big pot while the rest carried load after load down the mountain. The cave shelf filled up. The salt seam gave steadily. Cas refined the oil gun over the course of two quiet months, improving the pump, extending the range, adding a second nozzle that could be closed off or opened depending on what was needed.</p><p>The smoke on the plains never came closer. Twice they saw riders at the edge of visibility — small dark shapes moving parallel to the mountain, not toward it. Tor watched them from the treeline without sound. They passed and didn&#39;t come back.</p><p>Mieke turned ten in July. Nobody had been keeping precise track of the date but she had, and she announced it at breakfast matter-of-factly, as if she was reporting the weather. Elisabeth made something sweet from the preserves. Pip gave her a carved figure he&#39;d been working on in secret for two weeks, which was the longest Pip had ever kept a secret, and which Mieke kept on the shelf above her bedroll.</p><p>Riet learned to walk in August. She did it the way she did most things — quietly, without announcement, simply doing it one morning as if she&#39;d always known how and had merely been waiting for a convenient moment. Pip tried to teach her to run immediately. This was not yet successful.</p><p>The nights got longer. The plains went gold, then brown. The mountains above them turned and the aspens on the upper slopes went yellow and the cave felt, if anything, more like somewhere you&#39;d chosen on purpose.</p><p>* * *</p><p>It was Joost who said it first, which surprised everyone including Joost.</p><p>He said it on an October evening, sitting at the outside fire after supper, the plains dark and the stars extraordinary. He said it quietly, as if testing the words.</p><p>&quot;I want to go home.&quot;</p><p>Nobody spoke for a moment.</p><p>&quot;This is good,&quot; he said. &quot;This is — I wouldn&#39;t have chosen it, but it&#39;s good. And I want to go home.&quot;</p><p>Elisabeth looked at the fire. &quot;My mother doesn&#39;t know if we&#39;re alive.&quot;</p><p>&quot;No.&quot;</p><p>&quot;The house is empty.&quot;</p><p>&quot;Probably.&quot;</p><p>Mieke said, &quot;We could come back.&quot;</p><p>Everyone looked at her.</p><p>&quot;It&#39;s here,&quot; she said simply. &quot;It&#39;ll still be here. We could bring people. Show them the cave, the oil, the meadow.&quot; She paused. &quot;It doesn&#39;t stop being ours just because we leave.&quot;</p><p>Pip said, &quot;I want to show Willem the oil gun.&quot; Willem was his best friend, back home. He&#39;d been mentioned approximately once every two weeks since they&#39;d arrived.</p><p>Cas said nothing for a while. Then: &quot;If we&#39;re going south, we need a way to carry everything we need to get back. We can&#39;t walk it. Not with Riet.&quot;</p><p>&quot;No,&quot; Joost said.</p><p>&quot;So we build something.&quot;</p><p>&quot;So we build something,&quot; Joost agreed.</p><p>* * *</p><p>The wagon took three weeks. Cas drew the plans in charcoal on a flat stone — four wheels, a flat bed, a covered section at the front, the oil engine mounted at the rear. Joost cut the timber. Elisabeth and Mieke fitted the cover frame, stretching the remaining canvas over it. Pip was in charge of wheels, which he approached with considerable seriousness, spending two full days selecting the right sections of trunk before Cas gently redirected him toward the pre-cut rounds Joost had already prepared.</p><p>&quot;These are better,&quot; Cas said.</p><p>Pip examined them. &quot;I was going to say that,&quot; he said.</p><p>They tested it in the meadow, Cas walking alongside with his hand on the fuel valve. It moved. Slowly, unevenly — but it moved, under its own power, across the flat grass. When Cas opened the valve a little more it moved faster.</p><p>Pip made a sound not unlike the one he&#39;d made when the oil gun first fired.</p><p>* * *</p><p>They packed the wagon in an hour. What they needed for the road: food for the journey, bedrolls, the good knife, the spare flint. The oil gun, because Cas wasn&#39;t leaving the oil gun. One small barrel of oil — enough for the engine and enough for the gun if it came to it.</p><p>Everything else stayed. The salt in its sealed pot on the cave shelf. The tools hanging on their pegs. The preserves, most of them. The second barrel.</p><p>&quot;We&#39;re leaving all of it?&quot; Pip said.</p><p>&quot;We&#39;re leaving it here,&quot; Joost said. &quot;There&#39;s a difference.&quot;</p><p>Pip considered this. &quot;When we come back with Willem—&quot;</p><p>&quot;It&#39;ll all be here.&quot;</p><p>Pip nodded, satisfied. Willem was going to find this extremely impressive.</p><p>On the last morning Joost walked up to the cave alone. He lit one lamp and stood in it for a while. The shelf still full — salt, preserves, dried meat, the spare tools. The water tank still and cold. Everything ready for whoever came next, which would be them, with friends, before the year was out if he had anything to say about it.</p><p>He left the lamp burning. He pulled the door shut. He tested the latch.</p><p>Solid.</p><p>They left at first light, the wagon moving south across the frost-stiff grass, the mountain behind them going pink at the peaks. Mieke sat at the back and watched it get smaller. Riet sat beside her, watching the same thing for reasons of her own.</p><p>&quot;It&#39;ll still be there,&quot; Pip said.</p><p>&quot;I know,&quot; Mieke said.</p><p>Tor jumped in uninvited and settled between the children with the decisive manner of a dog who had done the math on walking versus riding.</p><p>Joost drove. Elisabeth sat beside him. He opened the fuel valve. The engine turned. The wheels found their rhythm.</p><p>They went home.</p>` },
      { heading: "Chapter Eleven — Dust", content: `<p>They came into town on a Wednesday, which nobody had planned but which turned out to be exactly right because Wednesday was market day and half the town was in the square when the oil-engine wagon came rattling down the main road making a noise nobody had heard before.</p><p>People stopped. Stared. Someone dropped a basket.</p><p>Joost brought the wagon to a stop in front of the house and cut the fuel valve and the engine ticked down into silence. He sat for a moment with his hands on the reins — old habit, there were no reins — and looked at the front door of his house, which was exactly where he&#39;d left it.</p><p>Then Pip stood up in the wagon bed and shouted &quot;WILLEM!&quot; at a volume that resolved the question of whether anyone in town had missed them.</p><p>Willem appeared from behind a market stall at a dead run. Two seconds later Pip was on the ground and they were doing the thing boys do when they haven&#39;t seen each other in a year, which involves a great deal of noise and no useful communication whatsoever.</p><p>Elisabeth was already at the door of the house, key in hand. Mieke climbed down carefully and stood on the street and looked at everything — the familiar stones, the familiar windows, the neighbor&#39;s cat sitting on the familiar wall — with the expression of someone reading a book they&#39;d already read and finding it better than they remembered.</p><p>Joost lifted Riet down from the wagon. She looked at the town with profound suspicion. She&#39;d been eight months old when they left. This was, from her perspective, entirely new.</p><p>&quot;Home,&quot; Joost told her.</p><p>Riet looked at a pigeon. The pigeon looked back. Neither was convinced.</p><p>* * *</p><p>The house had the smell of somewhere that had been closed too long — cold and still and faintly dusty, the way places get when no one&#39;s been breathing in them. Elisabeth opened every window. Joost found the brooms. Mieke took one without being asked and started in the back rooms, and for the next two hours the house filled with the sound of sweeping and the slow return of air.</p><p>The neighbors — the Brandts, who&#39;d taken the animals — appeared at the door before they&#39;d been back an hour. Mevrouw Brandt took one look at Elisabeth and pulled her in by both hands and that was a conversation that lasted until supper. Mijnheer Brandt shook Joost&#39;s hand for a long time without saying much, which was his way, and then went and got the animals.</p><p>The goats came back first, unimpressed by their absence and ready to make this known. The chickens came back in a crate, regarding everyone with the blank hostility chickens reserve for all situations. The old horse — Joost had half expected him not to make it through the winter, he was eighteen and moved like it — walked back into his stall and stood there as if he&#39;d never left.</p><p>Pip introduced Willem to Tor. Tor accepted the introduction with dignity. Willem had approximately nine hundred questions about the wagon and the engine and the gun, which Cas answered with the patience of someone who had been expecting this and had prepared.</p><p>&quot;Is it really made of oil?&quot; Willem said.</p><p>&quot;Runs on it,&quot; Cas said. &quot;And throws it.&quot;</p><p>Willem looked at the gun, which was leaning against the wagon. &quot;Throws it on fire?&quot;</p><p>&quot;On fire,&quot; Cas confirmed.</p><p>Willem looked at Pip. &quot;We&#39;re going back,&quot; he said.</p><p>&quot;Next month,&quot; Pip said. &quot;I already told you.&quot;</p><p>* * *</p><p>The planning happened fast, the way things do when everyone already wants the same thing. Six families in the end — not all of them, but six, with enough adults to be useful and enough young people to make it interesting. Joost drew a map from memory on the back of a flour sack, and it was better than he&#39;d expected — the plains, the mountain, the treeline, the slope up to the cliff.</p><p>Cas built a second barrel for the engine. Mieke made a list of what the cave still had and what they&#39;d need to bring. Elisabeth organized food for fourteen people over three weeks with the focused intensity she brought to all logistical problems.</p><p>Pip told Willem everything. This took four days.</p>` },
      { heading: "Chapter Twelve — Back", content: `<p>They left on a Saturday, two wagons and six horses and fourteen people and Tor, who rode in the supply wagon with the authority of an animal who had done this before and knew how it went.</p><p>The plains were different in November — wider somehow, the grass short and silver, the sky enormous. The children from the other families had never seen anything like it. Willem stood in the wagon bed for the first three hours watching the horizon with an expression Pip recognized: the one you wear when the world turns out to be larger than you&#39;d been told.</p><p>&quot;How far?&quot; Willem said.</p><p>&quot;You&#39;ll see it before we get there,&quot; Pip said. &quot;The mountain. It just appears.&quot;</p><p>It appeared on the afternoon of the second day, the same way it always had — suddenly, completely, with the confidence of something that had been there all along. Several people said things. Pip said nothing, just watched Willem&#39;s face.</p><p>That was enough.</p><p>* * *</p><p>The cave was exactly as they&#39;d left it. Joost pushed the door open and the lamp was still burning — low, almost out, the fat nearly gone, but burning — and everyone who saw it went quiet for a moment.</p><p>The shelf was full. The water tank was full. The bedrolls were where they&#39;d been left.</p><p>&quot;You left a lamp burning,&quot; Elisabeth said.</p><p>&quot;I didn&#39;t want it to be dark when we came back,&quot; Joost said.</p><p>She looked at him. Then at the lamp. Then she went in and refilled it and it burned up bright and steady and lit the cave the way it always had, warm and shadow-filled, the ceiling moving with the light.</p><p>* * *</p><p>They spent the first three days showing the others everything — the spring, the salt seam, the oil cave, the meadow. Cas demonstrated the gun in the open field above the treeline and the reaction was everything Pip had promised Willem it would be.</p><p>The house was too small for fourteen people. The cave fit six comfortably. After one night of sorting it out, the arrangement became obvious: the family slept in the house, the friends slept in the cave.</p><p>The friends, it turned out, did not consider this a hardship. The lamps, the shelf, the stone floor, the water tank — by the second night they were calling it the best room they&#39;d ever slept in, which the family accepted with the restraint of people who had known this for months.</p><p>Pip told Willem this privately, and with considerable satisfaction.</p><p>The week went the way good weeks do. The children ranged the mountain in groups, the adults worked on small improvements to the house and the water channel, Elisabeth and two of the other women did something ambitious with the last of the preserves that produced results nobody could fully explain but everyone ate immediately. Mieke showed anyone who wanted to see it the meadow in the early morning, when the frost was still on the grass and the mountains above were going pink, and several people said they wanted to come back in the spring.</p><p>&quot;You can,&quot; Mieke said. &quot;It&#39;ll be here.&quot;</p><p>On the last evening they made a fire outside, all fourteen of them, the plains dark and the stars overhead doing what they always did out here — more of them than seemed strictly necessary, the kind of sky you don&#39;t get near a town. Someone had brought a fiddle. Someone else had brought something that turned out to be quite good once it was warmed up.</p><p>Joost sat beside Elisabeth and watched the fire and the people around it and the mountain above them, dark against the stars.</p><p>&quot;Next summer,&quot; she said.</p><p>&quot;Next summer,&quot; he said.</p><p>Tor was asleep against Mieke&#39;s side. Riet was asleep in Elisabeth&#39;s lap. Pip and Willem were explaining something to each other with sticks, a conversation that had apparently been going on since Wednesday and showed no signs of resolving.</p><p>Cas sat at the edge of the firelight and looked at the plains the way he&#39;d been looking at them for six months — not worried, just watching. Keeping track. Knowing where things were.</p><p>The smoke was gone from the horizon. Had been since they&#39;d arrived. Joost had noticed on the first day and said nothing.</p><p>He noticed it again now. Said nothing again.</p><p>Some things you just carry quietly, because they&#39;re yours and the night is good and there&#39;s a fiddle playing and everyone you love is warm.</p><p>That was enough. That was everything.</p>` },
      { heading: "Chapter Thirteen — The Good Side", content: `<p>They found the men on the way home.</p><p>Not looking for them — just found them, the way you find things on open plains when the grass is short and the sky is clear and there&#39;s nowhere to be invisible. Four of them, camped at a dry creek bed two hours south of the mountain, the remains of a fire and three horses and one man standing when the wagons came over the rise.</p><p>Joost stopped the engine. The plains went quiet.</p><p>The man looked at the wagon. At the engine. At Cas, who had the oil gun across his knees in the way that didn&#39;t look like a threat and was.</p><p>Then the man looked at Joost, and Joost looked at the man, and it was the same man — the one who&#39;d stood in their doorway before sunrise and said get up in the pleasant voice of someone who&#39;d done this before.</p><p>Neither of them spoke for a moment.</p><p>Then Joost said, &quot;We&#39;re going home.&quot;</p><p>The man looked at the wagon again. At the fourteen people in it. At the gun.</p><p>&quot;So are we,&quot; he said.</p><p>Joost held his eye for another moment. Then he opened the fuel valve and the engine turned and the wagon moved south and they didn&#39;t look back.</p><p>Cas kept the gun across his knees for another hour. Then he set it down.</p><p>Nobody said anything about it. There was nothing to say that the road south wasn&#39;t already saying.</p><p>* * *</p><p>They were home by Thursday.</p><p>Joost put the wagon in the barn beside the old horse, who regarded it without particular interest. He hung the oil gun on the wall above the workbench — not hidden, not displayed, just there, the way useful things are. He stood in the barn for a moment in the quiet.</p><p>Then he went inside, where Elisabeth was already at the stove and something good was already happening, and Mieke was at the table with her carved figure from the cave shelf, and Pip was in the yard explaining the entire trip to the goats, who were listening with the focused attention of animals who understood that food was sometimes involved in these conversations and it was best to pay attention.</p><p>Riet was sitting in the middle of the kitchen floor, watching the door.</p><p>Joost crouched down to her. &quot;What are you looking at?&quot;</p><p>Riet looked at the door. Then at him. Then at the door again.</p><p>&quot;I know,&quot; he said. &quot;Me too.&quot;</p><p>He picked her up and stood at the window and looked out at the street, the ordinary Wednesday street, the neighbor&#39;s cat, the familiar stones.</p><p>And beyond them, somewhere north, past the edge of what you could see from here — the mountain, the meadow, the cave with the lamp in it, the salt seam in the rock, the oil in the dark, the door solid in its frame.</p><p>It would all still be there in the spring.</p><p>It was enough. It was everything. It was theirs.</p><p>— The End —</p>` },

let currentPage = 0;
const storageKey = 'gbm_page';

function saveProgress() {
  localStorage.setItem(storageKey, currentPage);
}

function loadProgress() {
  currentPage = parseInt(localStorage.getItem(storageKey) || '0');
}

function render() {
  const page = pages[currentPage];
  document.getElementById('content').innerHTML =
    '<div class="chapter-heading">' + page.heading + '</div>' + page.content;
  document.getElementById('pageInfo').textContent = (currentPage+1) + ' / ' + pages.length;
  document.getElementById('prev').disabled = currentPage === 0;
  document.getElementById('next').disabled = currentPage === pages.length-1;
  window.scrollTo(0,0);
}

function changePage(dir) {
  speechSynthesis.cancel();
  document.getElementById('speakBtn').textContent = '▶ Speak';
  currentPage = Math.max(0, Math.min(pages.length-1, currentPage+dir));
  saveProgress();
  render();
}

function toggleSpeak() {
  const btn = document.getElementById('speakBtn');
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btn.textContent = '▶ Speak';
    return;
  }
  const text = document.getElementById('content').innerText;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  utt.onend = () => { btn.textContent = '▶ Speak'; };
  btn.textContent = '■ Stop';
  speechSynthesis.speak(utt);
}

loadProgress();
render();
</script>

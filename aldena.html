ll="#e8d8b0" letter-spacing="2">The Wreck</text><text x="340" y="990" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="400" fill="#c8b888" letter-spacing="4">of the Aldena</text></svg></div>` },
      { heading: "Chapter One — The Storm and the Sacrifice", content: `<p>The Aldena — a Dutch merchant vessel three months out of Amsterdam — groaned like something alive.</p><p>Below deck, Margriet Voss clutched baby Sofie to her chest and pressed herself against the cabin wall, one arm hooked around Nella, who wasn&#39;t crying — she was watching, wide-eyed, which was almost worse. Bram had wedged himself into the corner beside a barrel and was grinning, which was absolutely worse.</p><p>Hendrik appeared in the doorway, soaked through, hair plastered to his forehead. Pieter stood just behind him, thirteen and trying hard to look like it hadn&#39;t been the most terrifying hour of his life.</p><p>&quot;We&#39;re going to run aground,&quot; Hendrik said, calm as a man announcing supper.</p><p>&quot;Hendrik—&quot;</p><p>&quot;It will be loud. Hold onto something that&#39;s bolted down.&quot;</p><p>He was gone before she could answer.</p><p>Up on deck, the world was nothing but black water and white spray. Pieter gripped the railing until his knuckles ached, watching the crew move — they knew exactly what to do, shouting to each other in Dutch and something else he didn&#39;t recognize, hauling ropes with a practiced fury that made him feel very young and very useless.</p><p>&quot;Stay close to me,&quot; Hendrik said in his ear.</p><p>&quot;I&#39;m not scared,&quot; Pieter said.</p><p>&quot;I didn&#39;t say you were. I said stay close.&quot;</p><p>The first mate, a broad man named De Waal, caught Hendrik&#39;s eye and shook his head once. Hendrik nodded back. Pieter didn&#39;t know what that meant. He didn&#39;t ask.</p><p>Below, Bram had stopped grinning.</p><p>The ship was tilting in a way that felt wrong — not the rolling Bram had gotten used to over three months at sea, but something steeper, longer, like the ocean was making a decision.</p><p>&quot;Mama,&quot; Nella said quietly.</p><p>&quot;I know,&quot; Margriet said, though she didn&#39;t know anything except that she was not going to let her voice shake. Sofie had fallen asleep somehow, against all reason, her small face perfectly peaceful against Margriet&#39;s shoulder.</p><p>Bram crawled across the tilting floor and pressed himself against his mother&#39;s side without saying a word.</p><p>She held him.</p><p>De Waal found them on deck before the dust had settled, already moving with purpose, already giving orders.</p><p>&quot;Mr. Voss.&quot; He gripped Hendrik&#39;s shoulder. &quot;The ship won&#39;t hold. We have one longboat.&quot;</p><p>&quot;How many can it take?&quot;</p><p>&quot;Four or five. Maybe six if they&#39;re small.&quot; His eyes moved to Margriet, appearing now from below with Sofie strapped to her chest and Bram and Nella at her heels, Pieter rushing down to meet them. &quot;Take your family.&quot;</p><p>&quot;And your men—&quot;</p><p>&quot;Will manage.&quot; De Waal said it the way Hendrik said things — like the decision was already made and discussing it was a formality. He turned and started barking orders before Hendrik could answer.</p><p>The crew loaded them fast and without ceremony — blankets, tools, a crate of dried food, rope, two lanterns, two empty water casks, Margriet&#39;s bag, whatever Bram tried to grab that wasn&#39;t nailed down. De Waal crouched at the side of the longboat while the crew lowered it.</p><p>&quot;Other side of the island,&quot; he said to Hendrik quietly, nodding toward the dark shoreline. &quot;Row left. The rocks go on for a mile the other way. This side, you&#39;ll make it.&quot;</p><p>Margriet did not look back at the ship. She looked at the children — Pieter rowing hard beside a crewman who&#39;d come to push them off, Bram gripping the side white-knuckled and absolutely silent for once, Nella&#39;s face buried in Margriet&#39;s side. Sofie slept.</p><p>The shore came up fast. The crewman jumped out, dragged the bow up onto the sand, gave the hull one firm slap like a farewell, and waded back into the dark.</p><p>They stood on the beach. All six of them. Breathing.</p><p>Then Bram said, &quot;Is that—&quot;</p><p>The wave hit the Aldena like a fist.</p><p>Not a wave — a wall. It came from nowhere and everywhere and the sound was enormous, and what had been a ship became in seconds a chaos of timber and rope and dark shapes tumbling in white water.</p><p>&quot;Move!&quot; Hendrik was already running, grabbing the crate, shouting. &quot;Everything — get it up the beach — now!&quot;</p><p>They ran. Pieter hauled two bags. Margriet ran with Sofie and kicked a lantern ahead of her rather than leave it. Nella grabbed the rope without being asked. Bram — somehow — was carrying the crate with Hendrik, stumbling, not dropping it.</p><p>The wave chased them up the sand.</p><p>Nella screamed.</p><p>It caught her ankles and pulled — just for a moment — before Pieter&#39;s hand closed around her wrist and yanked her forward and they were all standing above the tideline, soaked and gasping, and the water sucked back down the beach and was gone.</p><p>Silence.</p><p>Bram looked down at his soaking feet. Then up at no one in particular.</p><p>&quot;That,&quot; he said, &quot;was excellent.&quot;</p><p>The night passed slowly. In the morning, when the sea had calmed and the wreck had settled into the shallows, they walked the beach.</p>` },
      { heading: "Chapter One — The Storm and the Sacrifice (continued)", content: `<p>They found three of the crew. Not all of them — most had been taken by the sea and would not come back. But three had washed to shore, and the Voss family buried them above the tideline where the ground was firm, under a stand of trees whose roots would hold.</p><p>Hendrik dug. Pieter dug. Nobody spoke much. Margriet stood with Sofie and the younger children back from the work, and when it was done Hendrik stood at the head of the graves and said what he could remember of the proper words, and then said some of his own when the proper ones ran out.</p><p>Nella picked three large flat stones and set one at each grave. She found small white shells and pressed them into the soft earth in a line.</p><p>Bram, for once, was completely quiet throughout.</p><p>They walked back to camp without speaking. The sun was fully up by then, and the island looked different in daylight — greener, larger, more real. Hendrik looked at it as they walked. He didn&#39;t say what he was thinking.</p><p>The sun was already low.</p><p>Hendrik said it before anyone else could think it: &quot;We need to be organized before dark.&quot; He said it the way he said most things — not urgently, but with a weight that made everyone move.</p><p>They sorted what they had. The crate held six days of dried biscuit and salt fish if they were careful, a small tin of rendered fat, and a cloth bag of dried beans that would need fire and water before they were any use to anyone. There was a tin cup, two wooden bowls, a length of cloth that had once been a shirt, and a knife.</p><p>&quot;That&#39;s what we eat with?&quot; Margriet said.</p><p>&quot;We take turns with the bowls,&quot; Hendrik said. &quot;Sofie eats from the cup.&quot;</p><p>Margriet looked at the cup. Then at Sofie. Then she picked up the cup and did not say anything else about it.</p><p>They ate sitting on the sand above the tideline — salt fish broken into pieces and divided without ceremony. It was not enough. Nobody said so. Bram ate his portion in approximately four seconds and then sat very still, which was how you knew he was still hungry.</p><p>&quot;Don&#39;t,&quot; Hendrik said, without looking up.</p><p>Bram, whose hand had been moving toward Nella&#39;s portion with the slow confidence of someone who believed he hadn&#39;t been noticed, retracted it.</p><p>&quot;I was just reaching past her,&quot; he said.</p><p>&quot;Mm.&quot;</p><p>The jungle had gone quiet in a way that felt deliberate. Margriet kept her eyes on the treeline. Every few minutes something moved in there — a branch, a shadow, something that rustled and stopped. She did not ask Hendrik what it was. He probably didn&#39;t know, and she didn&#39;t want to hear him say so calmly.</p><p>&quot;Can I go look?&quot; Bram said.</p><p>&quot;No,&quot; said Hendrik.</p><p>&quot;Just at the edge—&quot;</p><p>&quot;No.&quot;</p><p>&quot;There might be fruit—&quot;</p><p>&quot;Bram.&quot;</p><p>&quot;Yes Papa.&quot;</p><p>The light went fast once it started. One moment the sky was orange; the next it was purple; the next it was gone, and the stars came out in a quantity that none of them had ever seen from Amsterdam. Nella lay on her back and looked up at them with her mouth open. Even Margriet looked.</p><p>&quot;There are so many,&quot; Nella said.</p><p>&quot;No clouds,&quot; Hendrik said. &quot;No city. Nothing between us and them.&quot;</p><p>They slept — or tried to — in a row above the tideline, wrapped in the damp blankets, the sail canvas pulled over them like a roof held up by nothing, corners tucked under the crate and two pieces of driftwood Pieter had wedged into the sand. It let in the wind. It was better than nothing.</p><p>Sofie slept between Margriet and Hendrik. Nella pressed herself against Margriet&#39;s other side. Pieter lay on his back with his eyes open for a long time, listening.</p><p>Bram lasted perhaps twenty minutes before crawling out from under the canvas.</p><p>&quot;Bram,&quot; Pieter said quietly.</p><p>&quot;I&#39;m just looking at the stars.&quot;</p><p>&quot;Get back in.&quot;</p><p>&quot;I&#39;m not tired.&quot;</p><p>&quot;Bram.&quot; That was Hendrik. One word, from under the canvas, not even moving.</p><p>Bram got back in.</p><p>The sounds from the jungle did not stop. They changed — less rustling, more calling, things that clicked and hummed and once, far away, something that wasn&#39;t quite a howl. Margriet lay still and listened and held Sofie and did not sleep for a very long time.</p><p>Hendrik, beside her, was also not sleeping. She could tell by his breathing.</p><p>&quot;We&#39;ll be all right,&quot; he said quietly. Not a question. Not quite a promise.</p><p>&quot;I know,&quot; she said. It wasn&#39;t true yet. But she said it like it was, and that was close enough for one night.</p>` },
      { heading: "Chapter Two — What Washed Ashore", content: `<p>Morning came slow and golden, and with it, sound.</p><p>The jungle behind the beach was alive with it — birds, rustling, something heavy moving through undergrowth just out of sight. Margriet had not slept. She sat with her back against the supply crate, Sofie in her arms, watching the treeline.</p><p>&quot;There could be anything in there,&quot; she said quietly.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;Savages. Animals.&quot;</p><p>&quot;Yes.&quot;</p><p>&quot;Hendrik.&quot;</p><p>&quot;I know.&quot; He stood. &quot;Pieter. Help me go through what came ashore.&quot;</p><p>Most of it was ruined — waterlogged, shattered, useless. But the sea gave back what it could. A coil of rope. Three blankets, soaked but salvageable. A folding knife. A tin box that Pieter pried open to find — miraculously, sealed tight by rust or fate — dry powder and shot.</p><p>And beneath a tangle of sail canvas, wrapped in oilcloth: two muskets.</p><p>Hendrik held one up and looked at it a long moment.</p><p>Margriet&#39;s shoulders came down half an inch.</p><p>&quot;Can you shoot?&quot; Pieter asked.</p><p>&quot;Since I was younger than you.&quot;</p><p>Bram appeared from nowhere. &quot;Can I—&quot;</p><p>&quot;No,&quot; said everyone.</p><p>They sorted what they had. It took most of the morning. By the time the sun was high, they had a rough camp above the tideline — not comfortable, but defensible, with a clear view of the beach in both directions and the muskets loaded and leaning against the crate.</p><p>Hendrik counted the food. Six days, maybe seven if they were careful. He didn&#39;t say the number out loud. He looked at the sea instead.</p><p>&quot;Pieter. Come with me.&quot;</p><p>They went to the rocks at the far end of the beach and spent the afternoon with a length of line and bent iron hooks Pieter fashioned from the fittings. Three fish the first afternoon, small but real. Pieter gutted them on the rocks with the folding knife and carried them back without ceremony.</p><p>Margriet cooked them over a fire built above the tideline and nobody said anything about how good it was, because saying so would have meant acknowledging how afraid they&#39;d been an hour before. They just ate.</p><p>After that, fishing was Pieter&#39;s morning. Every morning, without discussion, he went to the rocks while the others slept. Some days were good. Some days he came back with nothing and said so plainly and they ate biscuit instead. Hendrik took the musket into the treeline twice in the first week and came back once with a bird none of them recognized but which Margriet cooked without asking questions.</p><p>Then Nella said, &quot;What do we drink?&quot;</p><p>They all looked at each other.</p><p>The sea stretched in every direction. Beautiful, blue, and completely useless.</p><p>&quot;There will be a river,&quot; Hendrik said. &quot;Or a spring. An island this size, with jungle this thick — there&#39;s fresh water somewhere. There has to be.&quot;</p><p>&quot;How do we find it?&quot; Pieter asked.</p><p>&quot;We walk the island. All the way around if we have to.&quot; He looked at Margriet. &quot;Tomorrow. Today we rest and we stay close.&quot;</p><p>Margriet nodded. It was the most sensible thing she&#39;d heard in two days.</p><p>It was Bram who found the dog.</p><p>Or rather, the dog found Bram — or at least Bram&#39;s dried biscuit, which he&#39;d been eating quietly at the edge of the water when something large and matted dragged itself out of the surf and collapsed three feet away from him.</p><p>Bram stared. The dog stared back with one eye. The other was swollen shut. It was enormous — some kind of ship&#39;s dog, broad-chested, brown and white under all the filth — and it looked like it had fought the entire ocean and nearly lost.</p><p>&quot;PAPA,&quot; Bram screamed, in a register that sent every bird on the island airborne.</p><p>They came running with the musket.</p><p>The dog didn&#39;t move. It just breathed — heavy, ragged, exhausted breaths — its massive head resting on the sand like it had simply run out of decisions to make.</p><p>Hendrik lowered the musket.</p><p>Nella pushed past him, sat down in the wet sand beside the dog, and put her hand gently on its side.</p><p>&quot;He&#39;s from the ship,&quot; she said quietly. &quot;He made it.&quot;</p><p>Nobody argued with her. Margriet went and got the second blanket.</p><p>They called him Anker.</p><p>It was Pieter who said it, half to himself, watching the dog eat the last of their dried fish without apparent gratitude. &quot;He&#39;s the only thing that held.&quot;</p><p>The name stuck.</p><p>Anker slept for most of that day and all of that night, which was just as well, because Bram spent most of the next morning circling him like a moon waiting for its moment.</p><p>The moment came when Anker stood up for the first time — unsteady, enormous, shaking the sand off himself — and Bram launched himself sideways onto the dog&#39;s back with a sound that wasn&#39;t quite a word.</p><p>Anker sat back down.</p><p>Bram was now sitting on the sand, on top of nothing, looking at the dog.</p><p>Anker looked back at him with profound indifference.</p><p>&quot;Bram,&quot; Hendrik said, not looking up from the rope he was coiling.</p><p>&quot;I wasn&#39;t going to ride him.&quot;</p><p>&quot;Good.&quot;</p><p>&quot;I was just — testing his back. For injuries.&quot;</p><p>&quot;Mm.&quot;</p><p>Anker stood up again, walked three feet, and lay down facing away from Bram.</p>` },
      { heading: "Chapter Three — The Spring", content: `<p>The sail canvas had come ashore in two large pieces, salt-stiff and heavy. Hendrik had been looking at it all morning.</p><p>&quot;Pieter. Help me cut these palms.&quot;</p><p>It took the better part of two days. Hendrik knew the theory — he&#39;d read everything he could find about the tropics before the voyage, in that particular way he had of preparing for things he&#39;d never done — and Pieter knew how to work, and between them they got four tall poles lashed into the ground above the tideline, angled back toward the treeline where the ground was firm.</p><p>The canvas went over the top. Rope held it. Smaller palm fronds filled the gaps and layered along the sides.</p><p>Bram&#39;s contributions were numerous and largely unhelpful. He dragged over several fronds nobody needed, gave detailed structural opinions that nobody asked for, and at one point climbed a pole to &quot;check the top&quot; until Hendrik said his name once in a particular tone and he came back down. In the evenings he tried to help Pieter fish and caught nothing but did not complain about it, which was its own kind of progress.</p><p>Nella and Margriet lined the inside floor with the driest fronds they could find, layering them thick. It wasn&#39;t soft exactly, but it was something.</p><p>When it was done they all stood and looked at it.</p><p>&quot;It&#39;s crooked,&quot; Bram said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;The left side is lower than the right.&quot;</p><p>&quot;Yes.&quot;</p><p>&quot;Should we—&quot;</p><p>&quot;Bram.&quot;</p><p>&quot;Yes Papa.&quot;</p><p>&quot;Get inside.&quot;</p><p>They all got inside. It was warm and smelled like salt and green things and it fit all six of them plus Anker, who took up a genuinely unreasonable amount of space.</p><p>Margriet sat with her back against the center pole and looked up at the canvas ceiling and didn&#39;t say anything for a while.</p><p>Then: &quot;It doesn&#39;t leak?&quot;</p><p>&quot;Not yet,&quot; Hendrik said.</p><p>She nodded slowly. &quot;All right.&quot;</p><p>They set out at first light, Hendrik with a musket, Pieter with the knife and two empty casks, Anker trotting ahead like he owned the island and was doing them a favor by allowing them to follow.</p><p>The good side of the island was extraordinary — white sand giving way to thick green, flowers Margriet had no names for, birds that watched them from branches without flying away. Bram named every one of them. None of the names were accurate.</p><p>They walked for an hour along the shore, then turned inland where the ground rose.</p><p>Anker had been given nothing to drink since morning. Hendrik had felt guilty about it. He&#39;d done it anyway.</p><p>It took twenty minutes.</p><p>The dog&#39;s nose went down, then his whole body changed — purpose replacing leisure — and he was off through the undergrowth at a pace that had Bram sprinting and everyone else jogging and Margriet saying things under her breath that she wouldn&#39;t have said at home.</p><p>They heard it before they saw it — a low sound, almost a hiss, water moving over rock — and then they came through the trees and there it was. A natural hole in the rock face, deep and dark, water welling up cold and clear and spilling down the stone in a thin constant stream.</p><p>Anker had his entire face in it before they&#39;d stopped moving.</p><p>Hendrik crouched and cupped his hands and drank. His face did something complicated.</p><p>&quot;Clean,&quot; he said.</p><p>Pieter drank. Margriet drank. Even Sofie got a few drops on her lips and seemed to approve.</p><p>The wind here was different — sharper, coming from the wrong direction, carrying the smell of something rawer. Through the trees on the far side Pieter could see the sky was a different color. Darker. The sound of waves was louder and angrier.</p><p>&quot;That&#39;s the other side,&quot; Pieter said.</p><p>&quot;Yes.&quot; Hendrik was already looking at the slope — the way the ground fell away behind them, a long steady grade back toward camp. He stood slowly, the way he did when something was arranging itself in his mind.</p><p>&quot;We&#39;re downhill from here,&quot; Pieter said.</p><p>&quot;All the way back to camp.&quot;</p><p>They looked at each other.</p><p>&quot;A pipe,&quot; Pieter said.</p><p>&quot;Eventually. When we have the materials.&quot; Hendrik filled the first cask. &quot;Until then we walk. Once a week. One hour each way — it&#39;s nothing.&quot;</p><p>Bram was lying flat on the rock with his whole arm down the hole trying to determine how deep it was. Nella was watching Anker drink with an expression of complete happiness.</p><p>Margriet stood with her eyes closed, face turned slightly into the cool air coming off the water.</p><p>&quot;Same time next week,&quot; she said.</p>` },
      { heading: "Chapter Four — Bram Goes Missing", content: `<p>The agreement was that Hendrik and Pieter would go. Margriet had been clear about it. The younger ones stayed at camp. Camp was safe. Camp had walls, relative to the jungle, which had none.</p><p>They left at first light.</p><p>They were twenty minutes down the shore when Pieter heard it — a rustle, slightly too rhythmic, slightly too close, keeping pace with them through the undergrowth just inland.</p><p>He glanced at Hendrik.</p><p>Hendrik glanced back.</p><p>They kept walking.</p><p>Five more minutes. The rustle kept up faithfully.</p><p>&quot;Bram.&quot;</p><p>Silence.</p><p>&quot;Bram, we can hear you.&quot;</p><p>A pause. Then Bram emerged from the treeline with a large palm frond over his head, apparently believing this had been a functioning disguise.</p><p>Pieter put his face in his hand.</p><p>&quot;We&#39;re more than halfway,&quot; Hendrik said, more to himself than anyone. He looked back down the trail, then at Bram, calculating. &quot;Turning back now takes as long as going forward.&quot; He pointed at his son. &quot;You stay between us. You touch nothing. You say very little.&quot;</p><p>Bram&#39;s entire face became the sun.</p><p>At the rock, Bram lasted approximately forty-five seconds before drifting toward the water with the casual innocence of someone who definitely did not intend to put their arm in.</p><p>&quot;Bram,&quot; Pieter said.</p><p>&quot;I&#39;m just looking.&quot;</p><p>&quot;Your shoes are off.&quot;</p><p>Bram looked down at his bare feet with what appeared to be genuine surprise. Hendrik&#39;s hand landed on his collar.</p><p>When they came back into camp, Margriet was standing at the edge of the treeline. She&#39;d been crying — recently, and not a little. When she saw Bram between them she made a sound that wasn&#39;t a word and crossed the beach in about four steps and grabbed him by both shoulders.</p><p>&quot;I thought—&quot; She stopped. Looked at his face. Shifted to Hendrik.</p><p>&quot;He followed us,&quot; Hendrik said.</p><p>Margriet looked back at Bram for a long moment.</p><p>&quot;I thought you&#39;d run away,&quot; she said quietly.</p><p>Bram blinked. Genuinely confused, for once. &quot;Where would I go?&quot;</p><p>She pulled him into her arms so hard he made a small oof sound, and didn&#39;t let go for a while.</p>` },
      { heading: "Chapter Five — The Cave", content: `<p>Margriet woke at first light and knew immediately.</p><p>The space beside her where Bram should have been was empty and cold — not just-got-up cold, but gone-a-while cold. She sat up. Canvas ceiling. Gray morning light. Five children. She counted again. Four.</p><p>&quot;Hendrik.&quot;</p><p>He was awake before she finished saying his name.</p><p>They checked the beach first. Nothing. The treeline. Nothing. Pieter ran one way along the shore, Hendrik the other, and Margriet stood at the camp with Nella and Sofie and the musket and tried very hard not to think about what the jungle sounded like at night.</p><p>&quot;He&#39;s fine,&quot; Pieter said when he came back, breathing hard. He said it like he believed it about sixty percent.</p><p>&quot;He&#39;s seven years old,&quot; Margriet said.</p><p>&quot;He&#39;s Bram,&quot; Pieter said. Which was either reassuring or the opposite, depending on how you looked at it.</p><p>Hendrik came back twenty minutes later, said nothing, picked up the second musket, and went into the trees.</p><p>Margriet did not call after him. She sat down on the crate and held Sofie and watched the jungle and did not cry, because crying would have meant something she wasn&#39;t willing to mean yet.</p><p>Nella sat beside her and took her hand and also said nothing. She was six and she understood that some moments didn&#39;t need words.</p><p>They searched for two hours. Hendrik went deep into the trees, moving carefully, calling in a low voice that wouldn&#39;t carry far — he didn&#39;t want to announce himself to whatever else might be listening. Pieter searched the rocks at both ends of the beach. Anker, to his credit, put his nose down and tried seriously this time — no crabs, no distractions — ranging ahead of Hendrik into the undergrowth with his head low and his ears up.</p><p>By the time the sun was properly up, Margriet had cycled through terror, fury, and a cold exhausted calm that was somehow worse than both.</p><p>Then, at the edge of the treeline, crashing and cheerful and absolutely fine —</p><p>Bram.</p><p>He ran straight to his mother, who grabbed him by both shoulders, looked at his face to confirm he had all of it, and then said his full name in a tone that would have silenced a ship.</p><p>&quot;I found something!&quot; he said, before she could continue.</p><p>&quot;Bram—&quot;</p><p>&quot;A house!&quot;</p><p>Everyone stopped.</p><p>&quot;What,&quot; Pieter said.</p><p>&quot;A house. A cave. It&#39;s better than this.&quot; He gestured at the canvas shelter with the diplomacy of someone who had not built it. &quot;It has rooms. Sort of. And a sound.&quot;</p><p>&quot;What kind of sound?&quot; Hendrik said.</p><p>Bram thought about this with unusual seriousness. &quot;A nice one. Like something moving. In the back.&quot;</p><p>Hendrik and Pieter looked at each other.</p><p>&quot;Show us,&quot; Hendrik said.</p><p>Margriet grabbed Bram&#39;s collar before he could dart off. &quot;After breakfast,&quot; she said. &quot;You sit. You eat. And then you explain to me what you were thinking.&quot;</p><p>Bram sat. He ate. His explanation of what he was thinking took approximately two sentences and explained nothing, but he delivered it with such complete confidence that it was hard to stay angry.</p><p>The cave was a twenty-minute walk up the slope behind the beach, half-hidden behind a shelf of rock and a curtain of hanging roots that made it look like nothing from the outside.</p><p>Inside, it opened.</p><p>Not enormous — but enough. The ceiling was high enough for Hendrik to stand without ducking. The floor was dry, flat stone, with a natural indent along one wall that Bram was already calling &quot;my room.&quot; There were two narrow passages leading deeper, one of which curled around and opened onto a small gap in the rock face — fresh air, light, a second way in and out. The other led to the sound.</p><p>They heard it before they saw it: low, constant, living. A thin stream ran along a channel in the back of the cave, dark and cold and clear, disappearing into the rock on one side and emerging from it on the other.</p><p>Hendrik crouched beside it. Dipped his hand. Raised it to his lips.</p><p>He stood up slowly.</p><p>&quot;It&#39;s the same water,&quot; he said. &quot;From the spring. It runs underground.&quot;</p><p>&quot;We wouldn&#39;t have to carry casks anymore,&quot; Pieter said. He paused. &quot;Or build a pipe.&quot;</p><p>&quot;No,&quot; Hendrik said. &quot;The island did it for us.&quot;</p><p>Margriet had been standing in the center of the cave, turning slowly, looking at everything. She ran her hand along the wall — smooth in places, rough in others, dry. She looked at the gap of light from the second passage. She listened to the stream.</p><p>&quot;It doesn&#39;t leak?&quot; she said.</p><p>Hendrik almost smiled. &quot;Not yet.&quot;</p><p>Margriet looked at the wall, the passage, the stream. Let the sounds settle.</p><p>&quot;It&#39;s better than the tent,&quot; she said finally. Not happily yet. But honestly.</p><p>Bram, from inside his claimed indent: &quot;I told you.&quot;</p>` },
      { heading: "Chapter Six — Smooth Walls and Hidden Smoke", content: `<p>They moved in the same day.</p><p>There wasn&#39;t much to move — the crate, the blankets, the muskets, the lanterns, Margriet&#39;s bag, Anker, who walked in like he&#39;d been expecting it. Pieter made three trips. Bram made six, carrying progressively smaller things with progressively greater ceremony.</p><p>The first night in the cave was different from the beach. Quieter. The stone held the warmth of the day and gave it back slowly, and the sound of the stream in the back filled the silence in a way that was, against all expectation, pleasant. Margriet lay awake as she always did, but the thing she was listening to was no longer frightening.</p><p>By now they had a rhythm to feeding themselves. Pieter fished every morning from the rocks — he&#39;d gotten good at it, fast and quiet, rarely coming back empty. Hendrik hunted two or three times a week, ranging deeper into the jungle each time, learning which birds were worth the shot and which weren&#39;t. Margriet had begun drying fish over the hearth and storing it, building a reserve that she counted privately and said nothing about to anyone.</p><p>In the morning, Hendrik stood in the entrance and looked at the walls.</p><p>They were rough. Uneven. In places sharp enough to catch clothing. He ran his hand along a section near the entrance and felt the way the rock bit back.</p><p>&quot;We can do better than this,&quot; he said.</p><p>&quot;How?&quot; Pieter asked.</p><p>&quot;Flat stones. Wet sand. Work.&quot;</p><p>They started that afternoon. Pieter and Hendrik worked the lower sections, grinding flat stones against the rough surface in long strokes, filling the worst gaps with a paste of wet sand and crushed shell that Hendrik had read about somewhere and Pieter had not. It was slow. It was loud. It produced a fine white dust that settled on everything including Anker, who sneezed and then looked personally offended.</p><p>Bram was assigned the job of fetching wet sand from the beach. He took this seriously for approximately four trips, then began building something with the excess sand just inside the entrance that he described as &quot;a fort for Sofie,&quot; and which Sofie regarded with the detached curiosity of someone who had not asked for a fort.</p><p>Nella worked quietly alongside Margriet, doing the sections they could reach — smoothing with smaller stones, patting the paste into cracks with her fingers, occasionally stepping back to assess with the expression of someone who had opinions about interior walls. She did. They were good opinions.</p><p>Margriet said nothing for most of the first day. She worked steadily, methodically, in the way she did everything. But somewhere in the middle of the afternoon, when the entrance wall had gone from jagged grey to something approaching smooth, she stopped and looked at it.</p><p>&quot;It looks like something,&quot; she said.</p><p>&quot;It looks like a wall,&quot; Pieter said.</p><p>&quot;Yes,&quot; she said. &quot;That&#39;s what I mean.&quot;</p><p>By the end of the third day they had finished the main chamber. The walls weren&#39;t perfect — in the lantern light you could still see the lines of the stone underneath — but they were smooth to the touch, pale from the shell paste, almost white in places. Nella had pressed a pattern of small shells into the wet paste along one section before it dried. Nobody told her to. Nobody told her not to.</p><p>Margriet stood in the center of the cave in the evening with a lantern, turning slowly, the same way she had on the first day. But it wasn&#39;t the same look.</p><p>&quot;Hendrik,&quot; she said.</p><p>&quot;Mm.&quot;</p><p>&quot;This is not so bad.&quot;</p><p>He didn&#39;t make a thing of it. &quot;No,&quot; he said. &quot;It isn&#39;t.&quot;</p><p>Bram&#39;s fort had been quietly dismantled by this point, but he had claimed his indent so thoroughly — a blanket, three interesting rocks, a piece of driftwood he was carving into something unidentifiable — that it was simply accepted as his. Even Anker knew not to go in there.</p><p>The fireplace was Hendrik&#39;s idea, though Pieter later claimed he&#39;d thought of it first.</p><p>The problem with fire in a cave was smoke. Hendrik had known this before they started and spent two days studying the cave&#39;s air — holding a burning stick near each passage, watching which way the smoke leaned. The answer wasn&#39;t a shaft straight up through the rock. The answer was the stream wall, near the back where the kitchen would go.</p><p>He built a hood from flat stones fitted over the fire opening — a collector, angled to catch everything that rose. From there, a clay-lined pipe, sections fitted and sealed with shell paste, ran low along the wall, then curved up and forward through the passage toward the entrance. At the entrance it bent again, angled outward and sideways along the outer rock face, ending behind a shelf of stone that broke the smoke apart before it could rise in any direction that pointed back to the cave.</p><p>Pieter did the pipe work. It took six days and more cursing than Margriet officially acknowledged hearing.</p><p>The first time they lit a fire and watched the smoke travel the full length of the pipe and disappear silently behind the rock shelf outside — nothing rising, nothing visible from below — Hendrik stood at the entrance and looked for a long moment.</p><p>&quot;No one would know,&quot; Pieter said.</p><p>&quot;That&#39;s the idea,&quot; Hendrik said.</p><p>Bram made a noise usually reserved for things that exploded.</p><p>The fireplace changed everything. The cave became warm in a different way — intentional, controllable. Margriet cooked over it that first evening, salt fish in the tin pan, and the smell of it filled the whole chamber and drifted gently out through the rock, and it smelled, for the first time, like somewhere people lived.</p><p>After supper, Hendrik spread a large piece of bark on the floor and sat cross-legged in front of it with a piece of charcoal.</p>` },
      { heading: "Chapter Six — Smooth Walls and Hidden Smoke (continued)", content: `<p>&quot;What are you doing?&quot; Nella asked.</p><p>&quot;Planning,&quot; he said.</p><p>They all gathered. Even Sofie, propped against Anker&#39;s side, watched with the serious attention of someone following along.</p><p>Hendrik drew the cave — the main chamber, the two passages, the stream at the back. Then he tapped the center of the room.</p><p>&quot;A table,&quot; he said. &quot;A proper one. Long enough for all of us.&quot;</p><p>&quot;With chairs?&quot; Nella said.</p><p>&quot;With chairs.&quot;</p><p>Margriet looked at the drawing. &quot;Where would the wood come from?&quot;</p><p>&quot;The jungle. There&#39;s good hardwood in there — I&#39;ve seen it. Pieter and I can fell what we need.&quot;</p><p>Bram immediately volunteered to help with the axe. Hendrik wrote his name down on the bark in a column labelled &quot;other jobs,&quot; which Bram accepted without reading closely.</p><p>Then Hendrik moved his charcoal to the back of the cave, where the stream ran.</p><p>&quot;The water&#39;s already here,&quot; he said. &quot;We just need to direct it.&quot; He drew a narrow channel — stone-lined, running from the stream along the back wall to a flat working surface. &quot;A kitchen. Proper stone counters. The water comes in here, drains out there, back into the rock.&quot;</p><p>Margriet leaned forward. &quot;And the cooking?&quot;</p><p>&quot;Two stoves. Stone-built, same as the fireplace. One for heat, one for slow cooking.&quot; He looked up at her. &quot;You tell me what you need and I&#39;ll work out how to build it.&quot;</p><p>She studied the drawing for a long moment. Her finger traced the channel, the counter, the stoves. In Amsterdam she&#39;d had a kitchen with a copper sink and a proper iron range and shelves her mother had painted blue.</p><p>This would be none of those things.</p><p>&quot;The counter needs to be this high,&quot; she said, and held her hand at the right height without hesitating. &quot;And I want two surfaces. One for preparation, one for cooking only. And somewhere to hang things.&quot;</p><p>Hendrik added it all to the drawing without comment.</p><p>Pieter was already doing the calculations in his head — timber, stone, days of work. &quot;This is months,&quot; he said quietly to Hendrik. &quot;And we&#39;ll need real tools. Axes, chisels, an adze at minimum.&quot;</p><p>Hendrik looked at him. Then at the beach, visible through the entrance, where the tide had been depositing things from the wreck for weeks.</p><p>&quot;We haven&#39;t gone through all of it,&quot; he said slowly.</p><p>They went the next morning — all of them — and spent the full day sorting through everything the Aldena had given back. Most of it was ruin. But the Aldena had been a merchant vessel, and her hold had been full.</p><p>Iron fittings. Bolts and brackets by the hundred, still good. A crate of metal stock — bar iron, flat stock, rod — heavy and salt-crusted but solid. And then, wrapped in oilcloth that had done its job perfectly: woodworking tools. A proper hand axe. Two chisels. An adze. A draw knife. A mallet. A set of auger bits.</p><p>Pieter held up the adze and looked at it for a long moment.</p><p>&quot;The ship knew,&quot; Bram said.</p><p>&quot;Ships don&#39;t know things,&quot; Pieter said.</p><p>Bram looked at the tools. Then at the cave up the slope. Then at the sea.</p><p>&quot;This one did,&quot; he said.</p><p>That night, Hendrik sat in front of the bark drawing again. He added to it — measurements now, not just shapes. Real numbers. A real plan.</p><p>Nella looked at it for a long time before she went to sleep.</p><p>&quot;It&#39;s going to be beautiful,&quot; she said to no one in particular.</p><p>Nobody disagreed.</p>` },
      { heading: "Chapter Seven — Building the Dream", content: `<p>They started with the table.</p><p>It took Hendrik and Pieter four days just to fell and rough-cut the timber — a hardwood from deep in the jungle that Hendrik had no name for but which was dense and straight-grained and smelled faintly sweet when the axe bit into it. They dragged the pieces up the slope to the cave in sections, Anker supervising from a comfortable distance.</p><p>Bram helped drag. This was genuine, useful help, and he accepted the compliment Hendrik gave him with unusual quietness, as if he understood that some moments were better received without commentary.</p><p>The joinery took another week. Hendrik worked slowly, measuring twice, cutting once, fitting the joints without nails where he could manage it. Pieter learned by watching and then by doing, making mistakes that Hendrik corrected without making him feel them.</p><p>When it was done — long, solid, level, sanded smooth with flat stone until the surface was almost silky — they stood around it in silence for a moment.</p><p>Then Nella ran her hand along the top and said &quot;oh&quot; very quietly, the way you say something when it&#39;s better than you expected.</p><p>Margriet said nothing. She went and got the tin cup and the two wooden bowls and set them on the table — one at each end, one in the middle — and stood back and looked at them.</p><p>&quot;We need more bowls,&quot; she said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;And cups.&quot;</p><p>&quot;Yes.&quot;</p><p>&quot;Can you make them?&quot;</p><p>Hendrik looked at the draw knife. &quot;Eventually.&quot;</p><p>The chairs came after — simpler than the table, three-legged so they&#39;d sit level on uneven stone, with flat seats that Bram immediately began decorating with a nail until Margriet caught him.</p><p>The kitchen took the longest.</p><p>Pieter spent three days laying the water channel alone — flat stones set in clay, fitted tight enough that the stream ran along it without losing more than a trickle, all the way from the back wall to the work counter. The counter itself was stone slabs set on a base of mortared rock, leveled with painstaking care to exactly the height Margriet had specified.</p><p>She tested it with her hands flat on the surface. Pressed down. Moved her weight.</p><p>&quot;Good,&quot; she said. One word. Pieter felt it like a compliment from a king.</p><p>The stoves were Hendrik&#39;s work — two of them, side by side, built from the same mortared stone, each with a different sized firebox. The large one ran hot and fast. The smaller one held its heat long and low. He had read about the principle somewhere, in a book about cooking in the southern countries, and had carried it in his head for years without ever expecting to need it.</p><p>Margriet stood in front of them the first morning they were finished, looking at the channel bringing water to her left, the two stoves to her right, the counter between them.</p><p>She tied on the length of cloth that served as her apron.</p><p>She lit the small stove.</p><p>She didn&#39;t say anything for a while. She just cooked — slowly, deliberately, in the way she hadn&#39;t been able to cook since Amsterdam — and the smell of it moved through the cave and out the entrance and down toward the beach, and Bram appeared from wherever he&#39;d been within approximately forty seconds.</p><p>&quot;Is that—&quot;</p><p>&quot;Sit down,&quot; Margriet said.</p><p>He sat. For once without argument.</p><p>That evening they ate together at the table, all six of them, with Anker pressed against Bram&#39;s legs hoping for scraps he was absolutely not supposed to give him and absolutely did. The lanterns hung from iron hooks Pieter had hammered into the ceiling. The fireplace sent its smoke quietly away through the pipe. The stream ran in the back, low and constant.</p><p>Margriet looked around the cave — the white walls, Nella&#39;s shells, the table, the kitchen, the two passages leading deeper into the dark — and something in her face did something that wasn&#39;t quite a smile and wasn&#39;t quite crying and was somehow both.</p><p>Hendrik saw it. He didn&#39;t say anything about it.</p><p>After supper, Bram pushed his bowl aside, leaned back in his chair with the confidence of a man who had built everything around him himself, and said:</p><p>&quot;I knew this island was good.&quot;</p><p>Pieter opened his mouth.</p><p>&quot;Don&#39;t,&quot; Hendrik said quietly.</p><p>Pieter closed it.</p><p>Because the thing was — Bram wasn&#39;t wrong.</p>` },
      { heading: "Chapter Eight — The Rain and the Door", content: `<p>The rain came on a Tuesday — or what Pieter had decided was a Tuesday, he&#39;d been keeping count on a piece of bark since the beginning and was reasonably confident — and it did not stop.</p><p>Not that first day, not the second. By the third day it was simply the world&#39;s condition. The jungle was a roar. The beach had turned grey and churned. Even Anker, who had no strong opinions about most things, sat at the cave entrance looking at the water falling from the sky with an expression of personal grievance.</p><p>The stream rose first.</p><p>Slowly, then less slowly. By the fourth day it had climbed two inches up its channel and was beginning to lap over the stone lip onto the kitchen floor. Margriet moved things. She didn&#39;t complain. She moved things to higher ground and looked at the water with the focused expression of someone deciding what to do about it.</p><p>&quot;It&#39;s getting worse,&quot; Pieter said.</p><p>&quot;I can see that,&quot; she said.</p><p>Hendrik was already at the back of the cave, crouching at the stream&#39;s entry point, watching the way it came in. He held his lantern close to the rock.</p><p>&quot;It&#39;s not just the spring,&quot; he said. &quot;There&#39;s more water coming in here than there should be.&quot; He traced the crack in the rock above the stream with his finger. &quot;Rainwater. Running down the slope, finding the same underground path the spring uses.&quot;</p><p>&quot;So we find where it&#39;s getting in,&quot; Pieter said.</p><p>&quot;And we block it.&quot;</p><p>They went out in the rain the next morning — Hendrik, Pieter, and Bram, who had been told to stay and decided that this particular instruction did not apply to outdoor emergencies. They worked up the slope behind the cave, following the rock face, and found it within an hour: a wide depression in the ground just above the cave where rainwater was pooling and funneling straight down through a crack in the rock.</p><p>They packed it with clay. Stones on top, heavy ones, packed tight. More clay. Then a channel dug to redirect the pooling water sideways and away down the slope.</p><p>It took the rest of the day. They came back soaked through and said nothing, and ate supper, and in the morning the stream was lower.</p><p>Margriet looked at it. Then at Hendrik.</p><p>&quot;The outside is still a problem,&quot; she said.</p><p>She was right. The rain sheeted in through the entrance whenever the wind came from the wrong direction, pooling on the stone floor and running toward the kitchen. They&#39;d been piling things on the crate and living with wet feet for a week.</p><p>&quot;A door,&quot; Hendrik said.</p><p>&quot;And something under it,&quot; Margriet said. &quot;High enough to keep the water out.&quot;</p><p>Hendrik looked at the entrance — its width, its height. Then up the slope and into the jungle, where he&#39;d seen something three weeks ago and filed it away in the particular way he had of keeping things.</p><p>&quot;There&#39;s a tree,&quot; he said.</p><p>It took all four of them — Hendrik, Pieter, Bram, and Nella, who turned out to be quietly excellent with a wedge and mallet — two full days to fell it. Six feet across the trunk, the largest tree any of them had ever seen up close. When it came down the sound was enormous and Bram let out a yell that was probably heard on the other side of the island.</p><p>The wood was extraordinary. Dense, reddish, close-grained — it would last for generations if kept dry. And there was so much of it. Hendrik stood beside the fallen trunk with his charcoal and started making a list on bark of everything it could become.</p><p>The threshold came first — a thick slab split from the outer trunk, shaped flat on top and rounded on the bottom to sit solid and tight against the stone floor. Pieter fitted it across the entrance with a mallet, tapping it level until it sat perfectly. Six inches high. Not enough to trip over. Enough to turn a river.</p><p>The door took four more days. Hendrik planed the planks smooth, fitted them edge to edge with a tongue-and-groove joint that Bram watched with his chin in his hands, and hung it on iron pintles hammered into the rock of the entrance frame. It swung cleanly. It sealed tight. When Hendrik closed it the first time and the rain outside became a muffled murmur instead of a roar, Margriet stood in the sudden quiet and closed her eyes for a moment.</p><p>&quot;Oh,&quot; she said.</p><p>Bram opened and closed the door four times immediately.</p><p>&quot;Bram.&quot;</p><p>&quot;I&#39;m testing the hinge.&quot;</p><p>&quot;You&#39;re not.&quot;</p><p>&quot;The second one feels different.&quot;</p><p>&quot;Bram.&quot;</p><p>Bram stopped talking.</p><p>From the rest of the great tree they would make, over the following weeks: a shelf for the kitchen, two more chairs, a small bed frame for Sofie, a workbench for Hendrik, and a set of pegs for hanging things that Margriet had asked for on the very first night of planning and had not forgotten.</p><p>The stump they left where it was. Bram claimed it as a seat. Nobody argued.</p>` },
      { heading: "Chapter Nine — Super Nice", content: `<p>Pieter found the rock by accident.</p><p>He&#39;d been exploring the second passage — the one that curled around to the small gap in the rock face — when his lantern caught something he hadn&#39;t noticed before. A section of the wall that wasn&#39;t wall. A seam. He pressed his hand flat against it and felt the difference immediately — not solid rock behind it, but hollow. Air on the other side.</p><p>He got Hendrik.</p><p>Hendrik pressed his ear to the seam, then his palm, then stepped back and looked at the shape of it. A large flat-faced rock, wedged into a gap in the passage wall, fitted so cleanly by whatever ancient event had put it there that it had looked like part of the cave itself.</p><p>&quot;How big?&quot; Pieter said.</p><p>Hendrik measured with his arms. &quot;Big enough.&quot;</p><p>It took them three days to shift it — levers cut from the jungle hardwood, working slowly, stone grinding against stone — and when it finally moved and the lantern light spilled through, they stood and looked.</p><p>Two chambers. Side by side, separated by a thin spine of natural rock. Not enormous, but enough — each one roughly square, ceilings high enough, floors level. Dry. Quiet. Almost perfectly dark.</p><p>Bram appeared between them in approximately thirty seconds.</p><p>&quot;Bedrooms,&quot; he said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>Bram looked at the one on the left. Then the one on the right. Then back at Hendrik.</p><p>&quot;Which one&#39;s mine?&quot;</p><p>&quot;You share. You and Pieter in one, Nella and Sofie in the other.&quot;</p><p>Bram accepted this with dignity. Then immediately began a perimeter inspection of every crack and crevice in both rooms, moving with his lantern held close to the walls, tapping stones, pressing his face into gaps. Anker followed him for the first two minutes, then apparently decided the inspection was not going to yield anything interesting and went to lie in the main chamber doorway instead.</p><p>They watched him do this for ten full minutes.</p><p>&quot;What is he looking for?&quot; Nella asked.</p><p>&quot;I genuinely don&#39;t know,&quot; Pieter said.</p><p>Bram emerged eventually, satisfied. &quot;Nothing,&quot; he announced.</p><p>&quot;Good,&quot; Margriet said.</p><p>&quot;I checked everything.&quot;</p><p>&quot;I saw.&quot;</p><p>&quot;Even the ceiling.&quot;</p><p>&quot;Bram.&quot;</p><p>He stopped.</p><p>They made the bedrooms, as Bram put it, super nice.</p><p>Smooth walls first — the same shell paste and flat stone work they&#39;d done in the main chamber, both rooms done in a week. Nella did her own room herself, mostly, with Margriet beside her, and pressed a border of small dark stones along the base of the wall at floor height that made it look, in the lantern light, almost like a proper house.</p><p>Bed frames came next — timber from the great tree, simple but solid, raised off the stone floor on short legs. Real sleeping, not just lying on blankets. Margriet made mattresses from canvas stuffed with dried moss and palm fiber that were not comfortable in any way she would have accepted in Amsterdam and which everyone agreed were wonderful.</p><p>Pegs for clothes. A small shelf in each room. An iron hook for a lantern.</p><p>Bram looked at the finished room and said &quot;super nice&quot; with the authority of a man who had coined a phrase and intended to use it.</p><p>It was also Bram who did the floor.</p><p>Not intentionally. He&#39;d been carving — something he did most evenings now, with a small knife and whatever offcuts Hendrik left him — and had produced a flat piece of hardwood, sanded smooth on both sides, about the size of a large book. He set it on the floor of his room to use as a surface for his work.</p><p>It sat perfectly. No wobble, no gap. The fit against the uneven stone was so good it looked intentional.</p><p>He stared at it for a moment.</p><p>Then he went and got Pieter.</p><p>Pieter stared at it.</p><p>Then they both went and got Hendrik.</p><p>Hendrik crouched and pressed the wood flat and looked at the way it sat, and then he looked at the floor, and then he looked up at the passage wall where the great tree&#39;s remaining timber was stacked.</p><p>&quot;The whole floor,&quot; Pieter said slowly.</p><p>&quot;Every room,&quot; Hendrik said.</p><p>&quot;With the big tree planks.&quot;</p><p>&quot;Fitted tight. Sanded flat.&quot;</p><p>They looked at each other.</p><p>Bram, from behind them, with great satisfaction: &quot;Super nice.&quot;</p><p>It took three weeks. Every plank cut, fitted, adjusted, sanded. Tongue-and-groove where they could manage it, tight butt joints where they couldn&#39;t. The great tree gave them just enough — barely, with almost nothing left over — and the last plank in the main chamber went in on a Thursday, or what Pieter&#39;s bark-count said was a Thursday.</p><p>When it was done Margriet walked through every room in bare feet and didn&#39;t say anything for a long time.</p><p>Then she went to the kitchen and made supper and while she cooked she was humming something none of them recognized, low and almost too quiet to hear.</p><p>Hendrik heard it. He sat at the table and listened and said nothing at all.</p>` },
      { heading: "Chapter Ten — The Steam Engine", content: `<p>It started with the cart.</p><p>Pieter had been thinking about it for weeks — the way they walked everywhere, the beach, the spring, the jungle, carrying things on their backs like pack animals. He was fourteen and strong but the principle bothered him. There had to be a better way.</p><p>He built the cart from offcuts and iron fittings in four days. Four wheels, a flat bed, a simple tongue for Anker to pull. It worked — technically. Anker pulled it with the resigned cooperation of an animal who had decided that dignity was overrated. The wheels wobbled. The joints flexed. On the beach it sank into the sand and had to be pushed as much as pulled.</p><p>Pieter looked at it for a long time.</p><p>Then he started thinking about the steam engine.</p><p>He&#39;d read about them — or rather, Hendrik had read about them and described them at supper one evening two years ago in Amsterdam, something about experiments in England, pistons and pressure and heat turning into motion. Pieter had listened with the particular attention he gave to things that seemed impossible but weren&#39;t.</p><p>He said nothing to anyone. He just started working.</p><p>He worked in the second passage — the one that opened to the outside gap — in the evenings after everyone was asleep and on mornings when he woke before the others. He used iron stock from the Aldena&#39;s cargo, hammered and shaped cold since he had no forge, fitted with the obsessive patience of someone who didn&#39;t know he wasn&#39;t supposed to be able to do this. A boiler from bent iron sheet, sealed with lead from a cracked fitting. A piston sleeve. A valve he remade seven times before it seated right.</p><p>Two months.</p><p>The first time he got it running he shut it off in four seconds. The noise bounced off the passage walls like a cannon and the smoke was immediate and thick and he stood in it with his heart going and listened for footsteps from the main chamber.</p><p>None came. Sofie had apparently been crying at exactly the right moment.</p><p>He let out a long breath.</p><p>He needed a proper test. He needed everyone gone.</p><p>The opportunity came on a Thursday.</p><p>&quot;Beach walk,&quot; Margriet announced after breakfast, the way she did every few weeks — all of them, the long walk, down to the far end and back. Good for everyone. Non-negotiable.</p><p>&quot;I think I&#39;ll stay,&quot; Pieter said, not looking up from his bowl.</p><p>Margriet looked at him. He kept his face completely neutral, which was something he&#39;d been practicing.</p><p>&quot;You&#39;re sure?&quot;</p><p>&quot;I have some work I want to finish.&quot;</p><p>She looked at him one moment longer than was comfortable, then let it go. Hendrik said nothing. Bram tried to also stay and was overruled without discussion.</p><p>He waited until their voices had faded completely down the beach path. Then he waited five more minutes.</p><p>Then he ran.</p><p>He had the engine mounted to the cart&#39;s frame in twenty minutes — bolted through, the boiler sitting over a small iron firebox he&#39;d built into the bed. He got the fire going. He watched the pressure. He sat on the cart&#39;s plank seat with his hands on the tiller bar and waited, and the engine began to tick and hiss and build, and the whole thing trembled under him like something coming alive.</p><p>He opened the valve.</p><p>The cart lurched forward so hard he nearly went off the back.</p><p>It was loud. It was smoky. The wheels threw sand in a spray behind him and Anker, tethered nearby, retreated to the maximum extent of his rope and watched with profound alarm.</p><p>Pieter was grinning so hard his face hurt.</p><p>He came down the beach path at a speed that was, in retrospect, probably too fast for a first proper run. The engine clattered and the smoke trailed behind him and he came around the curve of the beach and saw them — all five of them, Margriet and Hendrik and the three children and the distant shape of Anker who had somehow gotten free and followed at a cautious distance.</p><p>They heard him before they saw him.</p><p>The noise came first — mechanical, rhythmic, wrong in every way for a beach — and then the smoke, and then the cart itself coming around the headland fast and loud and entirely unexpected.</p><p>Nella grabbed Margriet&#39;s arm. Bram ran two steps toward the jungle before stopping himself. Margriet stepped in front of Sofie. Hendrik raised his hand in the automatic gesture of a man reaching for a musket he hadn&#39;t brought.</p><p>The cart slowed. Rattled. Stopped ten feet from them in a cloud of steam and woodsmoke.</p><p>A long silence.</p><p>Pieter stood up from the seat, slightly singed, still grinning, and pulled off the cloth he&#39;d tied over his face against the smoke.</p><p>&quot;Hello,&quot; he said.</p><p>Another silence.</p><p>Then Bram made a sound that had no word for it and sprinted the ten feet and climbed onto the cart before it had finished cooling, touching everything, asking seventeen questions simultaneously, none of which waited for an answer.</p><p>Nella walked up slowly and put her hand on the warm iron of the boiler and looked at Pieter with an expression he&#39;d never seen from her before — something like awe, but quieter.</p><p>Margriet had not moved. She stood with Sofie on her hip and looked at the cart, then at Pieter, then at the cart again.</p><p>&quot;Two months,&quot; Hendrik said quietly beside her. It wasn&#39;t a question. He&#39;d noticed the evenings. He&#39;d said nothing.</p><p>&quot;You knew?&quot; Pieter said.</p><p>&quot;I suspected.&quot; Hendrik walked around the cart slowly, looking at the joints, the boiler, the valve assembly. He crouched at the wheel. Stood. Looked at his son.</p><p>He put his hand on Pieter&#39;s shoulder and didn&#39;t say anything for a moment.</p><p>&quot;Get in,&quot; Pieter said. &quot;All of you. I&#39;ll take us home.&quot;</p><p>Margriet looked at the cart. At the smoke still rising from the firebox. At Bram already seated with his arms crossed like a man who had always expected this.</p><p>&quot;If we die,&quot; she said, &quot;I want it on record that I had concerns.&quot;</p><p>&quot;Noted,&quot; Pieter said.</p><p>They all got in.</p>` },
      { heading: "Chapter Eleven — The Feast", content: `<p>It was Nella who found the first one.</p><p>She&#39;d been following Anker — which was generally how discoveries happened on the island, Anker going somewhere with purpose and Nella being the only one patient enough to follow without immediately trying to direct him — up a slope she hadn&#39;t climbed before, east of the cave, where the jungle grew thicker and the ground stayed damp even in dry weather.</p><p>Anker stopped at a vine and sniffed it with great interest.</p><p>Nella looked at what the vine was growing.</p><p>She came back to the cave at a run, which was unusual enough that everyone looked up.</p><p>&quot;Come,&quot; she said. &quot;All of you. Bring the cart.&quot;</p><p>The melon was the size of Bram&#39;s torso. Dark green, heavy, sitting in a nest of vine and broad leaves like it had been put there deliberately. And it wasn&#39;t alone — the slope was covered in them, dozens, some still growing, some so ripe the skin had begun to split and the smell coming off them was extraordinary, sweet and dense and entirely unexpected in a way that made Margriet stop walking and simply breathe for a moment.</p><p>Bram had already picked one up.</p><p>&quot;Put it down,&quot; Pieter said.</p><p>&quot;I&#39;m just—&quot;</p><p>&quot;We don&#39;t know what it is yet.&quot;</p><p>&quot;It&#39;s a melon.&quot;</p><p>&quot;We don&#39;t know that.&quot;</p><p>Hendrik crouched beside one and pressed it, smelled it, took his knife and cut a small piece from the split one on the ground. He tasted it.</p><p>His face did the thing it did when something was better than expected.</p><p>&quot;It&#39;s a melon,&quot; he said.</p><p>Bram looked at Pieter.</p><p>&quot;Don&#39;t,&quot; Hendrik said.</p><p>They spent the whole morning on the slope. The cart made four trips down to the cave, loaded past sensible capacity each time, Pieter managing the engine at a crawl while the others walked alongside steadying the load. They found, besides the melons: three kinds of fruit none of them had names for, two of which were excellent and one of which Bram ate too much of and didn&#39;t discuss afterward; a tree whose fruit was small and red and so sweet it made Nella&#39;s eyes go wide; and a grove of something tall and feathery that Hendrik said he believed was a kind of wild sugar cane and would require more investigation. The coconut palms they already knew — they grew everywhere there were palms, along the beach and up the slopes, and had been providing drinking water and flesh since the first week, though nobody had thought to mention this because it had simply become part of how the island worked.</p><p>By midday the cave table was covered. Fruit piled on fruit, colors none of them had seen since Amsterdam — deep orange, bright yellow, red, green.</p><p>Margriet stood at the kitchen counter and looked at it all and then did something none of them had seen her do in a long time.</p><p>She laughed.</p><p>Not a polite laugh. A real one, sudden and genuine, her hand going to her mouth a second too late. She looked at Hendrik, who was watching her, and laughed again.</p><p>&quot;We are not going hungry,&quot; she said.</p><p>&quot;No,&quot; he said. &quot;We are not.&quot;</p><p>The party was Nella&#39;s idea and she announced it with unusual firmness for a six-year-old: they were having a feast, tonight, outside, on the beach, and everyone would help.</p><p>Nobody argued with her.</p><p>Pieter drove the cart down to the beach and they set the table — the actual table, carried down between them — in the sand above the tideline. Margriet cooked things she hadn&#39;t been able to cook in months, fruit sliced and roasted over the fire they built on the beach, the melon cut open revealing deep orange flesh that Bram ate so much of that Pieter lost count. Nella arranged everything on the table with the careful attention of someone planning something beautiful, and it was.</p><p>The sun went down while they were eating. The stars came out — the same impossible quantity they&#39;d seen on the first night, but it was different now. Then they&#39;d been cold and frightened and the stars had been something to look up at and endure. Now they were just beautiful.</p><p>Sofie, nearly two now and very interested in melon, sat in Margriet&#39;s lap and ate with both hands and had opinions about it.</p><p>Bram challenged Pieter to a melon-throwing contest that was shut down before it properly started.</p><p>Anker received more food than he was supposed to receive and pretended not to notice that everyone knew.</p><p>Hendrik sat at the end of the table and looked at his family in the firelight — Margriet laughing at something Nella had said, Pieter shaking his head at Bram, Sofie sticky and content — and didn&#39;t say anything for a long time.</p><p>Then he raised his tin cup.</p><p>&quot;To the Aldena,&quot; he said quietly.</p><p>They raised theirs. Even Bram, without a joke.</p><p>&quot;To the Aldena,&quot; they said.</p><p>The sea came in and went out. The fire crackled. The island was, as it had always been, entirely indifferent to all of them — and somehow, because of that, entirely theirs.</p>` },
      { heading: "Chapter Twelve — The Amsterdam House", content: `<p>Hendrik said it at supper, the way he said things that had been sitting in his mind for a long time — quietly, without preamble.</p><p>&quot;If something happened to the cave, we&#39;d have nothing.&quot;</p><p>Nobody answered immediately. They all knew he was right.</p><p>&quot;Fire,&quot; Pieter said.</p><p>&quot;A rock fall,&quot; Hendrik said. &quot;A flood worse than the last one. Anything.&quot;</p><p>Margriet set down her cup. &quot;So we build somewhere else.&quot;</p><p>&quot;A second home. Somewhere completely separate. Somewhere no one could find.&quot;</p><p>They looked at each other around the table — the wooden floor, the smooth white walls, the kitchen with its running water, all the months of work around them.</p><p>&quot;Where?&quot; Pieter said.</p><p>Hendrik had already been thinking about it. There was a place — he&#39;d passed near it twice on jungle walks and turned back both times because the undergrowth was impenetrable. The center of the island, where the trees grew so dense and so tall that the canopy closed over completely and the ground beneath was dim even at midday. He&#39;d never gotten through. But he&#39;d seen enough to know that in the middle of it, if you could reach it, there would be space. Trees that old and that large didn&#39;t grow with nothing between them.</p><p>It took them four days just to find a way in.</p><p>Not a path — the jungle didn&#39;t offer paths. A route. Memorized, marked only in their heads: third big tree left, then straight until the double-trunk, then right where the ground dips, then through the gap that looks like wall but isn&#39;t. Bram learned it in two passes. Nella wrote it down in her own private marks on a piece of bark that she kept in her room.</p><p>Nobody else would ever find it. The trees were too close, too tall, too tangled. From ten feet away in any direction the center was invisible.</p><p>But the center existed. And it was extraordinary — a natural clearing ringed by the great trunks, canopy high overhead, ground carpeted in soft growth, quiet in a way the beach never was. Large enough for a house. Private in a way that felt absolute.</p><p>Hendrik stood in the middle of it and turned slowly.</p><p>&quot;Here,&quot; he said.</p><p>They built it like Amsterdam.</p><p>Not because they were homesick — or not only because of that — but because they knew how. Hendrik had grown up watching houses go up along the canals, had absorbed without knowing it the proportions and the logic, the steep rooflines to shed rain, the large windows to pull in light, the narrow frontage and the depth behind. He drew it on bark, revised it, drew it again.</p><p>Timber from the jungle, the same dense hardwood they&#39;d used for the floors. Proper framing — posts and beams, mortise and tenon, fitted without nails where the joint could carry the load. The walls went up in panels, planked and tight, sealed with clay and palm fiber against the rain.</p><p>The roof was the hardest part. Steep-pitched, the way Amsterdam roofs were steep-pitched, because Hendrik said flat roofs in this climate were an invitation to disaster. They split shingles from the hardwood and laid them in overlapping rows, starting at the eaves and working up. Pieter did the ridge and came down with sap in his hair and a look of pure satisfaction.</p><p>Two floors. The lower for living — a main room, a kitchen roughed in, a hearth with its own smoke pipe running up through the upper floor and out through the roof peak. The upper for sleeping, reached by a ladder that Bram immediately used as a gymnasium until Margriet told him to stop.</p><p>The windows were unglazed — they had no glass — but shuttered with fitted panels that opened outward on iron pintles. When they were open, light came in at angles through the canopy above, dappled and shifting, better than any Amsterdam window.</p><p>When it was done they stood in the clearing and looked at it.</p><p>It was not exactly an Amsterdam house. The proportions were close, the logic was right, but the materials were wrong and the jungle pressed in from all sides and the canopy filtered the light in a way that no canal ever had. It was something else — something that was Amsterdam and the island at the same time, neither one fully, both at once.</p><p>Nella stood in front of it for a long time.</p><p>&quot;It looks like home,&quot; she said finally. &quot;But different.&quot;</p><p>&quot;Both,&quot; Margriet said.</p><p>&quot;Yes,&quot; Nella said. &quot;Both.&quot;</p><p>Bram had already gone inside. They heard him on the upper floor, testing the boards, moving from room to room. Anker went in after him, got halfway up the ladder, reconsidered, and came back down with the careful dignity of a dog pretending the ladder had never interested him.</p><p>&quot;Super nice!&quot; he called down.</p><p>Margriet looked at Hendrik.</p><p>Something in Hendrik&#39;s face shifted — not quite a smile, but close.</p><p>&quot;Super nice,&quot; he agreed.</p>` },
      { heading: "Chapter Thirteen — The Veldt-Hoen", content: `<p>It started the way most things started with Bram — without warning and without a clear explanation of how it had happened.</p><p>One morning Pieter came back from fishing to find Margriet standing at the cave entrance with her arms crossed and Nella sitting on the stump watching the jungle path with the focused attention of someone waiting for something specific.</p><p>&quot;Where&#39;s Bram?&quot; Pieter said.</p><p>&quot;That,&quot; Margriet said, &quot;is the question.&quot;</p><p>He&#39;d been there at breakfast. He&#39;d eaten his portion and Sofie&#39;s leftover piece of dried fish and then — at some point between the meal ending and Pieter leaving for the rocks — he had simply ceased to be present.</p><p>Hendrik was already at the treeline.</p><p>&quot;How long?&quot; Pieter said.</p><p>&quot;An hour. Maybe more.&quot;</p><p>Pieter set down his fish.</p><p>They found him twenty minutes up a slope none of them had explored, standing completely still in a small clearing with his arms at his sides and an expression of concentrated calm that looked entirely wrong on his face.</p><p>In front of him, approximately three feet away, was a bird.</p><p>Anker was sitting six feet behind Bram, also completely still, watching the bird with an expression of intense professional interest. He had, apparently, made the same decision Bram had — that stillness was required — and was honoring it with unusual discipline.</p><p>It was the size of a large chicken — reddish-brown, round-bodied, with a small neat head and bright amber eyes that were regarding Bram with what appeared to be mild curiosity rather than alarm. It stood on one foot. It did not move.</p><p>Behind it, half-visible in the undergrowth, were more. A lot more.</p><p>&quot;Bram,&quot; Hendrik said very quietly.</p><p>&quot;I know,&quot; Bram whispered back, not moving. &quot;I found them.&quot;</p><p>&quot;How long have you been standing there?&quot;</p><p>&quot;Since I found them.&quot;</p><p>Pieter looked at the birds. The birds looked back. None of them fled. None of them so much as ruffled a feather. The one in front of Bram tilted its head slightly and then set its foot back down with the composure of an animal that had never in its life had a reason to be afraid.</p><p>&quot;They&#39;ve never seen people,&quot; Nella said softly, from just behind Pieter.</p><p>&quot;No,&quot; Hendrik said.</p><p>Bram, very slowly, crouched down. The bird watched him do it. He extended his hand, palm up, fingers flat.</p><p>The bird walked forward and stood on it.</p><p>Bram looked up at his family with an expression that needed no words.</p><p>They spent the rest of the morning in the clearing. The veldt-hoen — which was what Hendrik called them, reaching for a Dutch word that was close enough — moved around them freely, investigating boots and fingers and the hem of Margriet&#39;s apron with calm thoroughness. Sofie, set down on the ground, was approached by two of them simultaneously and responded by trying to grab one, which stepped neatly aside and went back to whatever it had been doing.</p><p>There were perhaps forty of them. Maybe more deeper in the brush.</p><p>&quot;We could bring some back,&quot; Pieter said.</p><p>&quot;Eggs,&quot; Margriet said immediately.</p><p>&quot;Meat eventually,&quot; Hendrik said. &quot;But the eggs first. If we&#39;re careful.&quot;</p><p>&quot;We can&#39;t scare them,&quot; Nella said. &quot;If we scare them we lose them. They&#39;d never trust people again.&quot;</p><p>&quot;So we don&#39;t scare them,&quot; Bram said, with the authority of someone who had already stood motionless in a clearing for an unknown period of time and considered this his area of expertise.</p><p>They loaded the cart carefully — six birds, chosen because they were the ones that had wandered closest and shown the least interest in leaving. No chasing, no grabbing. Bram simply held open a section of the cart bed with a piece of canvas forming a low shelter, and waited, and four of the six climbed in of their own accord. The other two were lifted gently, one by Nella, one by Hendrik, and set inside without protest.</p><p>The birds rode back to the cave in the cart like passengers who had decided this was acceptable. Anker rode on the back of the cart and spent the entire journey pretending he was not watching the birds with every fiber of his being.</p><p>The coop took four days and was, by any measure, too large.</p><p>Pieter pointed this out on the second day.</p><p>&quot;We have six birds,&quot; he said.</p><p>&quot;For now,&quot; Bram said, not looking up from the post he was sinking.</p><p>&quot;This fits forty.&quot;</p><p>&quot;They might bring friends.&quot;</p><p>&quot;Birds don&#39;t bring—&quot;</p><p>&quot;We want them to feel comfortable,&quot; Nella said, from the other side of the frame, in the tone that ended discussions. &quot;They&#39;ve never been kept before. It needs to feel like nothing changed.&quot;</p><p>Pieter looked at the coop. Then at Nella.</p><p>&quot;Fine,&quot; he said.</p><p>The floor was deep with dry palm fronds. The roosts were smooth, sanded, set at heights that Bram had determined by watching where the birds preferred to stand. There were three separate sections that opened to a wide outdoor run, fenced loosely enough that any bird that truly wanted to leave could have found a way — but none of them did.</p><p>By the end of the first week there were nine eggs.</p><p>Margriet held one in her palm and looked at it for a moment.</p><p>Then she went into the kitchen, and for the first time in months, she made something that wasn&#39;t fish.</p>` },
      { heading: "Chapter Fourteen — The First Ship", content: `<p>The shape on the horizon was Pieter&#39;s to see first.</p><p>He&#39;d been on the rocks for his morning fishing when something on the horizon caught his eye — not a cloud, not a bird. A shape. He watched it for ten minutes before he was sure, then left the fish and ran.</p><p>&quot;Ship,&quot; he said in the cave entrance, still breathing hard.</p><p>Everyone moved at once.</p><p>They watched from the treeline above the beach — far enough back that they&#39;d be invisible, close enough to see. Hendrik had both muskets. Nobody spoke.</p><p>The ship was a two-masted merchant vessel, not large, sitting high in the water — not heavily loaded. It was moving slowly along the island&#39;s coast, not with the purposeful speed of a ship on course but with the careful, searching pace of something looking.</p><p>&quot;Not military,&quot; Pieter said quietly.</p><p>&quot;No,&quot; Hendrik said.</p><p>&quot;No flag of trouble,&quot; Margriet said.</p><p>They watched longer. The crew moved normally on deck — no tension, no weapons visible, no sign of the particular disorder that follows a mutiny. A man at the bow was scanning the shore with a long glass.</p><p>Hendrik lowered the muskets.</p><p>&quot;We go out,&quot; he said.</p><p>&quot;Are you sure?&quot; Margriet said.</p><p>&quot;They&#39;re looking for something. And they look like people who need help finding it.&quot;</p><p>Pieter took the cart down to the beach. They walked out together — all of them, even Sofie on Margriet&#39;s hip — into the open, onto the sand, visible.</p><p>The man with the long glass found them almost immediately.</p><p>There was a long pause on the ship. Then a great deal of activity.</p><p>The longboat came ashore twenty minutes later with four men, the captain among them — a compact Dutchman named Verhoef with a weathered face and an expression of profound relief that he was visibly trying to keep professional.</p><p>He looked at the family on the beach. At the cave entrance up the slope. At the cart, which he regarded with open confusion.</p><p>&quot;We have been looking,&quot; he said in Dutch, &quot;for the Aldena.&quot;</p><p>&quot;She&#39;s there,&quot; Hendrik said, and nodded toward the shallows where the wreck was still partially visible at low tide.</p><p>Verhoef looked. His face did something complicated.</p><p>&quot;And the crew?&quot;</p><p>A silence.</p><p>&quot;Three are buried above the treeline,&quot; Hendrik said. &quot;The others the sea kept. They gave us the longboat. All of them.&quot;</p><p>Verhoef removed his hat.</p><p>&quot;And you are the Voss family,&quot; he said. It wasn&#39;t quite a question.</p><p>&quot;Yes.&quot;</p><p>The captain looked at them — all six, Anker sitting at Bram&#39;s feet, the cave behind them, the cart, the island — and something in his professional composure finally gave way.</p><p>&quot;We thought you were dead,&quot; he said. &quot;All of you. For nearly two years.&quot;</p><p>They gave the visitors the cave.</p><p>Margriet had prepared it without a word of discussion — fresh fronds on the beds, food on the table, water running in the kitchen. Verhoef and his three men stood in the main chamber and looked at the wooden floors, the smooth white walls, Nella&#39;s shell border, the kitchen with its stone stoves and running water channel, and said nothing for a moment.</p><p>&quot;You built this,&quot; Verhoef said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;In two years.&quot;</p><p>&quot;We had good materials.&quot;</p><p>The captain looked at the cave with an expression Hendrik recognized — the same one he&#39;d seen on Margriet&#39;s face, months ago, the night the kitchen was finished. The expression of something being better than expected.</p><p>&quot;Sleep well,&quot; Hendrik said. &quot;We&#39;ll talk in the morning.&quot;</p><p>The family walked up the slope and into the jungle, through the route only they knew, and came out

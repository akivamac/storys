 in the clearing where the Amsterdam house stood quiet in the canopy light. They ate supper at that table instead, and the children slept in those beds, and Margriet sat by the window for a while listening to the jungle before she came to bed.</p><p>&quot;They&#39;ll ask tomorrow,&quot; she said to Hendrik in the dark.</p><p>&quot;Yes,&quot; he said.</p><p>&quot;What will we say?&quot;</p><p>He didn&#39;t answer immediately.</p>` },
      { heading: "Chapter Fourteen — The First Ship (continued)", content: `<p>&quot;We&#39;ll decide together,&quot; he said. &quot;In the morning.&quot;</p><p>In the morning, Verhoef asked.</p><p>He asked carefully, the way a man asks a question when he already suspects the answer — standing in the cave entrance with his cup of coffee that Margriet had made from roasted grain, looking at the beach, the trees, the cart, the island laid out golden in the early light.</p><p>&quot;We can take you home,&quot; he said. &quot;All of you. There&#39;s room.&quot;</p><p>Hendrik looked at Margriet. She looked back.</p><p>&quot;Give us a moment,&quot; he said.</p><p>They walked up the slope — just the two of them — far enough that they couldn&#39;t be heard.</p><p>Margriet spoke first.</p><p>&quot;Amsterdam,&quot; she said. Trying the word out. Seeing how it felt.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;The canal house. The market. My mother&#39;s kitchen.&quot;</p><p>&quot;Yes.&quot;</p><p>The wind moved through the trees above them.</p><p>&quot;And this?&quot; she said.</p><p>Hendrik looked at the island around them. Two years of it. The floors, the stoves, the veldt-hoen, the fruit slope, the secret house in the clearing. The graves above the tideline.</p><p>&quot;And this,&quot; he said.</p><p>Another silence.</p><p>&quot;The children?&quot; Margriet said.</p><p>They already knew. They&#39;d seen it in Bram&#39;s face at breakfast when Pieter had told him what the question would be — not the wild excitement of a boy who wanted adventure, but something quieter. Contentment, interrupted and then reasserted. Nella had said nothing and gone to check on the veldt-hoen.</p><p>&quot;I think we know,&quot; Hendrik said.</p><p>Margriet nodded slowly. Then she almost laughed.</p><p>&quot;My mother is going to be furious,&quot; she said.</p><p>&quot;Yes,&quot; Hendrik said. &quot;She is.&quot;</p><p>They went back down and told Verhoef.</p><p>He listened without surprise. He nodded once, slowly.</p><p>&quot;I thought so,&quot; he said. He looked around the cave again. &quot;I thought so when I saw the floor.&quot;</p><p>&quot;If people want to find us,&quot; Hendrik said, &quot;they can. We&#39;re not hiding. You know where the island is. You know we&#39;re here.&quot;</p><p>&quot;And if they come?&quot;</p><p>Hendrik looked at Margriet.</p><p>&quot;Then we&#39;ll feed them,&quot; she said. &quot;And give them somewhere to sleep.&quot;</p><p>Verhoef looked at the cave. At the kitchen. At the table long enough for six, and more if needed.</p><p>He raised his coffee cup.</p><p>&quot;I&#39;ll be back,&quot; he said. &quot;In the spring, if the wind is right.&quot;</p><p>&quot;We&#39;ll be here,&quot; Hendrik said.</p><p>They stood on the beach and watched the ship until it was a shape on the horizon and then nothing.</p><p>Bram was the first to speak.</p><p>&quot;So we&#39;re staying,&quot; he said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>Bram nodded with the satisfaction of a man whose opinion had been vindicated at every turn.</p><p>&quot;Good,&quot; he said. &quot;I already told the veldt-hoen.&quot;</p><p>Nobody asked what that meant.</p><p>They walked back up the slope, all six of them and Anker, and the island closed around them the way it always did — green and warm and entirely indifferent — and entirely theirs.</p>` },
      { heading: "Chapter Fifteen — Hiding the Cave", content: `<p>Hendrik noticed it first — standing on the beach the morning after Verhoef&#39;s ship disappeared, looking back up the slope.</p><p>&quot;You can see it,&quot; he said.</p><p>Pieter looked. He was right. The cave entrance was visible from the beach — not obviously, not unless you knew what you were looking for, but Verhoef&#39;s men had known where to look and now that Hendrik saw it he couldn&#39;t unsee it. A dark opening in the rock face, partially screened by the hanging roots but not enough. Not for strangers.</p><p>&quot;We need trees,&quot; Hendrik said.</p><p>The transplanting took two weeks.</p><p>The engine made it possible — Pieter rigged a pulling harness to the cart&#39;s drive mechanism, running a rope from the axle through a block and tackle mounted on a timber frame. It gave them more force than four men pulling, and they needed it. The trees they chose were young but substantial, five and six feet tall, with root balls the size of barrels.</p><p>Bram dug. He was, it turned out, an exceptional digger — low to the ground, tireless, treating each root ball with the focused care of someone who understood what they were asking the tree to do. Anker supervised from a short distance, occasionally sniffing the exposed root balls with great seriousness, which Bram chose to interpret as encouragement.</p><p>&quot;You have to keep as many roots as you can,&quot; Nella told him.</p><p>&quot;I know,&quot; Bram said, not looking up.</p><p>&quot;If you cut too many—&quot;</p><p>&quot;I know, Nella.&quot;</p><p>She watched him work for a moment.</p><p>&quot;You&#39;re doing it right,&quot; she said.</p><p>Bram said nothing, but his shoulders moved in a way that meant he&#39;d heard.</p><p>They planted nine trees across the slope in a loose, natural-looking line — not a row, nothing that looked deliberate, just the kind of growth that might happen on its own over years. Between them they filled in with transplanted shrubs and fast-growing ferns that Margriet selected from deeper in the jungle, chosen for their size and their habit of spreading.</p><p>When it was done they walked down to the waterline and turned around.</p><p>The cave was gone. Not hidden exactly — more as if it had never been a feature worth noticing. The slope looked like slope. The trees looked like trees. The entrance, if you stood at the right angle in the right light, was a shadow among shadows.</p><p>&quot;Good,&quot; Hendrik said.</p><p>Bram looked at the trees he&#39;d dug and replanted and tended for two weeks, standing in their new places on the slope.</p><p>&quot;Water them,&quot; Nella said.</p><p>&quot;I was going to,&quot; Bram said.</p><p>The houses came next — or the planning of them, which with Hendrik always preceded the building by long enough to get it right.</p><p>He walked the beach from one end to the other twice, measuring his paces, looking at the ground above the tideline. Then he sat on the stump and drew on bark.</p><p>Six houses, arranged in a circle around an open courtyard. Not small — proper houses, two rooms each with sleeping lofts above, wide shuttered windows, deep covered porches facing inward toward the courtyard. Generous enough that a family could stay comfortably for weeks. The courtyard at the center would have a fire pit and room enough for long tables when the weather was good, which on this side of the island was almost always.</p><p>One of the six would be larger than the rest — the house the Voss family would appear to live in. It needed to be convincing: Margriet&#39;s things in the kitchen, Hendrik&#39;s tools on the workbench, the children&#39;s belongings in the lofts. A real home, lived-in and warm, the kind that makes visitors feel they&#39;ve arrived somewhere rather than somewhere temporary.</p><p>&quot;We actually have to furnish it,&quot; Pieter said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;Properly.&quot;</p><p>&quot;Properly.&quot;</p><p>Bram looked at the drawing. &quot;Which one&#39;s ours?&quot;</p><p>Hendrik pointed to the largest, set slightly forward from the circle, facing the sea.</p><p>Bram nodded with the satisfaction of someone approving a decision he&#39;d had no part in making.</p><p>&quot;And the water?&quot; Pieter said.</p><p>&quot;The spring walk,&quot; Hendrik said. &quot;When visitors are here, we do it the old way. Casks, weekly, the same as before.&quot;</p><p>&quot;They&#39;d never know the cave has a stream,&quot; Pieter said.</p><p>&quot;They&#39;d never know the cave exists.&quot;</p><p>&quot;And if they ask where we live?&quot;</p><p>Hendrik tapped the largest house on the drawing.</p><p>&quot;We live on the beach,&quot; he said. &quot;Same as them.&quot;</p><p>Margriet, who had been listening from the entrance above, said nothing. She looked at the beach, at the slope, at the invisible dark that had been their home for two years.</p><p>Then she went inside and started supper, and the smell of it moved through the hidden passage and out the smoke pipe and dispersed into the evening air without giving anything away at all.</p>` },
      { heading: "Chapter Sixteen — The Village", content: `<p>They built the courtyard first.</p><p>Hendrik&#39;s reasoning was simple: the courtyard was the heart of it, and if the heart was wrong, everything around it would be wrong. They cleared the ground above the tideline, leveled it, and laid a floor of flat beach stones fitted tight — not perfectly smooth, not the cave&#39;s sanded hardwood, but solid and clean and honest in the way that stone is honest. A fire pit at the center, ringed with mortared rock, deep enough to hold a serious fire. Four timber posts at the corners of the space, already cut and waiting, for the shade canopy they&#39;d add later.</p><p>When the courtyard was done it already felt like somewhere. They sat in it that evening and ate supper in the open air and Bram declared it excellent before the houses had even started. Anker lay in the center of the courtyard stone floor with his chin on his paws, apparently having decided this was now his spot, a position he would defend for years.</p><p>The houses went up one at a time, starting with the family&#39;s.</p><p>The frame was the same technique as the jungle house — mortise and tenon, dense hardwood, fitted without shortcuts. But the beach house was bigger, and Hendrik had been thinking about it long enough to have opinions he hadn&#39;t had the first time. The porches were deep and covered, facing the courtyard, with low railings that Pieter shaped smooth enough to sit on. The shutters were double — an outer panel against weather and an inner screen of split cane against insects, both hung on iron pintles, both fitted so cleanly they swung without catching.</p><p>The walls inside got the same treatment as the cave: shell paste, flat stone, worked until smooth and pale. Nella did the family house herself this time, almost entirely, with only Margriet working alongside her on the sections she couldn&#39;t reach. She pressed a thin border of dark stones along the base of every wall, the same as her bedroom in the cave, running continuous through every room like a signature.</p><p>The floors were hardwood — they had enough timber from the jungle by now, and Pieter had gotten fast at the fitting. Three days per house. Clean, tight, sanded flat.</p><p>Margriet designed the kitchens. Each one had a stone counter, a hearth, a water cask fitted into a frame above the work surface so it could be filled from the top and drawn from a spigot below — not running water, not the cave&#39;s stream, but the next best thing, tidy and practical. She specified the counter height. She specified where the pegs went. She specified the shelf above the hearth with the particular firmness of someone who had thought about shelves for two years and was not going to get it wrong now.</p><p>The water itself was Pieter&#39;s solution. He built a tank from iron stock and timber — forty gallons, banded tight, sealed with pine resin — and mounted it on the cart bed on a frame that kept it level on uneven ground. Once a week they drove it up to the spring, filled it by hand with the casks, and drove it back. One trip. Forty gallons. Enough to keep all six houses supplied and their visitors none the wiser about where the water actually came from. Bram named the tank the Admiral, for reasons he explained at length and that nobody fully followed.</p><p>Bram built the beds.</p><p>Not alone — Pieter helped with the joinery — but Bram had developed a particular feeling for beds over the months of building his own and adjusting it and re-adjusting it, and he knew what made them right. Each one raised off the floor on short legs. Each one with a headboard shaped from a single wide plank, smooth on the face, slightly curved at the top. Each one sized for two, because you never knew.</p><p>He sanded them himself, every surface, until the wood had the quality of something old and cared-for.</p><p>&quot;They&#39;re good,&quot; Pieter said, looking at the one in the second guest house.</p><p>Bram ran his hand along the headboard. &quot;They&#39;re better than good,&quot; he said, without any particular boastfulness. Just as a fact.</p><p>He was right.</p><p>It took four months.</p><p>By the end, all six houses stood around the courtyard, each one finished, each one furnished, each one with its hearth swept and its shutters oiled and its bed made up with canvas and dried-grass mattresses that were — as everyone agreed without saying so — more comfortable than they had any right to be.</p><p>The family&#39;s house had Margriet&#39;s blue tin on the kitchen shelf, the one that had come ashore from the Aldena and still held its dented shape. It had Hendrik&#39;s reading board on the table, his charcoal in a cup, a half-finished drawing that looked like it was meant to stay unfinished. Sofie&#39;s small wooden horse sat on the bedroom windowsill. Bram&#39;s boots were by the door.</p><p>It looked lived-in because in certain ways it was. They slept there on the nights when the cave felt too much like hiding, and those nights were becoming more frequent — not because the cave had changed, but because the beach house was genuinely good, and goodness was worth spending time in.</p><p>Margriet stood in the courtyard on the evening it was finished, turning slowly, looking at the circle of houses around her — the porches, the firelight coming from two of the open doorways, the stone floor underfoot, the sound of the sea just beyond.</p><p>&quot;It&#39;s a village,&quot; Nella said from beside her.</p><p>&quot;Yes,&quot; Margriet said.</p><p>&quot;Our village.&quot;</p><p>Margriet looked at her daughter — six years old when they&#39;d arrived, nearly nine now, standing in the firelight with her arms crossed and the expression of someone who had helped build everything she was looking at.</p><p>&quot;Yes,&quot; Margriet said again. &quot;Ours.&quot;</p>` },
      { heading: "Chapter Seventeen — The Grandparents", content: `<p>Two ships this time — Pieter spotted them from the courtyard before dawn, checking the Admiral&#39;s seal after a hard rain, and stood watching for a full minute before he went to get Hendrik.</p><p>&quot;Two hours,&quot; Hendrik said, standing at the waterline, watching through the long glass they&#39;d salvaged from the Aldena&#39;s wreck. &quot;Maybe a little more. She&#39;s making slow progress.&quot;</p><p>&quot;The cave,&quot; Margriet said immediately.</p><p>&quot;Yes.&quot;</p><p>They looked at each other. Then at the courtyard behind them — the swept stone, the oiled shutters, the six houses standing exactly as intended. Visitors&#39; houses. Built to receive people.</p><p>But the fire pit was cold. The family&#39;s house had that particular stillness of a place not quite lived-in enough. The kitchen showed no morning&#39;s work. The courtyard had no smells of breakfast, no small signs of a family going about its day.</p><p>&quot;It needs to look like we&#39;ve been here for weeks,&quot; Pieter said.</p><p>&quot;An hour and a half,&quot; Hendrik said. &quot;Go.&quot;</p><p>They moved like a mechanism, each one knowing their part without discussion.</p><p>Pieter got the fire going in the courtyard pit and in the family house hearth both — real fires, built deep, the kind that take time and mean something. Margriet went straight to the kitchen and started cooking, not for eating but for smelling: fish on the stove, grain roasting, the smell of a house that feeds people. Nella scattered fresh fronds on the courtyard floor between the stones in the casual way of somewhere lived-in, not decorated. She moved Sofie&#39;s toys to the porch. She left a cup on the courtyard table with a little water in the bottom.</p><p>Bram did the boots. He had an instinct for this — he arranged three pairs of boots and two pairs of smaller shoes by the family house door in the exact configuration of people who hadn&#39;t thought about it. He hung a damp cloth on the porch railing. He left a half-carved piece of wood on the step with a knife beside it, blade closed.</p><p>Hendrik set his tools out on the workbench. Not neatly. The way a man leaves tools when he intends to come back to them.</p><p>An hour passed. The ship was closer now, close enough to see figures on deck.</p><p>Pieter brought the cart round to the side of the house and parked the Admiral with the easy familiarity of something used every week. He left muddy footprints on the courtyard stones from a morning that hadn&#39;t happened.</p><p>Margriet stepped back from the kitchen and looked at the courtyard.</p><p>It looked like morning. It looked like a family who had been here for years and expected to be here for years more.</p><p>&quot;Thirty minutes,&quot; Pieter said.</p><p>&quot;Sit down,&quot; Margriet said. &quot;Everyone. Act like it&#39;s Tuesday.&quot;</p><p>They sat. Sofie, who had no concept of acting, simply sat and ate a piece of melon. Anker lay on the porch in the sun. The fires crackled. The smell of roasting grain drifted across the courtyard.</p><p>The longboat came through the light morning swell with five figures in it: Captain Verhoef at the stern, two of his men rowing, and two more passengers in the bow.</p><p>Pieter shaded his eyes.</p><p>Then he stood up very slowly from his chair.</p><p>&quot;Mama,&quot; he said.</p><p>Margriet was already standing. She&#39;d seen them.</p><p>The woman in the bow was small and upright with grey-streaked hair pinned back, sitting in a longboat in the middle of the Caribbean with the composure of someone who had decided to be unsurprised by everything. Beside her, a broad-shouldered older man with Hendrik&#39;s same way of sitting — still, observant, taking everything in before saying anything.</p><p>Margriet made a sound she hadn&#39;t made since the night of the wreck.</p><p>Hendrik&#39;s hand was on her arm. His jaw was set in the way that meant he was holding something back.</p><p>The longboat grounded on the sand. Verhoef stepped out first, then helped the woman down. She stood in the shallow water and looked up the beach at the courtyard, the houses, the fires, the family standing there — all six of them — and for a moment she simply stopped.</p><p>Then she walked up the beach.</p><p>She walked straight to Margriet and took her face in both hands and looked at her for a long moment without speaking.</p><p>Then she pulled her in.</p><p>Hendrik&#39;s father had reached him by then and did not embrace him — he gripped his son&#39;s arm with both hands, the way you hold something you thought was gone, and looked at his face, and nodded once, very slowly, the way men of a certain kind nod when words are insufficient.</p><p>Nella and Bram stood slightly back, uncertain, watching people cry who did not usually cry.</p><p>Then Margriet&#39;s mother pulled back from Margriet, looked past her, and saw them. She took a long breath.</p><p>&quot;Come here,&quot; she said, in a voice that left no room for standing slightly back.</p><p>They came.</p><p>Verhoef stood at the waterline with his hands clasped behind him, looking at nothing in particular, giving them the moment. One of his men quietly put the longboat&#39;s bow line over a post and went to stand by the boat and find something to look at.</p><p>Bram, pressed into his grandmother&#39;s arms, said something muffled.</p><p>&quot;What?&quot; she said.</p><p>He surfaced. &quot;I said we built all of this.&quot;</p><p>She looked at him. Then at the courtyard. Then at the houses, the fire, the cart with the Admiral on its bed parked by the wall, the distant slope of the island behind everything.</p><p>&quot;I can see that,&quot; she said.</p><p>&quot;It took a while,&quot; Bram said.</p><p>&quot;I imagine it did.&quot;</p><p>&quot;Do you want to see the—&quot; He stopped. Pieter&#39;s hand had landed on his shoulder with a particular weight.</p><p>&quot;The fruit?&quot; Pieter finished smoothly. &quot;We have extraordinary fruit. Come and sit down.&quot;</p>` },
      { heading: "Chapter Eighteen — The Best Week", content: `<p>The grandparents stayed a week.</p><p>It was, by any measure, the best week the island had seen.</p><p>Margriet&#39;s mother — whose name was Griet, and who had opinions about everything and was usually right — had arrived expecting to find her daughter surviving. She had not expected to find her thriving. The distinction took her about half a day to absorb, and after that she simply rolled up her sleeves and got on with enjoying it.</p><p>She and Margriet cooked together every morning, the two of them in the beach house kitchen, talking in the continuous half-finished way of people who know each other well enough not to need complete sentences. Griet had brought spices from Amsterdam — a small packet of each, tucked into her bag with the practicality of someone who had planned for a long stay even if she hadn&#39;t said so. The smell of them hitting Margriet&#39;s stone stove on the first morning brought something up in Margriet&#39;s face that she turned away from quickly and then turned back from, deciding not to hide it.</p><p>Hendrik&#39;s father, whose name was Jan and who had Hendrik&#39;s same quiet and none of his son&#39;s patience for sitting still, spent the first morning walking every inch of the beach and the second morning demanding to be shown the jungle.</p><p>Pieter took him.</p><p>They were gone six hours. They came back with fruit, two new species of bird Jan had never seen and wanted described in detail, and the particular ease of men who have walked somewhere difficult together and found out what they needed to know about each other.</p><p>Verhoef&#39;s two mates — young men who had apparently been told to behave themselves and were making a reasonable effort — spent the first day trying to fish off the rocks with Pieter&#39;s gear and caught almost nothing and found this deeply instructive. By the third day Pieter had shown them enough that one of them caught something large and held it up with an expression of pure shock that made Bram laugh until he had to sit down.</p><p>Bram took his grandparents to the veldt-hoen.</p><p>This required an explanation of what veldt-hoen were, where they came from, how Bram had found them, the significance of standing very still, the design philosophy behind the coop, and what the birds&#39; individual personalities were like, the last of which took considerably longer than any of the others.</p><p>Griet stood in the run with three veldt-hoen investigating her boots and looked at her grandson with an expression that was partly amazement and partly recognition.</p><p>&quot;You were always like this,&quot; she said.</p><p>&quot;Like what?&quot; Bram said.</p><p>&quot;Like this.&quot; She gestured, broadly, at all of it.</p><p>Bram considered this. &quot;Is that good?&quot;</p><p>&quot;Most of the time,&quot; she said.</p><p>Nella showed Jan the fruit slope.</p><p>She took him up alone, early in the morning before the heat, and walked him through everything — the melons, the red fruit, the tall feathery cane, the things they still didn&#39;t have names for. Jan was a careful man but not a quiet one, and he asked questions the whole way up, good ones, the kind that made Nella think before answering. He knew plants. Not tropical ones, but the principles were the same, and by the time they reached the top he was already talking about which ones could be cultivated, which ones seeded themselves naturally, how much the slope could yield if they managed it. He stopped a long time at the feathery cane grove and cut a section and tasted it and said yes, it was sugar cane, and they could process it if they had the right stone and enough patience. Nella had both.</p><p>Nella listened with her arms crossed and the expression she wore when she was filing things away.</p><p>On the way back down Jan stopped and looked at the island spread out below them — the beach, the courtyard, the six houses, the sea beyond.</p><p>&quot;Your father made a good decision,&quot; he said.</p><p>&quot;We all did,&quot; Nella said.</p><p>Jan looked at her for a moment. Then nodded.</p><p>&quot;Yes,&quot; he said. &quot;You all did.&quot;</p><p>On the fifth day Pieter drove them around the island on the cart.</p><p>All of them — Verhoef included, who had been discreetly busy for four days and seemed very ready to stop being discreet and busy. They piled on in a configuration that was technically unsafe and practically fine, Griet in the best seat Bram had installed for her the previous evening using a folded blanket and a board, Jan at the front with his hands on the rail, Sofie in Margriet&#39;s lap.</p><p>The engine clattered. The smoke drifted behind them. They went the long way, along the shore, through the green edge of the jungle where the track was wide enough, and when they rounded the far headland and saw the bad side of the island — the rocks, the grey water, the sky that looked different over there — everyone went quiet for a moment.</p><p>&quot;That&#39;s where we came from,&quot; Pieter said.</p><p>Jan looked at the rocks for a long time.</p><p>&quot;De Waal brought you to the good side,&quot; he said finally.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>Nobody said anything else about it. They drove back the long way.</p><p>On the last evening they ate in the courtyard, the full table, all of them together, candles in the center and fruit piled at both ends and fish Pieter had caught that morning. Verhoef gave a short speech that he&#39;d clearly been composing for several days and which was genuinely good. Verhoef&#39;s two mates, who had relaxed so completely by this point that Margriet had nearly forgotten they weren&#39;t family, contributed to the clearing up without being asked.</p><p>Griet sat beside Margriet after the meal, the two of them with their cups, looking at the courtyard.</p><p>&quot;You&#39;re not coming home,&quot; Griet said. Not sadly. Just squarely.</p><p>&quot;No,&quot; Margriet said.</p><p>&quot;This is home.&quot;</p><p>&quot;Yes.&quot;</p><p>Griet looked at the courtyard for a long moment. Then she reached over and put her hand over Margriet&#39;s.</p><p>&quot;Then we&#39;ll come here,&quot; she said.</p>` },
      { heading: "Chapter Nineteen — A Ship Full of Everything", content: `<p>The morning they left was quiet.</p><p>Griet held each of the children for a long time — Bram longest, which surprised him and which he did not pull away from. Jan shook Pieter&#39;s hand and then, after a pause, pulled him into a brief embrace that Pieter would think about for a long time afterward.</p><p>Verhoef got the longboat organized with the brisk efficiency of a man who had learned that drawn-out goodbyes served no one. He gave Hendrik a sealed packet — letters from Amsterdam, people who had heard the family was alive and wanted them to know they were remembered — and said nothing while Hendrik held it.</p><p>The ship was gone by noon.</p><p>The island was very quiet that afternoon.</p><p>A year passed.</p><p>It passed the way good years pass — full and fast, each month distinct but the whole thing compressed in memory into a collection of mornings and meals and small accomplishments. The courtyard houses settled into themselves, the wood darkening, the stone floor wearing smooth in the paths people naturally walked. The veldt-hoen population reached thirty-one. Pieter improved the engine twice. Bram turned eleven and received, from Hendrik, his own set of proper woodworking tools, which he used with a seriousness nobody had expected and everyone had, in retrospect, completely predicted.</p><p>Sofie, who had been walking since before the courtyard was built, was now running. Then climbing things she was not supposed to climb, which suggested she was going to be fine.</p><p>They came back on a Tuesday.</p><p>Two ships this time, both sitting heavy in the water — loaded, deep-drafted, moving with the deliberate care of vessels carrying more than they usually did. Pieter saw them from the rocks at dawn and stood watching for a full minute before he went to get Hendrik.</p><p>The first ship carried Verhoef and the grandparents and everything they&#39;d spent a year assembling: timber and iron and glass and tools, bolts of cloth, seeds, preserved food, medicine, books — an entire hold organized with Jan&#39;s methodical hand and Griet&#39;s absolute refusal to leave anything out. The second ship carried extra crew and, in its hold, the diving equipment: two full suits of oiled canvas and brass fittings, the kind used by harbor salvage workers in Amsterdam, packed in oilcloth and stored dry.</p><p>The family stood on the beach and watched both ships anchor, and it was Bram who said what everyone was thinking. Anker sat beside him and looked at the ships with the calm assessment of an animal who had seen one ship arrive before and knew roughly what followed.</p><p>&quot;That&#39;s a lot of ships.&quot;</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;Are they both staying?&quot;</p><p>&quot;No.&quot;</p><p>The extra crew left the next morning on the second ship, well-fed and well-rested, with veldt-hoen eggs for the voyage and Margriet&#39;s grain bread packed in cloth. They went over the side in good spirits and the ship was gone before the tide turned.</p><p>Jan was not on it.</p><p>Nobody had asked him to stay. He had simply, at some point between supper and the morning departure, moved his bag from the ship to the guest house and said nothing about it. Griet showed no surprise. Hendrik showed no surprise. Margriet handed him a cup of coffee and that was the end of it.</p><p>Griet stayed three more days. She spent most of them in the kitchen with Margriet and the rest of them walking the island with Jan, who showed her everything he&#39;d learned since arriving. On the morning she left she held each of the children the same way she always did — Bram longest — and told Jan she expected a letter on the next ship out, which everyone understood to mean she expected him to find a way to get a letter to her and also that she was not waiting up.</p><p>Verhoef sailed with her. He shook hands at the dock, said he&#39;d be back in the spring, and meant it.</p><p>The bay was quiet after they left. Jan stood on the dock for a moment, then turned and walked back up to the courtyard, and that was that.</p><p>That evening, with the second ship gone and only the grandparents and Verhoef remaining, Hendrik looked at Margriet across the courtyard table.</p><p>She nodded.</p><p>He stood up. &quot;Come with us,&quot; he said to Jan and Griet. &quot;There&#39;s something we didn&#39;t show you last time.&quot;</p><p>They took them up the slope in the last of the daylight, through the transplanted trees that had grown in convincingly over the past year, and stopped at what looked like nothing — a shadow between shrubs, a gap in the rock face that the eye slid past without catching.</p><p>Griet looked at it. Then at Margriet. &quot;What am I looking at?&quot;</p><p>&quot;Home,&quot; Margriet said, and pushed the door open.</p><p>They went inside.</p><p>Jan and Griet stood in the main chamber for a long time without speaking. The lanterns were lit. The stream ran in the back. The wooden floors caught the light. Along one section of the wall, Nella&#39;s shells were pressed into the pale paste in a careful pattern. The kitchen gleamed.</p><p>Griet ran her hand along the kitchen counter. She looked at the stone stoves, the water channel, the pegs with Margriet&#39;s things hanging on them. She looked at the smooth white walls, the door to the passage, the fire crackling in the hearth sending its smoke away through the hidden pipe.</p><p>&quot;You&#39;ve been living here,&quot; she said. Not accusingly. With something closer to wonder.</p>` },
      { heading: "Chapter Nineteen — A Ship Full of Everything (continued)", content: `<p>&quot;The whole time,&quot; Margriet said.</p><p>Jan crouched beside the stream in the back and dipped his hand the same way Hendrik had on the very first day. He tasted it. Stood.</p><p>He looked at his son for a long moment.</p><p>&quot;Nobody knows,&quot; Hendrik said. &quot;Only us. And now you.&quot;</p><p>Jan nodded slowly. &quot;Good,&quot; he said. Just the one word, the way Hendrik said things. Like it covered everything.</p><p>Bram, who had been waiting in the passage with the patience of someone who had prepared a tour, appeared in the doorway. &quot;Do you want to see the bedrooms?&quot;</p><p>Griet looked at Margriet. Margriet almost smiled.</p><p>&quot;Show us,&quot; Griet said.</p><p>They followed him.</p><p>Hendrik looked at the first ship still sitting at anchor in the bay, full to the waterline, going nowhere.</p><p>They spent three days unloading it by longboat — crate by crate, bundle by bundle, everything stacked above the tideline and then carted up to the cave and the courtyard houses. Three trips to fill the cave three times over: timber and iron and glass, tools of every kind, bolts of cloth and thread and needles, seeds for a dozen plants, preserved food enough for two years, medicine, candles, lamp oil, books, a small iron stove with a proper flue, rope by the coil, leather, nails by the pound. Jan had made a list and then doubled it. Griet had reviewed the list and added everything Jan had forgotten, which was considerable.</p><p>By the end of the third day the cave&#39;s storage passage was packed floor to ceiling and the courtyard houses had bundles stacked in every corner and Margriet stood in the middle of it all and looked like someone who had been given everything she hadn&#39;t known she was missing.</p><p>Then he looked at the bay itself — the shape of the shoreline, the way the water moved, the shallow flat he&#39;d noticed on the eastern side where the bottom came up nearly to the surface at low tide.</p><p>&quot;We need a proper dock,&quot; he said.</p><p>Pieter was already thinking it.</p><p>They got the diving suits out that afternoon. Neither of them had used one before — Jan had brought written instructions, characteristically — and the first dive was cautious and short, just Pieter going down to look while Hendrik worked the air pump on the surface.</p><p>Pieter came up grinning.</p><p>&quot;It&#39;s almost there,&quot; he said, pulling off the brass helmet. &quot;The rock shelf runs almost all the way across. Deep enough for a ship on the seaward side, solid footing for a dock structure. There&#39;s maybe six yards of soft bottom that needs clearing.&quot;</p><p>&quot;And the shallow flat?&quot;</p><p>Pieter looked at the eastern section of the bay, barely submerged at low tide, spreading brown and gold under a foot of water.</p><p>&quot;That&#39;s the work,&quot; he said. &quot;All of that needs to come up. Fill it, level it, face it with stone. But if we do—&quot;</p><p>&quot;Room for three ships,&quot; Hendrik said.</p><p>&quot;Easy.&quot;</p><p>They dove every morning for two weeks. The underwater work was tedious and strange — moving stone by stone in the green silence, clearing the soft bottom, learning how the current ran and what it would deposit back if they weren&#39;t careful about where they moved things. Bram was told firmly that he was too young for the suit and spent the two weeks being so conspicuously helpful with everything else that Hendrik made a note to teach him properly the following year.</p><p>The land reclamation was slower. They drove the cart load after load, shifting fill from inland — the broken rock and clay and rubble of three years of building — down to the flat and tipping it into the shallows. The water pushed back. They built a timber frame to hold the edges. They packed it tight, tamped it down, let the tide test it and reinforced where it gave.</p><p>It took two months.</p><p>When the flat was level and dry and faced with flat stone along the waterfront edge, Pieter walked its full length and came back and looked at the bay.</p><p>The dock ran the full length of the reclaimed ground, solid and clean, with iron rings set at intervals for mooring lines and a stone ramp at the shoreward end wide enough for the cart.</p><p>Hendrik walked the length of it once. Said nothing. Walked back.</p><p>&quot;Good,&quot; he said.</p><p>That was enough.</p>` },
      { heading: "Chapter Twenty — The Underground Railway", content: `<p>They started with the map.</p><p>Not a rough sketch on bark this time — a proper map, drawn on the flattest piece of hardwood Pieter could find, inked with a mixture of charcoal and tree resin that dried hard and permanent. Hendrik spent three days walking the island with a length of rope for measuring before he was satisfied enough to draw.</p><p>The island was larger than it looked from the beach. The good side was only one face of it — behind the cave hill the ground rose steeply to a wide plateau, flat-topped and open, with a view in three directions and a constant breeze that kept it cooler than anywhere below. On the far eastern edge, where the jungle thinned toward the shore, a natural cove sat tucked behind a headland, calm water, white sand, almost hidden.</p><p>Hendrik put his charcoal on the plateau first. Then on the cove.</p><p>Then he looked at the map for a long time.</p><p>&quot;Three villages,&quot; he said. &quot;And a jungle station.&quot;</p><p>&quot;We&#39;ve barely finished the first,&quot; Pieter said.</p><p>&quot;I know.&quot;</p><p>&quot;It&#39;ll take years.&quot;</p><p>&quot;I know.&quot;</p><p>Pieter looked at the map. Then at the island around them. Then back.</p><p>&quot;All right,&quot; he said.</p><p>The plateau village came first because the view earned it.</p><p>They built four houses up there, spaced wide apart to catch the breeze, connected by a stone-paved path that Bram laid himself over two weeks with the focused intensity he brought to things he&#39;d decided were worth doing properly. The houses were open-fronted on the windward side — deep covered porches facing out over the island, low railings, the sea in every direction. Not for sleeping so much as for sitting. For arriving somewhere and feeling it.</p><p>The cove village was smaller and closer to the water than anything they&#39;d built before — three houses set back just enough, with a stone jetty running into the calm water that Pieter built in a single determined week. The water in the cove was shallow enough to see the bottom and warm enough that even Margriet went in on the third day of building and came out with an expression that suggested she might go in again.</p><p>The jungle station was Nella&#39;s.</p><p>She had been thinking about it for months without saying so, and when she finally said so it came out fully formed: not a village but a station, a place to arrive and depart, with the jungle growing around it and the canopy overhead. Four covered platforms in a ring, open to the sky at the center, with benches and a water post and hooks for hanging things you didn&#39;t want to carry into the jungle. A place that was inside and outside at the same time.</p><p>She specified the spacing between the platforms with unusual precision — wide enough that you couldn&#39;t see from one to the next, narrow enough that you could hear someone call.</p><p>It took them three months. Bram did most of the clearing. Nella did most of the deciding. By the time it was finished it felt like stepping out of the tunnel and into somewhere that had always been there.</p><p>The path from the jungle station to the secret house in the clearing was, entirely by coincidence, a twelve-minute walk. The grandparents had not been told about this path. They had not been told about the station&#39;s particular location either. These were simply operational details that had not come up. The secret house itself was still theirs — still used on the nights when they wanted to be completely alone, completely hidden, completely the family they had been before anyone else knew the island existed.</p><p>The underground track was Pieter&#39;s.</p><p>He was sixteen now, though the island had a way of making ages feel beside the point. He&#39;d arrived as a boy who could row and follow orders. He was something else now — something that didn&#39;t have a clean name, somewhere between engineer and builder and the person everyone turned to when a thing needed working out.</p><p>He&#39;d been thinking about it since the cart — the way the engine pulled, the way a fixed track would smooth the ride, the way three villages and a cave and a dock created a problem of moving things between them that legs alone couldn&#39;t solve efficiently. He drew it in the evenings for two months before he showed anyone.</p>` },
      { heading: "Chapter Twenty — The Underground Railway (continued)", content: `<p>Two lanes. A main line running from the dock, under the beach hill, through a junction station near the cave entrance, then branching — one line up to the plateau, one line under the jungle to the eastern cove, a third spur running into the jungle, surfacing near a certain clearing that nobody needed to mention by name.</p><p>The junction station near the cave he called Central. It was underground, lit by lanterns on iron brackets, with a wide platform of flat stone and a water pump fed from the cave stream. Benches along the wall. A board on which Bram immediately began chalking a schedule that nobody had asked for.</p><p>The tunneling took the longest. Pieter and Hendrik worked the main bore while Jan — who had stayed on, quietly and without discussion, apparently having decided that Amsterdam could manage without him — turned out to know more about underground drainage than either of them and contributed this knowledge at critical moments without making a performance of it.</p><p>They hit unexpected rock twice. They hit unexpected water once, which flooded the junction station to knee height before Pieter figured out where it was coming from and diverted it into the cave stream. Bram, ankle-deep in the flooded station, declared this the best day so far.</p><p>The rails were iron stock from the Aldena&#39;s cargo and from the supply ship&#39;s hold — long flat bars, spiked to hardwood sleepers that Pieter had been curing under the cave for a year. The carts were three of them, smaller than the surface engine, designed to run in pairs so one could be coming while one was going. Each one had a bench seat and a cargo bed and a simple brake lever that Bram tested so thoroughly on the first day that Pieter had to adjust it.</p><p>The first full run — from the dock, through Central, up to the plateau — took eleven minutes. Anker rode in the cargo bed with his ears pinned back and his expression suggesting he was doing this under protest but would not be left behind.</p><p>They stood on the plateau at the end of it and looked at the view.</p><p>&quot;That was nothing,&quot; Bram said.</p><p>&quot;It was eleven minutes,&quot; Pieter said.</p><p>&quot;That&#39;s what I mean. It was nothing. We just went from the dock to the top of the island in nothing.&quot;</p><p>He wasn&#39;t wrong. Pieter didn&#39;t say so. But he sat down on the porch railing and looked at the sea and the island laid out below and felt something he didn&#39;t have a word for, something that was satisfaction and disbelief and pride all at the same time.</p><p>Hendrik sat beside him.</p><p>&quot;It&#39;s too much work for what it is,&quot; Pieter said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;The island didn&#39;t need all of this.&quot;</p><p>&quot;No.&quot;</p><p>&quot;We didn&#39;t need all of this.&quot;</p><p>Hendrik didn&#39;t answer right away. He looked at the plateau village, the stone path, the four houses with their open porches, the view in three directions.</p><p>&quot;We didn&#39;t need the cave floors either,&quot; he said finally. &quot;Or the shell border. Or Bram&#39;s bed headboards.&quot;</p><p>Pieter said nothing.</p><p>&quot;Some things,&quot; Hendrik said, &quot;you do because they&#39;re worth doing. Not because they&#39;re needed.&quot;</p><p>Below them, faint and mechanical and entirely improbable, they could hear the second cart making its way up from Central.</p><p>Bram was driving it. They could tell by the speed.</p>` },
      { heading: "Chapter Twenty-One — The Canoes", content: `<p>It was Nella who saw them first.</p><p>She&#39;d been at the cove village early in the morning, checking the jetty after a rough night of wind, when she saw the canoes — three of them, long and low, coming around the eastern headland with the unhurried pace of people who had never had a reason to hurry. Six men in each. She counted twice. Eighteen total.</p><p>She didn&#39;t run. She walked back to the jungle station at a pace that wouldn&#39;t be seen as alarm from the water, took the cart to Central, and was at the beach village in four minutes.</p><p>&quot;Canoes,&quot; she said. &quot;Eastern headland. Eighteen men. Not moving fast.&quot;</p><p>Hendrik was already on his feet.</p><p>They watched from the treeline above the courtyard — the same position they&#39;d used the first time they saw Verhoef&#39;s ship. Anker was with them, pressed against Bram&#39;s leg, utterly silent in the way he went silent when something required it. The canoes came around the point and into the bay, slowing as the men saw the dock, the houses, the courtyard. They spoke to each other in low voices that didn&#39;t carry.</p><p>The canoes grounded on the sand.</p><p>The men stepped out. They were not armed — not visibly, not with anything raised. They moved with the careful curiosity of people seeing something entirely new, touching the dock&#39;s iron rings, examining the stone ramp, looking at the houses with expressions that were hard to read from distance.</p><p>&quot;They&#39;re not here to fight,&quot; Pieter said quietly.</p><p>&quot;Not yet,&quot; Hendrik said.</p><p>Three of them found the courtyard. They walked the stone floor, looked at the fire pit, pressed their hands against the house walls. One of them tried a shutter — opened it, closed it, opened it again. Another crouched and looked at the floor joints the way a carpenter looks at another carpenter&#39;s work.</p><p>Bram, pressed against a tree root, whispered: &quot;He likes the floor.&quot;</p><p>&quot;Quiet,&quot; Pieter said.</p><p>They stayed two hours. They took nothing. They touched everything with the focused interest of men filing information away. One of them picked up two coconuts from the pile near the courtyard entrance and looked at them, then at the others, then set one back and kept one. Nobody stopped him. Then, without apparent signal, they walked back to the canoes and left the way they&#39;d come.</p><p>The family stayed in the treeline for twenty minutes after the canoes disappeared.</p><p>&quot;They&#39;ll be back,&quot; Hendrik said.</p><p>&quot;With more,&quot; Pieter said.</p><p>&quot;Yes.&quot;</p><p>They came back eleven days later.</p><p>Seven canoes this time. Forty men, maybe more. They came faster, with purpose, and they were armed — long-handled weapons, clubs and something that caught the morning light. They hit the beach running.</p><p>The family was ready.</p><p>They had spent eleven days preparing with the focused efficiency of people who had built an entire civilization on a single island and were not going to let anyone take it. Hendrik had drilled everyone — positions, signals, what to do and in what order. The muskets were cleaned and loaded. Pieter had rigged two of the underground cart lines as escape routes with carts pre-positioned at Central. The children — Nella, Bram, Sofie — knew exactly where to go and in what sequence.</p><p>On the fourth day Bram had said, very quietly: &quot;What if we aimed the surface cart at them? Throttle rigged, no driver. Just — point it at the courtyard entrance and let it go.&quot;</p><p>Everyone looked at him.</p><p>&quot;It&#39;s loud,&quot; he said. &quot;And it smokes. And it comes fast.&quot;</p><p>Pieter looked at Hendrik. Hendrik looked at the cart.</p><p>&quot;Work out how to rig the throttle,&quot; Hendrik said.</p><p>Jan had said, quietly, on the third day of preparation: &quot;I&#39;ve seen this before. In the east. They&#39;re testing. They want to know if you&#39;ll fight.&quot;</p><p>&quot;Will we?&quot; Bram said.</p><p>&quot;Yes,&quot; Hendrik said.</p><p>The first wave reached the courtyard and found it empty. Anker was with the family in the treeline, Bram&#39;s hand firm on his collar — not because Anker would have charged, but because Bram needed something to hold onto.</p><p>They spread through the houses, pulling open shutters, overturning things, calling to each other. Then the first musket fired from the treeline above — a single shot, aimed at the sky, the crack of it enormous in the morning quiet.</p><p>Every man in the courtyard stopped.</p><p>The second shot came from the eastern side of the slope. Then a third from the west. Three positions, three different directions, the sound bouncing off the cave hill and multiplying.</p><p>From the treeline, they were invisible. From the courtyard, it sounded like a small army.</p><p>Then Pieter started the engine.</p><p>The surface cart came down the beach path at full speed, engine at maximum, trailing smoke, the noise of it rattling off every hard surface on the slope. It had no one in it — Pieter had rigged the throttle and aimed it and stepped aside — and it came through the courtyard entrance and across the stone floor and hit the far wall&#39;s post with a bang that shook the porch roof.</p><p>The courtyard emptied in thirty seconds.</p><p>The men ran for the canoes. Some of them were in the water before the others reached the beach. The canoes pushed off in disarray, paddles tangling, men shouting over each other, and within minutes they were past the headland and gone.</p><p>The family came out of the treeline.</p><p>Bram looked at the cart, now resting against the post with a cracked wheel and a dented side panel, engine still ticking.</p><p>&quot;That was my idea,&quot; he said.</p><p>&quot;It was,&quot; Pieter said.</p><p>&quot;Are you going to say it was a good idea?&quot;</p><p>Pieter looked at the empty courtyard, the overturned things, the canoes already invisible around the headland.</p><p>&quot;It was a good idea,&quot; he said.</p><p>Bram nodded once, with dignity.</p><p>Hendrik stood at the edge of the courtyard and looked at the bay for a long time.</p><p>&quot;They won&#39;t come back,&quot; Jan said beside him.</p><p>&quot;How do you know?&quot;</p><p>&quot;Because they came to find out what you were. Now they know.&quot; He paused. &quot;You&#39;re the people with the thunder sticks and the fire machine. That&#39;s enough.&quot;</p><p>Hendrik watched the empty headland.</p><p>&quot;And if it isn&#39;t?&quot; he said.</p><p>Jan almost smiled. &quot;Then we&#39;ll think of something louder.&quot;</p>` },
      { heading: "Chapter Twenty-Two — The Island", content: `<p>Word had spread the way word spreads when Verhoef is involved — quietly, accurately, and to exactly the right people.</p><p>They came in three ships that spring, arriving on a Tuesday morning with the kind of coordination that suggested someone had planned it, though nobody admitted to planning it. Verhoef&#39;s vessel led, as always. Behind it, two others — one from Amsterdam carrying Griet and a handful of people the family hadn&#39;t seen since before the wreck, the other a smaller craft out of a port they didn&#39;t recognize, carrying people who had simply heard about the island and wanted to see it for themselves.</p><p>Twenty-three visitors in total. Every guest house full. Hammocks strung between the courtyard porches for the overflow.</p><p>Jan was on the dock when Griet&#39;s ship anchored. He&#39;d been there since Pieter spotted the first sail. He didn&#39;t say anything when the longboat came in and she stepped out, just offered his hand and got a look in return that suggested she had opinions about how long he&#39;d been away. They walked up the dock together without further discussion.</p><p>The party wasn&#39;t announced. It simply assembled itself over the course of the first afternoon — someone produced a fiddle, someone else produced a drum that had no business being on a Caribbean island but was there nonetheless, and by evening the courtyard fire was large and the tables were covered and the veldt-hoen were watching from the coop fence with the alert curiosity of animals who recognized a significant occasion.</p><p>Margriet cooked for two days. Not alone — Griet beside her, and three of the visitors who had opinions about cooking and were allowed to have them. The smells that came from the kitchen drifted across the courtyard and down to the beach and Bram later claimed they could be detected from the plateau, which was probably an exaggeration and possibly wasn&#39;t.</p><p>Pieter gave rides on the underground railway. Six at a time, down to Central and branching up to the plateau, where they stood on the porch in the evening light and looked at the island below and the sea in every direction and said nothing for a while, which was the correct response.</p><p>Nella showed three of the visitors the fruit slope and came back with the expression she wore when someone had asked exactly the right questions.</p><p>Bram showed everyone everything, in a sequence that suggested he had prepared an itinerary, which he had.</p><p>Jan spent most of the party talking to a quiet man from one of the unknown ships who turned out to know about tropical plants, and the two of them sat in the corner of the courtyard for most of two evenings and were perfectly happy.</p><p>Sofie, four years old now and entirely confident in the way children are who have grown up somewhere extraordinary, appointed herself guide to the younger visitors and took the job seriously.</p><p>Anker moved through the party like a host — steady, unhurried, receiving attention graciously, occasionally disappearing and reappearing from a different direction, always ending up beside Bram at the end of the evening.</p><p>On the third night the music went late and the fire burned down to coals and people drifted to their beds one by one until only the family remained in the courtyard, the six of them, the same six who had stood on this beach with nothing but wet blankets and two muskets and a dog who&#39;d fought the whole ocean.</p><p>They sat without talking for a while.</p><p>Then Bram said: &quot;They&#39;ll come back.&quot;</p><p>&quot;Yes,&quot; Hendrik said.</p><p>&quot;And more will come.&quot;</p><p>&quot;Probably.&quot;</p><p>Bram looked at the courtyard — the stone floor, the fire pit, the six houses around them, the slope above hiding everything that was theirs alone.</p><p>&quot;Good,&quot; he said.</p><p>In the morning the ships were gone.</p><p>Not abruptly — there had been farewells, genuine ones, the kind that take time and mean something. But by the time the sun was fully up the bay was empty and the island was quiet and the only sounds were the sea and the veldt-hoen and the stream running somewhere in the rock above them.</p><p>The courtyard needed sweeping. The kitchens needed setting right. There were cups to wash and hammocks to fold and a section of the dock railing that someone had leaned on too enthusiastically and would need Pieter&#39;s attention.</p><p>Margriet stood in the courtyard doorway with her coffee and looked at the empty bay.</p><p>Nella came and stood beside her.</p><p>&quot;They always leave in the night,&quot; Nella said. &quot;Or early. Before you have to watch them go.&quot;</p><p>&quot;Yes,&quot; Margriet said.</p><p>&quot;Do you think they know that&#39;s how we like it?&quot;</p><p>Margriet looked at the bay, the morning light on the water, the island going about its business around them.</p><p>&quot;I think they know,&quot; she said.</p><p>She finished her coffee. Set the cup on the courtyard table. Picked up the broom.</p><p>The island was theirs again. It always would be. And whenever anyone wanted to find it, they knew where it was — a day&#39;s sail from Hispaniola, good side, the beach with the dock and the courtyard and the six houses and a family who would feed you and give you somewhere to sleep and wave you off in the early morning without making you feel the leaving.</p><p>That was enough. That was everything.</p><p>That was the island.</p><p>The End</p><p>A Note from the Author</p><p>I didn&#39;t set out to write a book.</p><p>I had an idea — a family, a shipwreck, an island — and I liked it, so I followed it. That was enough.</p><p>Most of the things in this story came from pieces of other stories I&#39;d loved: the cave that becomes a home, the impossible machine built by a clever teenager, the dog who survives against all odds, the family that chooses to stay somewhere instead of going back to what they knew. I took the parts that felt right and put them together into something new.</p><p>Bram came almost entirely by himself.</p><p>The island doesn&#39;t exist. But the feeling of finding somewhere so good you stop wanting to leave — that part I borrowed from real life, because it&#39;s the truest thing in the book.</p>` },
      { heading: "Back Cover", content: `<div class="cover-page"><svg viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="1020" fill="#87ceeb"/><rect width="680" height="180" fill="#5bb8e8"/><rect y="300" width="680" height="220" fill="#a8ddf5"/><circle cx="520" cy="90" r="55" fill="#fff5c0" opacity="0.4"/><circle cx="520" cy="90" r="32" fill="#ffdd60" opacity="0.8"/><circle cx="520" cy="90" r="24" fill="#ffef90" opacity="0.95"/><ellipse cx="100" cy="130" rx="80" ry="35" fill="#fff" opacity="0.9"/><ellipse cx="150" cy="115" rx="65" ry="30" fill="#fff" opacity="0.95"/><ellipse cx="320" cy="80" rx="70" ry="28" fill="#fff" opacity="0.8"/><ellipse cx="630" cy="160" rx="65" ry="28" fill="#fff" opacity="0.8"/><path d="M0 380 Q80 310 180 350 Q260 380 350 320 Q440 262 530 310 Q600 348 680 330 L680 420 L0 420Z" fill="#2d7a3a" opacity="0.5"/><path d="M60 500 Q160 380 300 360 Q400 345 480 370 Q560 395 620 460 L680 500 L680 540 L0 540Z" fill="#2d8c40"/><path d="M80 500 Q170 395 300 375 Q400 360 470 382 Q540 404 600 458 L680 500 L680 540 L0 540Z" fill="#35a04a"/><ellipse cx="200" cy="430" rx="30" ry="20" fill="#268c35" opacity="0.7"/><ellipse cx="330" cy="395" rx="28" ry="19" fill="#248a32" opacity="0.7"/><ellipse cx="460" cy="418" rx="24" ry="16" fill="#229030" opacity="0.6"/><rect x="0" y="500" width="680" height="520" fill="#0096b4"/><path d="M0 540 Q120 520 250 532 Q380 544 500 525 Q590 514 680 522 L680 580 L0 580Z" fill="#00b8d8" opacity="0.9"/><path d="M0 558 Q100 542 220 550 Q340 558 460 542 Q560 530 680 538 L680 590 L0 590Z" fill="#40d4f0" opacity="0.7"/><path d="M0 590 Q80 575 180 582 Q300 592 420 578 Q520 567 640 577 L680 578 L680 640 L0 640Z" fill="#f5e8c0"/><path d="M0 598 Q100 588 220 594 Q360 602 480 588 Q570 578 680 586 L680 650 L0 650Z" fill="#faf0d0"/><line x1="120" y1="640" x2="148" y2="480" stroke="#5a3a1a" stroke-width="8"/><path d="M145 460 Q95 430 60 448 Q85 458 145 460Z" fill="#228b35"/><path d="M145 460 Q110 410 80 415 Q105       { heading: "A Note from the Author", content: `<p>I didn't set out to write a book.</p><p>I had an idea — a family, a shipwreck, an island — and I liked it, so I followed it. That was enough.</p><p>Most of the things in this story came from pieces of other stories I'd loved: the cave that becomes a home, the impossible machine built by a clever teenager, the dog who survives against all odds, the family that chooses to stay somewhere instead of going back to what they knew. I took the parts that felt right and put them together into something new.</p><p>Bram came almost entirely by himself.</p><p>The island doesn't exist. But the feeling of finding somewhere so good you stop wanting to leave — that part I borrowed from real life, because it's the truest thing in the book.</p><div class="end-note">Thank you for reading.</div>` }
];

let currentPage = 0;
const storageKey = 'aldena_page';

function saveProgress() {
  localStorage.setItem(storageKey, currentPage);
}

function loadProgress() {
  currentPage = parseInt(localStorage.getItem(storageKey) || '0');
}

function render() {
  const page = pages[currentPage];
  document.getElementById('content').innerHTML =
    '<div class="chapter-heading">' + page.heading + '</div>' + page.content;
  document.getElementById('pageInfo').textContent = (currentPage+1) + ' / ' + pages.length;
  document.getElementById('prev').disabled = currentPage === 0;
  document.getElementById('next').disabled = currentPage === pages.length-1;
  window.scrollTo(0,0);
}

function changePage(dir) {
  speechSynthesis.cancel();
  document.getElementById('speakBtn').textContent = '▶ Speak';
  currentPage = Math.max(0, Math.min(pages.length-1, currentPage+dir));
  saveProgress();
  render();
}

function toggleSpeak() {
  const btn = document.getElementById('speakBtn');
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btn.textContent = '▶ Speak';
    return;
  }
  const text = document.getElementById('content').innerText;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  utt.onend = () => { btn.textContent = '▶ Speak'; };
  btn.textContent = '■ Stop';
  speechSynthesis.speak(utt);
}

loadProgress();
render();
</script>

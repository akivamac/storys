<script>
const pages = [
  { heading: "Chapter One — The Burned Forest", content: `<p>The wagon belonged to a man named Erik.</p><p>He&#39;d offered at the last settlement — not because he needed to, and not because they&#39;d asked, but because he had two good horses and a free week and the look of people who were going somewhere interesting. &quot;I&#39;ll take you as far as the horses will go,&quot; he&#39;d said, over supper at the inn. &quot;After that you&#39;re on your own.&quot; He&#39;d said it cheerfully, the way a man says something he finds genuinely amusing.</p><p>That had been four days ago. Since then he&#39;d driven them north along tracks that got narrower and rougher each day, talking easily about nothing in particular — the weather, the country, the dogs, Knud&#39;s increasingly ambitious questions — and had generally made the journey feel less like the edge of the world and more like a pleasant outing with a long way to go.</p><p>On the fourth morning the track ran out entirely. Erik pulled the horses to a stop, stood up on the box, looked ahead for a long moment, and sat back down.</p><p>&quot;This is where I leave you,&quot; he said.</p><p>Ahead of them: dead trees. Thousands of them — pale and stripped and standing, the bark long gone, the branches stripped to stubs, reaching up into a grey November sky like something frozen mid-reach. The ground between them was open and flat, covered in low brush and patches of old snow. It went on as far as anyone could see.</p><p>&quot;This is it?&quot; Torben said.</p><p>&quot;This is it,&quot; Sven said.</p><p>Agda was already down from the wagon, standing in the cold with her hands in her pockets, looking at the trees. She&#39;d heard Sven describe it — he&#39;d come across a trapper&#39;s account of the place, late one winter evening, reading by the fire — but the description hadn&#39;t prepared her for the scale of it. The silence of it.</p><p>Lise stood beside her mother. &quot;It looks like the moon,&quot; she said.</p><p>&quot;It looks like the moon caught fire,&quot; Knud said, which was, for Knud, an unusually precise observation.</p><p>Erik helped them unload the sleds and the supply boxes and the dogs, who knew they&#39;d arrived somewhere and were standing alert, ears up, reading the air with the focused attention of animals built for exactly this kind of place. When everything was down he shook Sven&#39;s hand, ruffled Knud&#39;s hair, accepted a piece of Agda&#39;s travel bread, and climbed back onto the wagon.</p><p>He looked at the forest one last time. Then at the family. Then at the dogs. He nodded once — the nod of a man who has decided something is going to be fine — and turned the horses around.</p><p>They watched the wagon go until it disappeared around the bend. Then there was nothing — no sound of wheels, no voices, no settlement four days back. Just the wind moving through the dead trees and the five dogs standing ready and the six of them at the edge of something enormous.</p><p>&quot;Nobody for miles,&quot; Sven said.</p><p>&quot;Nobody for miles,&quot; Agda agreed. She turned and looked at him with the expression she wore when something was exactly what she&#39;d hoped. &quot;Perfect.&quot;</p><p>They made camp before dark, which meant moving fast. The tent was large and well-made, and Sven and Torben had it up while Agda got the cook fire going and Lise organized the supply boxes with the systematic focus she brought to all organizational tasks.</p><p>Knud helped with the dogs. This meant standing in the middle of all five of them while they investigated him from every direction, which he found completely acceptable.</p><p>&quot;They need names,&quot; Knud said.</p><p>&quot;They have names,&quot; Torben said.</p><p>&quot;I know, but they need <em>our</em> names for them.&quot;</p><p>&quot;Knud—&quot;</p><p>&quot;Just while we&#39;re here.&quot;</p><p>Sven looked at the five dogs. They looked back at him with the calm, professional attention of animals who had been doing this longer than any of them and knew it. &quot;They have their names,&quot; he said. &quot;Use those.&quot;</p><p>Knud accepted this. For now.</p><p>The burned forest was different at dusk — the pale trunks caught the last light and held it longer than the sky did, so that when everything above went dark the trees still glowed faintly, a whole pale forest standing in the last of the day. Lise sat by the fire and watched until it was fully gone.</p><p>&quot;I didn&#39;t think it would be beautiful,&quot; she said to nobody in particular.</p><p>Freja, from inside the tent, made a sound that indicated she had opinions about the current sleeping arrangements. Agda went in. Outside, the cold settled around the camp with the purposeful weight of a place that was used to being cold and knew exactly how to do it.</p><p>Sven looked up. No clouds. Stars coming out in a quantity that made the ones at home look like a rough draft.</p><p>&quot;Good first night,&quot; he said.</p><p>&quot;Ask me in the morning,&quot; Torben said, and went to bed.</p>` },
  { heading: "Chapter Two — The Right Spot", content: `<p>Morning came with a cold that had opinions.</p><p>Sven was up first, and the air outside the tent hit him like a wall — not unpleasant exactly, but definite, the kind of cold that makes it clear immediately that everything you do today will require more effort than it would anywhere else. He got the fire going and stood over it for a moment, looking out at the burned forest in the early light. The pale trees went on in every direction, absolutely still, the low brush between them dusted with frost. A raven landed on a nearby trunk, looked at him, and flew off without apparent interest.</p><p>The dogs were already awake. They always were.</p><p>Breakfast was fast and practical, and then they loaded the sleds and moved out.</p><p>The dogs knew what they were doing in a way that was immediately humbling. Everyone walked — Sven and Torben breaking trail when the snow was deep, Agda carrying Freja in the wrap across her chest, Knud keeping pace with the focused energy of a six-year-old who has decided that this is an adventure and intends to treat it as such. The dogs pulled the loaded sleds behind them, finding the paths through the brush without being told, avoiding the patches of crust that wouldn&#39;t hold weight, moving with a smooth efficiency that made clear they had done this before and knew it better than any of the people around them.</p><p>They traveled north and slightly west, following the shape of the land. The burned forest was enormous — day one gave them no sense of its edge, and day two gave them only the suspicion that it might not have one. The trees were the same in every direction: pale, stripped, standing in their thousands, the ground between them open and silent.</p><p>But the land itself changed. On the afternoon of the second day the ground began to rise, slowly, toward a long ridge. On the morning of the third day they crested it and looked down the other side.</p><p>A valley. Not large — a few hundred yards across, sheltered on three sides by the ridge and a low rocky escarpment to the north. The burned trees grew here too, but the ground between them was different — softer, darker, the snow lying in smooth unmarked sheets. A frozen stream ran along the valley floor, just visible under its covering of white. And at the far end, where the escarpment met the ridge, a natural windbreak of rock and fallen timber that had been there long enough to half-bury itself in snow.</p><p>Sven stopped the sled. The family gathered behind him.</p><p>Nobody spoke for a moment.</p><p>&quot;There,&quot; Lise said.</p><p>&quot;Yes,&quot; Sven said.</p><p>They spent the rest of the third day on firewood, and it was a serious project. Sven had seen enough winters to know that a stack of firewood and a stack of enough firewood were very different things, and he wanted the second kind. The burned trees, dead for years, were dry all the way through — they split cleanly and burned hot, and there was no shortage of them.</p><p>Torben swung the axe until his arms ached and then kept going. Knud dragged pieces and stacked them and occasionally stood on top of the pile to see farther, which was not its primary purpose but which Sven allowed. Lise stacked with the same systematic attention she gave everything, the logs interlocking, the pile square and solid. By evening the stack against the rock face was taller than Sven and twice as wide, and Sven looked at it and decided it needed to be taller still.</p><p>They kept going until the light was almost gone. When they finally stopped the stack was impressive enough that even Torben — who didn&#39;t say things like this — said &quot;that should do it.&quot;</p><p>&quot;It should,&quot; Sven agreed. He looked at it a moment longer. &quot;Stack another row tomorrow.&quot;</p><p>Torben looked at his hands. &quot;Yes, Papa.&quot;</p><p>The tent went up differently this time. Not the quick practical camp of the first night but something that was meant to stay — Sven drove the poles deeper, guys anchored to stakes he cut from deadfall and drove in at angles, the whole thing tightened until it didn&#39;t move when he pushed it. He packed snow around the base on three sides, a thick low wall that would keep the wind from getting under the canvas and the cold from coming up through the ground. Agda lined the interior floor with cut branches — a thick layer, springy and fragrant in a faint ghost-of-pine way, better than lying on frozen earth.</p><p>Knud inspected the finished tent with professional seriousness. He pushed the wall. He pushed the pole. He pushed the wall again.</p><p>&quot;It&#39;s not going anywhere,&quot; he announced.</p><p>&quot;No,&quot; Sven said. &quot;It&#39;s not.&quot;</p><p>Agda stood at the tent entrance and looked at the valley — the frozen stream, the windbreak, the stack of firewood against the rock. The dogs had settled themselves in a row nearby, curled against the cold, already at home in the way dogs become at home in places before people do.</p><p>&quot;Good spot,&quot; she said.</p><p>&quot;I thought so,&quot; Sven said.</p><p>&quot;I thought so first,&quot; Lise said, from inside the tent.</p><p>Nobody argued with her.</p>` },
  { heading: "Chapter Three — The Storm", content: `<p>It started as nothing.</p><p>A few flakes on the fourth morning, barely worth mentioning — the kind of snow that falls and disappears before it reaches the ground. Sven noted it and said nothing. By midday the sky had gone the particular white-grey that he recognized, and he said something then.</p><p>&quot;More firewood,&quot; he said. &quot;Today.&quot;</p><p>They stacked another two rows before the real snow began.</p><p>It came in the afternoon — not gradually but all at once, the way serious weather arrives, as if it had been waiting just over the ridge and decided the time was right. The wind picked up first, then the snow thickened until the far end of the valley disappeared, then the near trees, then the firewood stack was just a shape in white. Within an hour the world was the tent and the windbreak and approximately ten feet in every direction.</p><p>They were inside, all six of them plus the dogs, who had been invited in without discussion when the wind reached a certain pitch.</p><p>&quot;The firewood,&quot; Torben said.</p><p>&quot;It&#39;s fine,&quot; Sven said. &quot;It&#39;s against the rock. The snow will pack around it, not bury it.&quot;</p><p>&quot;The tent—&quot;</p><p>&quot;Is holding.&quot; It was. The deep stakes and the snow wall were doing exactly what they were meant to do. But Sven was listening to the wind and doing arithmetic in his head and the arithmetic was not entirely comfortable.</p><p>By evening it hadn&#39;t stopped. By the following morning it hadn&#39;t stopped. Knud, who had been cheerful about everything so far, went quiet in the way that children go quiet when something is larger than their cheerfulness can account for.</p><p>&quot;How long?&quot; Agda said, quietly, while the children slept.</p><p>&quot;I don&#39;t know,&quot; Sven said.</p><p>On the second day of the storm Torben went out for firewood and came back with something else entirely.</p><p>He&#39;d been gone longer than expected and Sven had been considering going after him when the tent flap opened and Torben came in stamping snow off his boots with an expression that was trying not to be excited and failing.</p><p>&quot;There&#39;s a cave,&quot; he said.</p><p>&quot;What?&quot;</p><p>&quot;Ten feet from the firewood stack. I nearly walked into the wall before I saw the opening.&quot;</p><p>Sven put on his coat.</p><p>The cave entrance was low and wide, half-hidden behind a shelf of rock that the snow had been drifting against for years, building up a shape so gradual that it looked like part of the landscape. Ten feet from the firewood stack. They&#39;d been camping next to it for two days without knowing it was there.</p><p>Inside, Sven held up his lantern and turned slowly.</p><p>The cave didn&#39;t open into one room. It opened into several.</p>` },
  { heading: "Chapter Three — The Storm (continued)", content: `<p>A main chamber first — large, high-ceilinged, the floor flat stone swept clean by some ancient draft. Then passages leading off it, three of them, each opening into its own smaller room. Dry. Still. The air noticeably warmer than outside. At the back of the main chamber a natural ledge ran the full width of the wall, as if built for the purpose.</p><p>He walked every room. He counted paces. He came back to the entrance and stood looking at the tent, barely visible through the driving snow, canvas straining against the wind.</p><p>Then he went back inside and started counting rooms again.</p><p>It had been Agda&#39;s idea to bring the powder — a heavy linen sack, grey-white, gotten from a builder in the last town. Mixed with the pale crumbly limestone that showed in the escarpment wall — easily identified, easily broken — and water, it expanded into a thick paste that could be packed into any gap and shaped with your hands. Left to dry, it went hard as stone.</p><p>The cave entrance had gaps. The passages between rooms had gaps. The wind found every one of them.</p><p>They moved in on the third day of the storm, which was the only sensible thing to do, and spent the rest of it making the place theirs.</p><p>Sven and Torben packed mortar into the entrance until the wind stopped finding ways through — leaving a proper doorway, framed with flat stones, the canvas from the tent hung across it as a door until something better could be made. The gaps between rooms were sealed the same way. A fire in the main chamber sent its smoke up through a natural crack in the ceiling that Lise found by watching where the warm air went, and Sven widened it carefully with the chisel until it drew properly.</p><p>The rooms were assigned with minimal discussion, which mostly meant Lise assigned them and everyone agreed.</p><p>The two largest side rooms: firewood. One fill now, one fill later — the first accessible, the second a reserve that nobody touched until the first was empty. The third side room: supplies, tools, the dog harnesses, everything that wasn&#39;t a person. The main chamber: fire, cooking, eating, living.</p><p>And the back passages — narrower, lower, leading deeper into the rock — Sven explored them on the second evening with the lantern and came back nodding.</p><p>&quot;Where do they go?&quot; Torben asked.</p><p>&quot;Out,&quot; Sven said. &quot;The far one comes up behind the escarpment. You&#39;d have to dig through two feet of snow, but it&#39;s there.&quot;</p><p>Lise looked up from where she was pressing mortar into a gap with her thumb. &quot;The second way out,&quot; she said.</p><p>&quot;Yes,&quot; Sven said.</p><p>Each person had their own room — smaller chambers off the main passages, just large enough for a bedroll and a shelf of rock. Sven and Agda took the largest, which was still not large. Knud&#39;s was the furthest in, which he had requested on the grounds that it was the most like a tunnel, which he considered a point in its favor. Agda lined every floor with the branch layer from the tent, carried in armload by armload, and the smell of it mixed with the woodsmoke until the cave smelled like somewhere people had been living for a long time.</p><p>Lise put her bedroll down, set her small supply of charcoal sticks on the rock shelf, and opened the blank-paged notebook she&#39;d been carrying since home. She wrote the date at the top of the first page. Then she wrote: <em>cave. main chamber. three side rooms. back passages. stream to the north. escarpment to the north. valley floor below.</em> She drew a rough map. Then she closed it and went to help with supper.</p><p>The dogs slept in the main chamber by the fire. Nobody had suggested this. It had simply happened on the first night and continued on the second and by the third it was simply how things were.</p><p>On the fourth evening of the storm Agda stood in the entrance passage and listened to the wind outside — still howling, still throwing snow at the valley — and then turned and looked back at the firelight in the main chamber, the shapes of her children moving in it, the smell of supper, the solid sealed walls.</p><p>&quot;It&#39;s warmer in here than home,&quot; she said.</p><p>&quot;The rock holds the heat,&quot; Sven said.</p><p>&quot;I know why.&quot; She looked at the entrance a moment longer. &quot;I just didn&#39;t expect it to feel like this.&quot;</p><p>The storm kept going for three more days. By the end of it nobody was particularly bothered.</p>` },
  { heading: "Chapter Four — Snow Day", content: `<p>The storm ended on a Tuesday, which nobody had been tracking, so it was just the day the wind stopped.</p><p>They knew before they opened the door — the cave went quiet in a way it hadn&#39;t been for days, the constant low moan of the wind through the entrance suddenly absent. Knud was the first one to notice. He sat up in his bedroll, head tilted, listening to the silence.</p><p>&quot;It stopped,&quot; he said.</p><p>By the time Sven had the door open Knud was already past him and into the snow.</p><p>The valley had transformed. What had been knee-deep was now chest-deep on Torben and over Knud&#39;s head entirely, which Knud discovered by stepping off the packed path and disappearing. He came up laughing, which set the tone for the morning.</p><p>The burned trees stood in their thousands, each one wearing a cap of snow, perfectly still in the cold clear air. The sky was a blue so deep it looked painted. The escarpment glittered. The valley floor was an unmarked sheet of white in every direction, pristine, not a track on it except for the five sets of dog prints already racing in wide joyful loops across the whole thing.</p><p>Lise stood at the cave entrance and looked at it for a long moment.</p><p>&quot;Don&#39;t,&quot; Torben said.</p><p>&quot;I&#39;m not doing anything,&quot; Lise said.</p><p>&quot;You&#39;re planning something.&quot;</p><p>&quot;I&#39;m just looking.&quot;</p><p>She was planning something.</p><p>The snow forts went up before midday.</p><p>It had started as one fort — Knud&#39;s, announced at breakfast, specifications vague but ambitious — and had become two by the time Torben pointed out that a fort with no enemy was just a pile of snow, and three by the time Lise noted that she hadn&#39;t agreed to be anyone&#39;s enemy and was building her own independent structure with its own independent foreign policy.</p><p>Sven watched from the cave entrance with his coffee. Agda appeared beside him.</p><p>&quot;Should we—&quot;</p><p>&quot;No,&quot; Sven said.</p><p>The forts were serious constructions. Torben&#39;s was low and wide, walls packed hard, with a proper parapet. Lise&#39;s was smaller but had a covered section that she&#39;d roofed with branches, which Torben examined with reluctant admiration. Knud&#39;s was the most ambitious — a sprawling complex of walls and tunnels that had started as a fort and evolved into something he described as a city, then a castle, then a city again.</p><p>The snowball exchange that followed was energetic and lasted until Freja, watching from Agda&#39;s arms, got hit by a stray shot that had been intended for Torben and expressed her opinion of this in a volume that ended the battle immediately by mutual unspoken agreement.</p><p>The slope above the valley was Torben&#39;s discovery, found while ranging the high ground after the battle — a long clear run down the eastern face of the ridge, open and fast, the snow packed by the wind into something smooth and reliable. He came back and reported it with the careful understatement of someone who had already tried it once.</p><p>&quot;There&#39;s a slope,&quot; he said.</p><p>&quot;How fast?&quot; Knud said.</p><p>&quot;Fast enough.&quot;</p><p>They used the flat supply board from the sled as a sledge, two at a time, Sven going first to check for obstacles and coming back grinning in a way that Agda filed away to mention later. By midday they had a proper run established, a clear track worn into the snow, and a system — two people down, walk back up, next two go.</p>` },
  { heading: "Chapter Four — Snow Day (continued)", content: `<p>Knud went approximately fifteen times. Nobody counted exactly. It was approximately fifteen.</p><p>Lise went with her eyes open and her hands in her lap and a completely calm expression that she maintained all the way to the bottom and then ruined by immediately asking to go again.</p><p>Even Agda went, once, with Freja strapped to her chest and Freja&#39;s expression one of total focused attention, as if she was cataloguing the experience for future reference.</p><p>The firewood party was Knud&#39;s name for it, announced at lunch.</p><p>&quot;This afternoon,&quot; he said, &quot;we are having a firewood party.&quot;</p><p>&quot;A firewood party,&quot; Sven said.</p><p>&quot;Everyone comes. We get the wood together. It&#39;s a party.&quot;</p><p>Sven looked at the firewood room, which was lower than he&#39;d like after the storm. He looked at Knud. &quot;All right,&quot; he said. &quot;Firewood party.&quot;</p><p>The logic of calling it a party, it turned out, was not entirely without merit. Everyone came — which they would have anyway, since the wood wasn&#39;t going to move itself, but the name gave it a different quality. Torben and Sven felled and split. Lise and Knud hauled. Agda stacked with Freja on her back, the baby watching the operation with the same focused attention she&#39;d brought to the sledding.</p><p>Knud sang. The song had no fixed words and the tune changed every few verses and it was ostensibly about firewood but expanded to include the dogs, the cave, the snow, Erik and his horses, the burned trees, and at one point a long digression about what Knud would name the dogs if he were allowed to name them, which he wasn&#39;t, but which he had clearly thought about extensively.</p><p>The dogs worked alongside them, carrying smaller pieces in their mouths with the cooperative good nature of animals who understood that work and play were not necessarily different things.</p><p>By late afternoon the firewood room was full again and the reserve room had gained six good rows. Torben, with time still on his hands, built a smoking rack from green branches and iron fittings — a thing he&#39;d been thinking about since the bear — and wedged it over the low edge of the cooking fire where the heat was steady. It could hang four pieces at once. He stepped back and looked at it. Nobody asked him what it was for. They could see what it was for. Sven nodded once. That was enough.</p><p>&quot;Good party,&quot; Knud said, from behind him.</p><p>&quot;Good party,&quot; Sven agreed.</p><p>Knud nodded, satisfied. &quot;We should have one every day.&quot;</p><p>&quot;We shouldn&#39;t,&quot; Torben said.</p><p>&quot;We should,&quot; Knud said, and went inside.</p><p>Supper that night was loud and long and everyone talked over everyone else, which was unusual enough that Agda noticed it. She said nothing about it. She just listened to the noise of it filling the cave and thought that it was a good sound for a place to have.</p><p>Outside, the burned forest stood in the dark and the cold and said nothing, the way it always did. But the stars were extraordinary again, and through the smoke hole in the ceiling the cave had its own small window of them, a circle of deep winter sky framed in stone.</p><p>Lise looked up at it before she went to her room.</p><p>&quot;I want to count them,&quot; she said.</p><p>&quot;You can&#39;t count them,&quot; Torben said.</p><p>&quot;I know,&quot; Lise said. &quot;I want to anyway.&quot;</p>` },
  { heading: "Chapter Five — The Bear", content: `<p>It was Torben who noticed first, which made sense because Torben had been watching.</p><p>He&#39;d been watching since the storm ended — the way the food boxes sat at the same level day after day, the way nobody thought about it because there was always enough, the way <em>always enough</em> was a feeling that could quietly become <em>not enough</em> without anyone noticing until it was too late. He didn&#39;t say anything about it. He thought about it for two days, and then on the third day, while everyone was outside, he moved a box.</p><p>Not much. Just one box, to the back of the supply room, behind the harnesses, under a folded piece of canvas. He stood back and looked at where it had been and felt slightly ill about what he&#39;d done and did it anyway.</p><p>Four days later Agda went to get the dried meat and stopped in the entrance to the supply room.</p><p>&quot;Sven.&quot;</p><p>He came. They both stood looking at the boxes.</p><p>&quot;Did you—&quot;</p><p>&quot;No,&quot; Sven said.</p><p>They counted what was there. Then they counted again. Then Sven sat down on the supply room floor and looked at the ceiling for a moment.</p><p>&quot;Two and a half weeks,&quot; he said. &quot;Maybe three if we&#39;re careful.&quot;</p><p>&quot;We&#39;ve been here almost two,&quot; Agda said.</p><p>The silence that followed was the kind that children hear from two rooms away and know means something. Lise appeared in the passage. She looked at her parents&#39; faces and looked at the boxes and understood without asking.</p><p>&quot;We need to hunt,&quot; she said.</p><p>&quot;Yes,&quot; Sven said. &quot;We do.&quot;</p><p>They had the rifles. They had ammunition. What they didn&#39;t have, it turned out, was animals — or rather, the burned forest had animals, but they were not where people were, and finding them required ranging further than any of them had gone.</p><p>Sven and Torben went out every morning. The dogs came — not to pull, just to move, to range ahead and report back in the way dogs do, returning to check in and then ranging out again. The first three days found rabbit tracks, old ones. The fourth day found fresher tracks, and they followed them for two hours before losing them in a tangle of deadfall. The fifth day found nothing at all.</p><p>At supper on the fifth evening Knud said &quot;are we going to run out of food&quot; in the matter-of-fact tone of a six-year-old asking a practical question, and the table went quiet.</p><p>&quot;No,&quot; Agda said.</p><p>&quot;How do you know?&quot;</p><p>&quot;Because we&#39;re going to find something tomorrow.&quot;</p><p>They didn&#39;t find something tomorrow. They found something on the morning of the ninth day — Torben, ahead of Sven by fifty yards, stopped so suddenly that the dogs pulled up around him. He held up his hand without turning around.</p><p>Sven came up slowly.</p><p>The bear was three hundred yards off, moving between the pale trees with the unhurried ease of an animal that didn&#39;t know it was being watched. Large. Dark against the snow. Moving away from them, parallel to the ridge.</p><p>They didn&#39;t speak. Sven raised the rifle and waited, and the bear moved into a gap between two trunks, and Sven fired.</p><p>The sound of it rolled across the valley and came back off the escarpment. The dogs were absolutely still.</p><p>After a moment Torben said, quietly, &quot;Did you—&quot;</p><p>&quot;Yes,&quot; Sven said.</p><p>Getting it back took the rest of the day and required all five dogs and both sleds and a great deal of rope and Torben&#39;s back would ache for a week afterward. But by evening it was in the supply room — more meat than they&#39;d had since leaving home, properly cold, the whole room transformed.</p><p>Agda stood in the supply room doorway for a long time.</p><p>Then she moved the canvas. And found the harnesses. And behind the harnesses found the box.</p><p>She stood looking at it.</p><p>&quot;Torben,&quot; she said.</p><p>Her voice was perfectly calm, which was how Torben knew it was serious. He came to the doorway and looked at the box and looked at his mother and said nothing.</p><p>&quot;Explain,&quot; she said.</p><p>So he did. All of it — the counting, the watching, the two days of thinking about it, the decision. He said it plainly and didn&#39;t make excuses and waited when he was done.</p><p>The supply room was quiet. Sven looked at the box. Then at Torben. Then he did the arithmetic — what they&#39;d had, what they&#39;d thought they had, what they would have done if the box had stayed where it was.</p><p>&quot;If you hadn&#39;t hidden it,&quot; Lise said slowly, from behind Torben, &quot;we wouldn&#39;t have looked. We would have just kept eating. And by the time we realized—&quot;</p><p>&quot;It would have been too late to do anything about it,&quot; Torben said. &quot;The hunting took nine days. We needed that nine days.&quot;</p><p>&quot;You should have told us,&quot; Agda said.</p><p>&quot;I know,&quot; Torben said. &quot;I thought about that too. But I didn&#39;t think anyone would take it seriously enough if I just said the words. I thought—&quot; He stopped. &quot;I thought if you saw it you&#39;d believe it.&quot;</p><p>The supply room was quiet again.</p><p>Sven looked at his son for a long moment. Then he picked up the box and put it with the others.</p><p>&quot;He&#39;s right,&quot; he said to Agda. &quot;We wouldn&#39;t have believed it.&quot;</p><p>Agda looked at the box. Then at Torben. Then at the bear meat filling the back of the room.</p><p>&quot;You&#39;re right,&quot; she said. &quot;And you&#39;re also in trouble.&quot;</p><p>&quot;I know,&quot; Torben said.</p><p>&quot;But less trouble than I thought,&quot; she said. &quot;Go wash up. Supper.&quot;</p><p>Torben went. Knud, who had witnessed the entire thing from the passage, tugged Lise&#39;s sleeve.</p><p>&quot;Is he in trouble?&quot; he whispered.</p><p>&quot;Yes,&quot; Lise whispered back.</p><p>&quot;But less?&quot;</p><p>&quot;Less.&quot;</p><p>Knud considered this. &quot;Good,&quot; he said, and followed Torben to wash up.</p>` },
  { heading: "Chapter Six — Before It Hits", content: `<p>Sven saw it on the morning of the third day after the bear.</p><p>He&#39;d gone out early to check the snares and stopped on the ridge and looked north and stood there long enough that Torben, coming up behind him, stopped too and looked at the same thing without asking what he was looking at.</p><p>The sky to the north was a color that had no good name — not grey, not green, not white, but something between all three that meant only one thing to anyone who&#39;d seen it before.</p><p>&quot;How long?&quot; Torben said.</p><p>&quot;A day. Maybe less.&quot;</p><p>They looked at it a moment longer. Then Sven turned around.</p><p>&quot;We have a lot to do,&quot; he said.</p><p>Back at the cave Sven laid it out plainly, the way he laid out things that needed to be understood quickly and completely. The storm coming was not the last storm. The last storm had kept them inside for seven days. This one, by the look of the sky, was going to be longer.</p><p>&quot;How much longer?&quot; Agda said.</p><p>&quot;Seven times, maybe. Maybe more.&quot;</p><p>The cave was very quiet.</p><p>&quot;Right,&quot; Agda said. &quot;What does everyone do?&quot;</p><p>Sven told them.</p><p>Torben had his coat on before Sven had finished the sentence about hunting. The forest was going to empty out — every animal that could move was already moving, pressing south ahead of the weather, and if they were going to find anything it had to be today, and it had to be soon.</p><p>They took both dogs as scouts and left the other three with the cave. The forest was different this morning — there was a quality to the silence that Sven recognized, a held-breath feeling, the birds gone, the usual small movements of the undergrowth absent. Everything that knew what was coming had already started responding to it.</p><p>They found the tracks within the hour. Not rabbits — something larger, a group of them, moving south along the valley floor. Sven crouched over the prints and looked at them carefully.</p><p>&quot;Caribou,&quot; he said. &quot;Young ones, by the size. Moving fast.&quot;</p><p>&quot;How many?&quot;</p><p>&quot;Six. Seven.&quot; He stood. &quot;Come on.&quot;</p><p>They moved at a pace just below running, the dogs ranging ahead. The tracks were fresh — minutes old. The animals were close, pushing hard through the snow, and Sven and Torben pushed hard after them.</p><p>They found them in a clearing a mile south — seven of them, dark and bristled and moving with the urgent purposefulness of creatures that had somewhere to be. Sven stopped. Raised the rifle. Beside him Torben was already ready with the second.</p><p>Two shots.</p><p>Five animals kept running. Two did not.</p><p>&quot;That&#39;s all we&#39;re getting,&quot; Sven said.</p><p>&quot;That&#39;s enough,&quot; Torben said.</p><p>They loaded the sleds fast, the dogs pulling hard on the way back, the sky to the north now visibly lower and darker than it had been an hour ago. The wind was just starting — a thin edge to it, the leading edge of something much larger behind.</p><p>Agda had started on the snow room the moment Sven and Torben left.</p><p>The spot she&#39;d chosen was a deep alcove off the main passage — not large, but cut off from the main cave by a natural lip of rock that the dogs couldn&#39;t easily get over. She and Knud had blocked it further with a fitted piece of deadfall, wedged tight: a door the dogs understood as closed.</p><p>Then she went to work.</p>` },
  { heading: "Chapter Six — Before It Hits (continued)", content: `<p>She carved the alcove deeper with the chisel and the hand axe, working steadily, Freja in the wrap watching everything with her usual focused attention. What she was making was a cold room — a chamber packed floor to ceiling with clean snow, sealed in, kept cold by the rock around it. Snow meant water. Water meant they didn&#39;t have to go out for it.</p><p>By midday the alcove was twice its original depth. By mid-afternoon it was packed solid with snow, the entrance sealed with a flat stone that could be lifted but that kept the cold in. Agda pressed her hand against the stone and felt the cold radiating through it and nodded.</p><p>&quot;Good,&quot; she said to Freja.</p><p>Freja had an opinion about this, as she had opinions about most things, and expressed it.</p><p>&quot;Yes,&quot; Agda said. &quot;I agree.&quot;</p><p>Lise had the preparation room ready by midmorning — a clear flat space in the main chamber, the good knives laid out, the salt, the smoking rack Torben had built during the first storm positioned over a low section of the fire. She&#39;d watched how Sven and Agda had handled the bear and she&#39;d asked questions she hadn&#39;t asked then but had been saving, and she thought she knew what to do.</p><p>When the sleds came back she was ready.</p><p>She wasn&#39;t entirely ready for two of them at once, but she managed, and Torben worked beside her without being asked, and by the time the wind outside had become something they could hear clearly through the sealed entrance they had both animals dealt with, the meat sorted, the best cuts salted, the rest hung to smoke.</p><p>Lise looked at the smoking rack and then at the entrance and then at Torben.</p><p>&quot;Close,&quot; she said.</p><p>&quot;Close,&quot; he agreed.</p><p>Knud had interpreted his instructions liberally, which was the only way Knud ever interpreted instructions.</p><p><em>Make the house warmer and more comfortable because we might be inside for a long time</em> had resulted in, over the course of the morning: additional branch layering on every room floor, a second fire ring built in the main chamber from flat stones for cooking separate from the heating fire, a system of hanging the spare canvas from the ceiling of the main passage to trap warm air that Knud had arrived at independently and that was, Lise noted privately, genuinely clever, three rocks heated by the fire and wrapped in cloth and placed in each person&#39;s room before bed, and a shelf carved into the wall of the main chamber at sitting height that Knud announced was for putting things on.</p><p>&quot;What things?&quot; Lise said.</p><p>&quot;Whatever things people want to put on it,&quot; Knud said, as if this were obvious.</p><p>By midday Knud had also — on his own initiative, without being asked, using time he felt he had to spare — made three trips to the woodpile and come back with his arms full each time.</p><p>&quot;Firewood party,&quot; he said, on the third trip, to no one in particular.</p><p>&quot;On your own?&quot; Lise said.</p><p>&quot;Somebody has to,&quot; Knud said.</p><p>The last of the firewood came in as the wind flared.</p><p>Sven felt it the moment he stepped outside — not a gust but a sustained push, the kind of wind that had made a decision and was committed to it. He and Torben made two more runs to the woodpile, fast, loading the sleds with as much as they&#39;d take, the dogs leaning into the harnesses with their ears flat.</p><p>On the second run back the snow started.</p><p>Not the light flakes of the first storm&#39;s beginning — these were heavy and fast and horizontal, and by the time they&#39;d unloaded and Sven had pulled the last sled inside and Torben had fitted the door into its frame and packed the entrance, the valley outside was already gone.</p><p>Sven stood in the passage and listened to the wind build.</p><p>Then he went into the main chamber where the fire was going and the smoking meat was hanging and the new shelf was on the wall and the canvas baffles were trapping the warm air in the passage and everyone was there — Agda with Freja, Lise already at the fire, Torben sitting against the wall with his eyes closed, Knud standing in the center of the room with his arms crossed looking at his improvements with quiet satisfaction.</p><p>&quot;Everyone good?&quot; Sven said.</p><p>&quot;Everyone good,&quot; Agda said.</p><p>Outside, the storm arrived in full.</p><p>Inside, the cave held it the way the cave held everything — steadily, without complaint, as if it had been waiting for exactly this.</p>` },
  { heading: "Chapter Seven — Inside", content: `<p>By morning the entrance was gone.</p><p>Not blocked — gone, buried so completely that where the door had been was now simply a smooth white wall of packed snow, floor to ceiling, as if the cave had never had an opening at all. Sven pressed his hand against it and felt the resistance of several feet of hard-packed snow on the other side.</p><p>&quot;Well,&quot; he said.</p><p>&quot;We have the snow room,&quot; Agda said, from behind him. &quot;And enough wood for three weeks. And the meat.&quot;</p><p>&quot;I know,&quot; Sven said. He wasn&#39;t worried. He was noting.</p><p>The storm ran without pausing for two days. On the third morning Torben woke before the others and lay in his room listening and noticed something.</p><p>The sound had changed.</p><p>Not stopped — the wind was still there, somewhere above them, still moving hard. But the quality of it was different. The constant driving pressure against the rock, the low vibration in the stone that you stopped noticing only when it was gone — that was gone. He got up and went to the entrance passage and put his hand against the snow wall and pressed.</p><p>Still solid. But the sound was different.</p><p>He went and woke Sven.</p><p>Sven listened. Then he nodded. &quot;Taking a breath,&quot; he said. &quot;It won&#39;t last. A few hours at most.&quot;</p><p>Torben was already looking at the firewood room.</p><p>&quot;We&#39;re not low,&quot; Sven said.</p><p>&quot;We&#39;re not full either,&quot; Torben said.</p><p>Sven looked at him for a moment. Then: &quot;Take the small shovel.&quot;</p><p>It took Torben forty minutes to dig through, shoveling the snow back into buckets and carrying it to the snow room until Agda said the snow room was full and to stop bringing snow, at which point he packed it into the side of the tunnel walls instead, compressing it until the passage was narrow but clear — wide enough for a person, wide enough for an armload of wood.</p><p>He emerged into a world that looked like it was deciding what to do next.</p><p>The valley was buried. The escarpment, the ridge, the burned trees — everything wore the same heavy white coat, and the sky above it was a deep angry yellow-grey, the color of a bruise, the color of something not finished. There was no wind. The air was absolutely still in the way that air is still before something large happens, and Torben felt it on his face and understood that Sven was right — a few hours, maybe less.</p><p>He went to the firewood stack. The top half was under snow but the base was accessible where the overhang had protected it, and he started pulling pieces and stacking them in the tunnel entrance and going back for more. He didn&#39;t hurry, exactly, but he moved with the focused efficiency of someone who understands that the available time is finite and has decided to use all of it.</p><p>Four loads. Five. Six. Each time he came back the sky looked slightly more like it had made up its mind.</p><p>On the seventh load he stopped and looked up and looked at the sky for a long moment. Then he brought the seventh load in, pulled the canvas flap tight across the entrance, and packed snow against the base of it until it stopped being a gap and started being a wall.</p><p>&quot;Done,&quot; he said, to the passage.</p><p>The firewood room was full. He stood in the doorway and looked at it with the particular satisfaction of a room that could not hold any more wood.</p><p>From the main chamber came the smell of lunch.</p><p>Agda had used the time well. The main chamber smelled of broth and something sweet — she&#39;d melted snow from the snow room and made a proper soup from the smoked meat and the dried things at the bottom of the last supply box, and there was a flatbread on the hot stone beside the fire, and everyone ate too much and didn&#39;t apologize for it.</p><p>Outside, after a while, the wind came back.</p><p>It came back differently than before — not building gradually but arriving all at once, a wall of sound that hit the rock and went around it and kept going, the storm resuming as if it had only stopped to take a breath, which was exactly what it had done.</p><p>Inside, nobody particularly noticed. They were eating.</p><p>Torben built the table on the fourth day of the storm, which was the day he ran out of other things to do.</p><p>It wasn&#39;t complicated — two split logs for the top, four shorter rounds for legs, the joints notched and fitted so it didn&#39;t wobble. He worked in the main chamber with the chisel and the small saw, measuring by eye, adjusting until it sat flat on the stone floor without rocking. The surface he smoothed with the flat stone until it had the quality of something deliberate.</p><p>Knud watched the entire process with the attention of someone filing information away.</p><p>&quot;I could make one,&quot; Knud said.</p><p>&quot;You could try,&quot; Torben said.</p><p>&quot;For my room.&quot;</p><p>Torben looked at Knud&#39;s room, which was roughly the size of a large cupboard. &quot;It wouldn&#39;t fit.&quot;</p><p>&quot;A small one,&quot; Knud said.</p><p>Torben handed him a piece of scrap wood and the small chisel. &quot;Go ahead.&quot;</p>` },
  { heading: "Chapter Seven — Inside (continued)", content: `<p>Knud&#39;s table took two days and was, structurally, ambitious. It had five legs, none of them the same height, and a surface that was technically flat if you accepted a fairly generous definition of flat. Knud set it in his room and put a rock on it and declared it done.</p><p>&quot;It leans,&quot; Lise said, from the doorway.</p><p>&quot;It&#39;s supposed to,&quot; Knud said.</p><p>Nobody argued. The rock stayed on the table. The table stayed in the room.</p><p>It was Lise who said it first, two hours after lunch, sitting against the wall of the main chamber watching the fire.</p><p>&quot;I need to do something,&quot; she said.</p><p>&quot;You could sleep,&quot; Torben said. He was already half asleep himself, which was how Torben spent the post-lunch portion of storm days.</p><p>&quot;I don&#39;t want to sleep.&quot;</p><p>&quot;You could help me not sleep,&quot; Knud offered. He was very much awake and had been for some time, moving through the main chamber in an orbit that suggested he was looking for a project.</p><p>Lise looked at the woodpile. At the big unsplit log they&#39;d brought in last, too large for the fire as it was, set aside to be dealt with later. At the bag of powder on the supply shelf.</p><p>She stood up.</p><p>&quot;I need the chisels,&quot; she said. &quot;And somebody to help think.&quot;</p><p>It started as a channel — a single groove carved into the top face of the log, just wide enough for a ball to roll in. Lise drew it out first in charcoal on the wood: a path that curved and branched and had two possible routes from top to bottom, one fast and one slow.</p><p>&quot;A puzzle,&quot; Knud said, understanding immediately.</p><p>&quot;You have to figure out which pieces go where,&quot; Lise said. &quot;The log splits into sections. Each section has part of the channel. If you put them together wrong the ball falls off.&quot;</p><p>She looked at the log for a moment, then at the bag of powder.</p><p>&quot;And the ball,&quot; Knud said.</p><p>&quot;And the ball,&quot; Lise agreed.</p><p>The ball came first. The powder mixed with limestone dust and water made a paste that could be shaped, and Lise rolled it between her palms until it was round and smooth and set it near the fire to cure. Then she and Torben — who had woken up when Lise started using the chisel, because Torben had a sense for when things were becoming interesting — started on the log.</p><p>It took all afternoon. Sven helped with the splitting, clean cuts that divided the log into five sections. Knud was in charge of carrying chips and keeping the workspace clear, a role he executed with dedication and occasional commentary. Agda carved one of the middle sections herself, working steadily, the channel in her section curving around a natural knot in the wood in a way that created a satisfying slowdown before the speed picked back up.</p><p>By evening the five sections were carved and the joints between them were sanded smooth with a flat stone and the ball had cured hard enough to test.</p><p>Lise assembled it. The channel ran unbroken from one end of the log to the other, the sections fitting together with a satisfying solidity, the ball sitting at the top waiting.</p><p>Everyone had gathered. Even the dogs were watching, which was probably coincidence.</p><p>Lise tipped the first section and the ball went.</p><p>It ran the fast route, clicking through the joints, speeding around the curve Agda had carved, dropping the last inch into the catch at the bottom with a small hard sound.</p><p>Nobody said anything for a moment.</p><p>Then Knud grabbed it and put it back at the top.</p><p>&quot;Again,&quot; he said.</p><p>They played it until supper, which was late because nobody wanted to stop. The puzzle element — the sections could be rearranged to make different paths, some of which worked and some of which dropped the ball halfway — kept it interesting long after a simpler toy would have been exhausted. Knud found a configuration that made the ball spiral twice before dropping. Lise found one where the ball appeared to stop, teetered, and then continued. Torben found one that didn&#39;t work at all no matter how you held it, and spent twenty minutes trying to prove himself wrong.</p><p>&quot;It just doesn&#39;t work,&quot; Lise said.</p><p>&quot;There has to be a way,&quot; Torben said.</p><p>There wasn&#39;t. This was, somehow, also satisfying.</p><p>Outside the storm went on doing what the storm was doing, which was considerable. Inside the cave the fire burned and the ball ran its tracks and the family ate supper late with the marble run disassembled in the center of the table so everyone could look at the sections and think about what they&#39;d try next.</p><p>&quot;Same time tomorrow?&quot; Knud said.</p><p>&quot;We&#39;re not going anywhere,&quot; Torben said.</p><p>&quot;Same time tomorrow,&quot; Knud agreed.</p>` },
  { heading: "Chapter Eight — The Log", content: `<p>The storm showed no signs of stopping, which by this point nobody was particularly bothered by.</p><p>They had the marble run. They had Knud&#39;s five-legged table. They had the fire and the meat and three weeks of wood and the snow room. What they didn&#39;t have, Torben decided on the morning of the eighth day inside, was enough to do.</p><p>He said this to Sven, who thought about it for a moment and then said: &quot;The big pine. The one that fell against the ridge on the east side. The center will be dry all the way through.&quot;</p><p>&quot;How big?&quot;</p><p>&quot;Big enough,&quot; Sven said.</p><p>They went out together — Torben and Sven and all five dogs, who had been waiting patiently for exactly this kind of opportunity. The valley was still buried but the tunnel was clear and the snow outside had settled enough to walk on the surface if you were careful, which the dogs were not, and which resulted in all five of them periodically punching through the crust and having to be retrieved, which they accepted with good humor.</p><p>The fallen pine was where Sven remembered it, half-buried but enormous — three feet across at the base, the heartwood solid and dry and dense, the kind of wood that had been waiting for a use. They cut a section four feet long with the big saw, the dogs sitting in a row watching with the focused attention of animals who understood this was important work and wanted to be acknowledged as part of the effort.</p><p>Getting it back took an hour and both sleds and a great deal of leverage. When it finally came through the tunnel entrance and sat in the middle of the main chamber it filled the space in a way that made everything else look smaller.</p><p>Knud walked around it twice. Then he put his hand on it.</p><p>&quot;What are we making?&quot; he said.</p><p>&quot;Everything,&quot; Lise said.</p><p>They made everything.</p><p>It started with the wood itself — Sven splitting sections from the outer ring, Torben working the heartwood into flat pieces with the hand axe, the grain tight and even and good. The offcuts went to the fire. Nothing was wasted.</p><p>Lise made a set of nine pins from the roundest sections — identical height, identical width, sanded until they were smooth enough to stand upright on the flat stone floor. Knud made the ball immediately, a dense heartwood sphere that took him a full day and came out slightly oval, which he insisted was intentional for unpredictable rolling, which turned out to be true. They set the pins up at the end of the main passage and took turns from a line scratched in the stone, and the sound of the ball hitting the pins echoed through the cave in a way that was enormously satisfying.</p><p>Torben made a set of flat pieces in graduated sizes — five of them, each one smaller than the last — that stacked into a tower and could be reassembled after knocking over. Freja, who had recently become very interested in knocking things over, found this inexhaustible. Torben rebuilt the tower approximately forty times over two days and seemed, somehow, not to mind.</p><p>Agda made the figures. She worked in the evenings, when the others were playing or sleeping, carving faces into small rounds of heartwood — a man, a woman, three children, a baby, five dogs. She set them on Knud&#39;s shelf without comment and said nothing about them. Knud arranged them in the morning into a scene he didn&#39;t explain and that nobody asked about.</p><p>Sven made a board game with a grid of shallow holes drilled into a flat piece of heartwood, and carved fifty small pegs in two colors, and worked out the rules over the course of an evening, playing against himself, adjusting until it was balanced. He taught it to Lise first. By the second day everyone knew it. By the fourth day Lise was winning consistently and Torben was spending his mornings studying the board before anyone else was up.</p><p>Knud made a thing he called a spinner — a flat disc of heartwood balanced on a pointed peg, that when spun held its motion for a surprisingly long time. Its practical application was unclear but its entertainment value was immediate and Knud spun it approximately two hundred times across three days.</p><p>Lise added a second track to the marble run — parallel to the first, slightly faster, so that two balls could race. The ball against ball configuration produced results that were genuinely unpredictable and that occupied an entire afternoon of the entire family.</p><p>The dogs got a toy too: a dense heartwood knot, too heavy to chew through, that could be thrown and retrieved and that made a satisfying clack on the stone floor when dropped. All five dogs understood it immediately. There was occasionally mild disagreement about whose turn it was.</p><p>On the last evening of the storm — though nobody knew it was the last evening — they were all sitting around the table, the games spread between them, the fire good, the cave warmer than it had been since they&#39;d moved in.</p><p>Lise was looking at the ceiling. She did this sometimes, working something out.</p><p>&quot;The smoke hole,&quot; she said.</p><p>&quot;What about it?&quot; Sven said.</p><p>&quot;It goes up through the rock and out above the cave roof. And the snow melts around it from the heat.&quot;</p>` },
  { heading: "Chapter Eight — The Log (continued)", content: `<p>&quot;Yes.&quot;</p><p>&quot;So the rock up there is warm. And if we carved a bowl in the rock above — big enough to collect snow — and ran a pipe down through the same channel as the smoke hole, just off to the side—&quot;</p><p>Sven put down his cup.</p><p>&quot;The bowl fills with snow,&quot; Lise continued. &quot;The heat from the smoke melts it. The water runs down the pipe. We have water at the counter without going out.&quot;</p><p>The table was quiet.</p><p>&quot;The bowl would need to be big,&quot; Agda said. She was already thinking about it, not questioning it.</p><p>&quot;We&#39;d need a pipe,&quot; Torben said. &quot;Clay-lined. Long enough to reach the counter.&quot;</p><p>&quot;We could seal it with the mortar,&quot; Lise said. &quot;So it doesn&#39;t freeze in the channel.&quot;</p><p>&quot;When the snow is gone,&quot; Sven said slowly, &quot;we&#39;d have to fill the bowl by hand. Carry water up and pour it in.&quot;</p><p>&quot;Yes,&quot; Lise said. &quot;But that&#39;s not a problem. We can go out then.&quot;</p><p>Sven looked at the ceiling. Then at Agda. Then back at the ceiling, which was really a stand-in for the rock above it, and the bowl that didn&#39;t exist yet, and the pipe that didn&#39;t exist yet, and the water that would come from it when they did.</p><p>&quot;In the morning,&quot; he said, &quot;we start on the pipe.&quot;</p><p>&quot;In the morning,&quot; Agda said, &quot;we go out.&quot;</p><p>Everyone looked at her.</p><p>&quot;The storm,&quot; she said. &quot;Listen.&quot;</p><p>They listened.</p><p>The cave was quiet. Not the muffled roaring quiet of the storm pressing against the rock — just quiet. Still. The silence of a place where nothing outside was moving.</p><p>Knud went to the entrance passage and pressed his hand against the snow wall.</p><p>&quot;Cold,&quot; he said. &quot;But it&#39;s not shaking.&quot;</p><p>&quot;It stopped,&quot; Torben said.</p><p>&quot;Sometime tonight,&quot; Agda said. &quot;While we were playing.&quot;</p><p>The fire crackled. One of the dogs shifted. Freja, asleep in the corner, made a small sound and settled.</p><p>Outside, for the first time in weeks, there was nothing but snow and cold and stars and the burned forest standing in its thousands, pale and still and patient, waiting for whatever came next.</p><p>&quot;Tomorrow then,&quot; Sven said.</p><p>&quot;Tomorrow,&quot; Lise agreed. She was already thinking about the pipe.</p>` },
  { heading: "Chapter Nine — Out", content: `<p>The morning after the storm ended they dug out.</p><p>It took three hours. The snow outside the entrance was eight feet deep in places, packed hard by the wind, and Torben and Sven worked in shifts while the others passed buckets back to the snow room until the snow room was full and then packed it into the tunnel walls and then simply moved it outside through the hole they were making. The dogs supervised from inside, heads tilted, offering no practical assistance.</p><p>When the entrance finally opened and the cold outside air came flooding in, Knud pushed past everyone and stood blinking in the white valley and looked at the sky, which was the deep clear blue of a world that had finished something and was starting something else.</p><p>&quot;Oh,&quot; he said, which was more than enough.</p><p>The kitchen took two weeks, which was about right for what it was.</p><p>Lise&#39;s pipe came first — Sven and Torben working from the top of the cave and from the counter below simultaneously, drilling and chiseling through eight feet of solid rock, meeting in the middle with a satisfying exactness that nobody had been entirely certain would happen. The pipe was clay-lined, sealed with mortar at every joint, fitted with a simple wooden valve at the counter end that could be opened or closed. At the top, accessible by climbing the rock face above the cave entrance, a wide shallow bowl carved into the stone, packed with snow.</p><p>The first time Lise opened the valve and water ran out — cold, clean, steady — she stood at the counter and watched it for a long moment without saying anything.</p><p>&quot;Well done,&quot; Sven said.</p><p>&quot;It was obvious,&quot; Lise said. But she was smiling.</p><p>The counter came next — proper this time, not the split log of the tent camp but flat heartwood planks fitted edge to edge, the surface level and smooth, the height exactly right. Agda specified the height on the first morning and nobody questioned the specification. A shelf above it, a shelf below. Hooks for the pots. A stone basin fitted into the counter surface below the pipe outlet, sealed with mortar so it held water.</p><p>The fire arrangements took the most work. Agda wanted two cooking surfaces — a high flame for boiling, a low flat stone for slow cooking — and she wanted them positioned so she could work at both without moving more than a step. Sven built what she described. It took four attempts to get the draw right so both fires pulled cleanly without competing. On the fourth attempt the smoke went up the hole cleanly and the fires burned the way fires should burn and Agda stood in front of it and did a small amount of cooking just to test it and the results of the test were eaten immediately by everyone present.</p><p>Torben built a proper door for the cave entrance — fitted timber, leather hinges, a latch that worked from both sides. Knud built a step for in front of it. The step had three levels, which were not all strictly necessary, but Knud felt strongly about them and they were solid.</p><p>By the end of the two weeks the cave had stopped looking like a place people were making do and started looking like a place people lived.</p><p>The children went out every day that the work allowed, which was most days.</p><p>Knud went furthest and came back with the most to report, which was the natural order of things. Lise went systematically, working outward from the cave in widening circles, adding to the map she&#39;d been keeping in her notebook since the first night in the cave. Torben ranged the high ground and came back with information about game trails and snowpack and the state of the ridge, which he reported to Sven in the evenings with the brevity of someone who had identified what was useful and left out the rest.</p><p>On the fourth day out Lise found the vines.</p><p>They were on the south-facing slope above the valley floor, half-buried in snow but still clinging to the burned trees, the dead canes thick and tangled. She pushed the snow away from the base of one and found the remains of last year&#39;s growth — dried, collapsed, but with the shape of something that had been substantial. At the base of the canes, where the stem met the ground, the earth was darker and looser than the surrounding soil.</p><p>She came back and reported it at supper.</p><p>&quot;Vines,&quot; Sven said.</p><p>&quot;Something fruiting. The canes are too thick for ornamental. And the soil at the base has been worked — something grew there, something large. I couldn&#39;t identify it.&quot;</p><p>&quot;Squash,&quot; Agda said, from the fire. &quot;Or melon. Or something close to one of those. The canes look right.&quot;</p><p>&quot;We don&#39;t know that,&quot; Lise said.</p><p>&quot;No,&quot; Agda agreed. &quot;We don&#39;t.&quot;</p><p>They went back the next morning, all of them, and Lise showed them the vines. Sven dug carefully at the base of one and found the remnants of last season&#39;s growth — a dried rind, collapsed, the seeds inside small and pale. He held one up. Nobody could identify it.</p><p>&quot;In a few months,&quot; Agda said, looking at the slope, &quot;these will fruit again.&quot;</p><p>&quot;If it&#39;s warm enough,&quot; Torben said.</p><p>&quot;This slope faces south. It&#39;s the warmest ground in the valley.&quot; She looked at the vines for a moment. &quot;Something grew here before the fire. The roots are still alive. They&#39;ll come back.&quot;</p><p>&quot;But we don&#39;t know if it&#39;s edible,&quot; Lise said. She said it not as an objection but as a fact that needed to be on the table.</p><p>&quot;No,&quot; Sven said. &quot;We don&#39;t.&quot;</p><p>They stood on the slope looking at the vines for a moment.</p><p>&quot;We wait,&quot; Agda said. &quot;When it fruits, we leave some out where the birds can find it. If the birds eat it, we eat it.&quot;</p><p>&quot;And if they don&#39;t?&quot; Knud said.</p><p>&quot;Then we don&#39;t,&quot; Agda said simply.</p><p>Knud looked at the vines. Then at the sky, as if checking on the birds.</p><p>&quot;How long?&quot; he said.</p><p>&quot;Two months,&quot; Agda said. &quot;Maybe three.&quot;</p><p>Knud nodded, with the patience of a six-year-old who has decided that two months is a reasonable amount of time to wait for something potentially edible.</p><p>&quot;Firewood party while we wait?&quot; he said.</p><p>&quot;Always,&quot; Sven said.</p>` },
  { heading: "Chapter Ten — Spring", content: `<p>It was Lise who said it first, which surprised her.</p><p>She&#39;d been sitting at the cave entrance on a morning in late March, watching the snow pull back from the south-facing slope in slow daily increments, and she&#39;d thought about her best friend at home — Marta, who would have found the marble run immediately interesting and the board game immediately competitive and the five-legged table immediately something to have opinions about — and the thought had arrived with a weight she hadn&#39;t expected.</p><p>&quot;I miss home,&quot; she said, to nobody in particular.</p><p>From inside the cave Agda said, quietly, &quot;I know.&quot;</p><p>They didn&#39;t talk about it extensively. They didn&#39;t need to. It moved through the family over the following days the way these things do — not announced, just present, a new layer underneath the daily work. Sven wrote a letter he couldn&#39;t send yet and folded it and put it in the supply box. Torben spent an evening carving something small and careful that turned out to be a copy of a chair from the kitchen at home, exact in every detail, which he put on the shelf without comment. Knud asked, on a Tuesday evening, whether his dog was okay — his dog at home, the old brown one — and Agda said yes, of course, the neighbors were looking after him, and Knud said good and went back to his spinner and didn&#39;t bring it up again but the asking of it had meant something.</p><p>&quot;After the fruit,&quot; Sven said one evening.</p><p>Everyone knew what he meant. After the fruit they&#39;d go home. Not because the cave wasn&#39;t good, not because the valley wasn&#39;t good — it was, it was extraordinary — but because home was also good and the people in it were waiting.</p><p>&quot;After the fruit,&quot; Agda agreed.</p><p>Spring arrived slowly and then all at once, the way it does in the north.</p><p>The snow retreated up the slopes. The frozen stream unlocked and ran cold and fast along the valley floor. The burned trees, which had been pale all winter, developed a quality of patience — as if they&#39;d been waiting for exactly this, the ground around their roots softening, the low brush between them pushing up new green growth in shoots that were almost aggressively alive after the months of white.</p><p>The dogs went mad with it. They ran the valley in wide loops every morning, nose down, cataloguing the new world. The oldest dog, the steady grey-muzzled one, ran with them and came back panting and satisfied in a way he hadn&#39;t been since autumn.</p><p>The games continued. Sven added a second board game — different rules, longer, better for evenings. Knud made a set of throwing rings from bent heartwood that could be tossed onto pegs at varying distances, a game that required more skill than it appeared to and that Knud was, inexplicably, the best at. Lise made a card game from flat pieces of heartwood with symbols carved into them that took an afternoon to learn and became the default evening activity for three weeks running. Torben and Sven played it badly and cheerfully and lost to Lise consistently and didn&#39;t particularly mind.</p><p>They took long walks. The valley revealed itself differently in spring — hollows that had been buried showed themselves, rock formations emerged from the snow, the stream had carved a small waterfall at the north end that nobody had known was there. Lise added to her map every day. Knud found three different dens under the deadfall and investigated all of them to a depth that made Agda quietly anxious. Nothing was home in any of them, which Knud seemed to find mildly disappointing.</p><p>One morning in April Sven stood at the cave entrance with his coffee and watched the burned forest and felt — not for the first time, but more clearly than before — that it was beautiful. Not despite the dead trees but including them, the pale trunks in the morning light, the green coming up between them, the sky above enormous and clear. A world making itself over.</p><p>He didn&#39;t say this out loud. He didn&#39;t need to.</p><p>On a morning in late May Knud came back from the south slope at a run.</p><p>&quot;They&#39;re coming,&quot; he said.</p><p>They went to look. The vines had been showing signs for two weeks — new growth along the canes, leaves pushing out, a vitality that was impossible to miss — but now there was something else: small swellings at the nodes, tight and green, unmistakably the beginning of fruit.</p><p>Two kinds. One on the lower canes, round and pale green, already fist-sized and growing. One higher up, longer, darker, a different shape entirely.</p><p>&quot;Squash,&quot; Agda said, pointing to the lower ones. &quot;And melon. Or close enough.&quot;</p><p>They watched them for two more weeks, checking every morning. The fruit swelled steadily, the pale green ones going rounder and heavier, the longer ones deepening in color. The whole slope smelled faintly sweet on warm afternoons.</p><p>When the first ones looked ready Agda cut two — one of each — and carried them back to the cave and set them on the counter and looked at them.</p><p>&quot;Now we wait for the birds,&quot; Lise said.</p>` },
  { heading: "Chapter Ten — Spring (continued)", content: `<p>&quot;Now we wait for the birds,&quot; Agda agreed.</p><p>They cut a section from each fruit and set the pieces on a flat stone fifty yards from the vines, in the open, visible from the cave entrance. Then they went inside and did other things and tried not to watch, which worked for approximately twenty minutes before everyone was watching.</p><p>The first bird arrived within the hour — a grey jay, bold and quick, that landed on the stone and looked at the fruit and took a piece and flew off. Then another. Then three ravens in succession, each one more confident than the last.</p><p>By midday the pieces were gone.</p><p>By the following morning there were birds on the stone before the family was up, waiting for more. When Knud went out to look he found them lined up with the focused patience of creatures who had discovered something worth coming back for.</p><p>&quot;They like it,&quot; Knud said.</p><p>&quot;They really like it,&quot; Torben said.</p><p>&quot;We should put the samples out far from the plants,&quot; Lise said. &quot;Otherwise—&quot;</p><p>&quot;They&#39;ll eat everything on the vine before we get any,&quot; Sven finished.</p><p>Lise looked at the birds on the stone, then at the slope, then back at the birds. &quot;We learned something,&quot; she said.</p><p>&quot;We learned something,&quot; Sven agreed.</p><p>They harvested carefully the following week — not everything, leaving plenty on the vine — and brought the first load back to the cave kitchen.</p><p>Agda cooked the squash first, slow on the flat stone, with salt from the supply shelf. The smell of it filled the cave in a way that the cave hadn&#39;t smelled before — sweet and rich and warm, a smell that belonged to a kitchen in a house, not a cave on a slope above a buried valley. Everyone found a reason to be in the main chamber while it cooked.</p><p>When it was ready Agda put it on the table and they ate it and nobody said anything for a moment.</p><p>Then Knud said, with great feeling: &quot;That is the best thing I have ever eaten.&quot;</p><p>&quot;You say that about everything,&quot; Torben said.</p><p>&quot;I mean it this time,&quot; Knud said.</p><p>The melon came next — eaten raw, cold from the cave, the flesh pale and sweet and so good that Freja, presented with a small piece, made a sound that caused everyone to laugh. She reached for more immediately.</p><p>Lise sat back and looked at the table — the squash bowl, the melon rind, everyone still eating, the fire going, the games on the shelf, the dogs watching with professional interest from the edge of the room.</p><p>&quot;We should have come here years ago,&quot; Knud said.</p><p>&quot;We didn&#39;t know it was here,&quot; Torben said.</p><p>&quot;We know now,&quot; Knud said.</p><p>Outside, the burned forest stood in the long spring evening, the pale trunks lit gold, the green ground between them full of new things growing.</p>` },
  { heading: "Chapter Eleven — Home", content: `<p>They packed the cave the way you pack a place you intend to come back to.</p><p>The games stayed — stacked on the shelf in the main chamber, the marble run sections wrapped in cloth, the board games in their box, Knud&#39;s spinner beside them. The tools stayed, the spare mortar, the salt, the smoking rack. The kitchen stayed exactly as it was, the pipe valve closed, the basin dry, the counter bare and clean and waiting.</p><p>Lise&#39;s map went in the supply box, folded carefully. The carved figures Agda had made stayed on the shelf — the man, the woman, the three children, the baby, the five dogs — arranged in the scene Knud had set them in months ago and never changed.</p><p>&quot;Shouldn&#39;t we take them?&quot; Torben said.</p><p>&quot;They belong here,&quot; Knud said, with the certainty he reserved for things he&#39;d already settled.</p><p>Nobody argued.</p><p>Sven checked the firewood room last — still a good supply, enough for whoever came next. He pulled the door closed and latched it.</p><p>Then he stood in the main chamber and held up the lantern and looked at everything — the kitchen, the shelf, the table, the smooth stone floor, the smoke hole letting in a bar of morning sky. The cave that had been a hole in a mountain in November and was something else entirely now.</p><p>He left the lantern burning, the same as always.</p><p>They left on a Tuesday morning with the sleds loaded and the five dogs in harness and the valley green around them, the stream running, the fruit vines heavy on the south slope, the burned trees standing in their pale thousands under a sky that was warm and clear and enormous.</p><p>Knud looked back twice. Then he faced forward and walked.</p><p>The return journey was different from the arrival — the same ground in reverse, but the ground had changed, or they had, or both. The days were warm enough to shed coats by midday. The dogs moved with the easy rhythm of animals going somewhere familiar. Freja, who had arrived in November wrapped in blankets and unaware of most things, sat up on the sled and watched the passing world with the focused attention she brought to everything.</p><p>On the third day out they came to the edge of the burned forest, where the dead pale trees gave way to living ones, and the world went green and different all at once.</p><p>Knud stopped and looked back at the burned forest — the pale trunks visible for a long way back, catching the afternoon light.</p><p>&quot;We&#39;ll come back,&quot; he said. Not a question.</p><p>&quot;We&#39;ll come back,&quot; Sven said.</p><p>Erik&#39;s house was four days south of the burned forest, a low timber building at the end of a farm track with smoke coming from the chimney and a dog in the yard who announced them loudly and without apology.</p><p>Erik himself came to the door and looked at them for a long moment — the loaded sleds, the five dogs, all six of them sun-weathered and steady and present in the way people are present after a long time in a place that required their full attention — and then he smiled the smile of a man whose calculation had been correct.</p><p>&quot;You stayed,&quot; he said.</p><p>&quot;Longer than planned,&quot; Sven said.</p><p>&quot;I thought you might.&quot; Erik held the door open. &quot;Come in. There&#39;s supper.&quot;</p><p>They stayed two nights. Erik asked questions and listened carefully to the answers and asked more questions, leaning forward over the table with the interest of a man who had spent his life going to interesting places and recognized the signs of people who had just come from one. He asked about the cave, the kitchen, the pipe, the marble run. He asked about the storms. He asked about the squash.</p><p>&quot;You didn&#39;t know what it was?&quot; he said.</p><p>&quot;We still don&#39;t, exactly,&quot; Agda said. &quot;But the birds ate it.&quot;</p><p>&quot;Good enough for me,&quot; Erik said.</p><p>On the second evening he showed Sven a map — a proper one, better than any they&#39;d seen — and Sven showed him where the valley was, approximately, and Erik marked it with a small careful cross and looked at it for a moment.</p><p>&quot;I&#39;d like to see it,&quot; he said.</p><p>&quot;Come in autumn,&quot; Sven said. &quot;Before the snow.&quot;</p><p>Erik looked at the mark on the map. &quot;I&#39;ll do that,&quot; he said.</p><p>They came home on a Friday.</p><p>The house was exactly as they&#39;d left it, which was not surprising but was still, somehow, a relief — the door, the gate, the familiar smell of the yard, the neighbors&#39; windows with the light in them. Sven&#39;s letter, still folded in the supply box, could be unfolded now and handed to his mother in person, which was better.</p><p>Knud&#39;s dog was at the gate before they&#39;d finished coming through it, ancient and delighted, tail going without stopping, and Knud sat down in the yard and let him climb into his lap entirely, which the dog was too large for but attempted anyway.</p><p>Torben stood in the doorway of the house and looked at the kitchen and then at the kitchen in his memory — the cave version, the two fires, the pipe, the stone basin — and thought that there were things in one that the other could use, and things in the other that the one could use, and that this was an interesting thing to know.</p><p>Lise went straight to her room and unrolled her map on the bed and looked at it for a long time. Every line of it was a day she remembered. She rolled it back up and put it on the shelf.</p><p>Agda stood in the doorway between the kitchen and the yard and looked at the house, and then at the sky, and then at her family moving through the yard and the doorway and the rooms, and felt the particular happiness of being in exactly the right place, which was, she had come to understand, not always the same place and not always the expected one, but which you recognized when you were in it.</p><p>Sven came and stood beside her.</p><p>&quot;Good trip,&quot; he said.</p><p>&quot;Very good trip,&quot; she said.</p><p>Inside, from somewhere near the front of the house, Knud could be heard explaining everything — the cave, the storms, the marble run, the squash, the five dogs, the firewood parties, all of it — to his dog, who was listening with an attention that suggested he understood every word, or at least had decided that the person speaking was worth staying close to.</p><p>Outside, the summer evening settled over the yard, warm and ordinary and entirely good.</p><p>The burned forest was still there, north and waiting, the valley green between its pale trees, the cave door latched, the lamp burned out by now, the kitchen clean and ready, the games on the shelf, the carved figures in their arrangement on the ledge, everything in its place, patient as the trees themselves, waiting for whoever came back first.</p><p>It would be Knud, probably.</p><p>It would definitely be Knud.</p>` }

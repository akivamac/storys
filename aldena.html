      { heading: "The People in This Story", content: `<p style="text-align:center;font-style:italic;color:#8a6020;line-height:2.2">Joost van Dijk — father<br>Elisabeth — mother<br>Cas — their son, 14<br>Mieke — their daughter, 9<br>Pip — their son, 6<br>Riet — the baby<br>Tor — the dog</p>` },
      { heading: "Chapter One — Gone by Morning", content: `<p>They came before sunrise.</p><p>Joost heard Tor first — not barking, which would have meant a coyote or a wandering horse, but that low continuous sound the dog made when something was wrong with a person. Joost was sitting up in bed before he was fully awake, and then the door came off its hinges and the room was full of men and noise and Elisabeth was already on her feet with Riet in her arms, turning to face them, which was the bravest and most useless thing Joost had ever seen anyone do.</p><p>He counted seven. Armed, organized, not angry — which was somehow worse than angry. Angry men make mistakes. These men had done this before.</p><p>The one in front looked at Joost the way you look at a problem you've already solved. "Get up," he said. "All of you. Now."</p><p>"My children—"</p><p>"Will come with you." He said it pleasantly. "Or won't. Your choice."</p><p>Cas appeared in the doorway from the back room — he'd heard, he'd gotten up, he'd done the thing Joost had always hoped he would do and assessed instead of reacted. His eyes moved across the seven men and came to rest on his father's. One quick look. <em>I see them. I'm counting.</em></p><p>Pip appeared behind him, rubbing his eyes, wearing one boot.</p><p>"Where's the other one?" Elisabeth said, because she was Elisabeth.</p><p>"I couldn't find it," Pip said. This was not the moment anyone had expected to be discussing footwear.</p><p>They were outside in four minutes — the seven men moved them fast and without cruelty, which established immediately that this wasn't about cruelty. The farmhouse receded behind them in the grey pre-dawn, the door still off its hinges, one of Pip's boots still somewhere inside.</p><p>Tor came. Nobody had said he could. Nobody had said he couldn't. He simply fell in beside Mieke and stayed there, and none of the seven men seemed to feel it was worth a fight.</p><p>Joost walked beside Elisabeth. Riet, asleep against her shoulder with the total confidence of a baby who had not yet learned that the world was capable of this, shifted and settled and slept on.</p><p>"Where?" Joost said quietly to the man beside him.</p><p>"North," the man said.</p><p>"How far north?"</p><p>The man looked at the horizon, where the sky was just beginning to go grey. "Far enough," he said.</p><hr/><p>Joost looked back once. The farmhouse was already small. Whatever they'd left inside — the other boot, the good knife, three months of work — was already gone in the way that things become gone when you can't go back for them.</p><p>He faced north.</p><p>Mieke had found his hand in the dark without looking. He held it.</p><p>"Papa," she said quietly, not a question.</p><p>"I know," he said.</p><p>Behind them, Pip had found someone's stirrup to walk beside, apparently having decided that if he was going to be kidnapped he was going to do it at the most convenient height. Nobody stopped him. Tor walked at Mieke's other side, steady and quiet, ears up, watching everything.</p><p>The sun came up over the plains like it had no idea what it was interrupting.</p>` },
      { heading: "Chapter Two — North", content: `<p>They walked for two days.</p><p>On the first morning, just before the sun got high enough to be useful for direction, the men stopped the group and produced strips of dark cloth. Joost had time to say "don't" to Cas with his eyes before Cas said anything with his mouth, and Cas, to his considerable credit, didn't.</p><p>They tied the blindfolds themselves. Joost helped Elisabeth with Riet, making sure the knot sat to the side of her head so she could still manage the baby. Pip submitted to his with the suspicious calm of someone storing information for later. Mieke stood perfectly still, chin up, and Joost thought — not for the first time — that his daughter had a quality he couldn't name, something that wasn't bravery exactly but was harder than bravery.</p><p>They walked blind for a long time. Hours. The ground changed under Joost's feet — packed earth becoming scrubby grass becoming something softer, then a long stretch of stone, then grass again. He counted his paces until he lost count, then started again. He noted the angle of warmth on his face. He listened.</p><p>At some point Pip said "I stepped on something" and somebody on the other end of the rope said "keep moving" and Pip kept moving.</p><p>Tor made no sound. Joost could hear him, just — the soft fall of paws, always close to Mieke.</p><p>On the second day it got colder. The smell changed. When they finally stopped and the blindfolds came off, Joost blinked against the light and understood immediately where they were and what had been done to them.</p><p>Plains. Wide, gold-grey, winter-bare, running in every direction to the horizon — except behind them, where a line of mountains rose with the sudden confidence of things that had always been there. The nearest slope started not half a mile off, dark with pine and scrub oak, the kind of woods that had water in them. He could tell by the color.</p><p>Seven men on horseback. The leader reached into the saddlebag and dropped something on the ground between them: a roll of canvas, a cook pot and pan, woodworking tools, nails, two days of food.</p><p>He said nothing. He didn't need to. Then they rode south, and within ten minutes the plains had swallowed them.</p><p>Pip looked at the pile of supplies. Then at the mountains. Then at his family.</p><p>"Are we camping?" he said.</p><hr/><p>"We need the tent up before dark," Joost said, and that was the end of standing around.</p><p>The woods came up fast once they started walking toward them. Joost walked the near edge until he found what he wanted: three big pines growing close, their lower branches interlocking into something almost like a ceiling. Ground dry underneath.</p><p>"Cas," he said. "Before the tent. I want a snare out there. Something on the game trail."</p><p>He pointed to where the grass was pressed down in a narrow corridor running along the treeline. Cas crouched and looked at it. "Rabbit?" "Whatever comes." Cas picked up the rope without further discussion.</p><p>The tent went up between the three pines the way a tent goes up when everyone works without being asked. What came out was low and tight and practically invisible from twenty feet, smelling of canvas and cold air and the faint sweetness of the pines above.</p><p>Inside the tent, Pip had found two sticks and was explaining to Mieke the rules of a game he appeared to be inventing in real time. The rules were numerous and contradictory and Mieke was listening with perfect seriousness. Riet was asleep between them. Tor lay at the tent opening watching the plains.</p><p>Joost and Elisabeth sat at the back of the tent and watched their children play with sticks.</p><p>"All right," she said, quietly. "All right," he said.</p><p>The stars came out over the plains — more of them than made any sense. It was cold. They were a thousand miles from anywhere they'd meant to be. And for now, at least, they were safe.</p>` },
      { heading: "Chapter Three — The First Morning", content: `<p>Cas was up before anyone.</p><p>Joost heard him go — the soft shift of canvas, the careful step over Pip's outstretched legs — and lay still and listened to the plains breathing in the dark outside. Nothing wrong in the sound. He closed his eyes again.</p><p>When the smell of woodsmoke came through the tent opening, Elisabeth stirred. "Cas?" "Probably," Joost said.</p><p>It was Cas, and it was a rabbit, and it was already skinned. He'd strung a small fire between two stones at the edge of the treeline — positioned so the smoke went up through the pine branches and dispersed before it became visible. Joost looked at the fire, the rabbit, the stones. He looked at his son.</p><p>"Early start," he said. "The snare needed checking. And I was awake."</p><p>Joost crouched beside the fire and held his hands out to it. The plains were pale grey in the early light, frost on the grass, the mountains above them going pink at the peaks.</p><p>"We need a proper kitchen," Joost said. Cas nodded. He'd already been thinking it.</p><hr/><p>They built it after breakfast — two flat stones for a base, a careful arrangement of smaller ones around a central firebox. Elisabeth directed the height from where she sat nursing Riet, and the height was correct, and nobody suggested she come and look at it herself.</p><p>Pip was officially in charge of finding more stones. He took this responsibility extremely seriously and arrived every few minutes with increasingly ambitious specimens, explaining the particular merits of each.</p><p>Mieke found the stream. She came back and said only "water" and pointed, and they followed her fifty yards into the trees to where a narrow creek ran cold and clear over flat stones, quick and utterly reliable. Joost crouched and drank. Cold enough to ache. Clean.</p><p>"Same as last time," Pip said. Everyone looked at him. "Last time what?" "I don't know. It just felt like something Papa would say." Joost put his hand briefly on the back of Pip's neck. "Go find us another stone."</p><hr/><p>The bowls took the rest of the morning. Joost sat against the big pine and carved while Elisabeth managed the fire. Pip sat beside him watching, then began carving his own piece of bark into something he described as a boat, then a house, then a different kind of boat.</p><p>The first bowl was wide and deep, the inside smoothed until it held water without seeping. The second was smaller and shallower. When Joost set it in front of Tor and filled it, the dog drank the whole thing without stopping, then sat back and looked at Joost with the mild benevolence of an animal whose opinion of a person had just improved.</p><p>"He likes it," Mieke said. "He likes the water," Joost said. "He likes the bowl," Mieke said, in the tone that ended discussions.</p><p>By midday the kitchen was working. Elisabeth stood at the kitchen in the pale spring sunlight and stirred something that was mostly water but smelled, against all reason, like something good. "All right," Joost said. "I've been saying that," Elisabeth said.</p>` },
      { heading: "Chapter Four — Not Enough", content: `<p>The second rabbit came on the third morning, and the third morning was when they did the math.</p><p>Joost laid it beside the first — smaller than yesterday's, barely worth the snare — and looked at it. Six people. One dog. Two rabbits in two days. He didn't say it out loud. They all knew.</p><p>"Bigger snares," Cas said. "And more of them," Joost said. "Something's using those trails but we're only catching the small end of what's using them."</p><p>Cas went into the woods after breakfast and didn't come back until midday, and when he did he didn't say what he'd set or where, just washed his hands and sat down and ate. Joost didn't ask. The boy knew what he was doing.</p><hr/><p>It was Riet who found the clay. One moment she was sitting at the edge of the creek where Elisabeth could watch her, and the next she was sitting in a patch of grey-blue earth two feet upstream with both hands in it up to the wrists, deeply satisfied with herself and absolutely filthy.</p><p>Joost crouched beside the patch and pressed his thumb into it. Dense. Smooth. Almost no grit. He worked a piece between his fingers and watched it hold its shape.</p><p>"Pip. I need a bucket's worth of that. Without eating any." Pip looked offended. "I wasn't going to eat it." "Without tasting it," Joost said.</p><p>They lined the firebox that afternoon — packing the clay into every gap, smoothing it flat along the inner walls, building up the back into a proper curved surface. Elisabeth shaped the area around the pot hook with the focused efficiency of someone who had strong feelings about where things should go.</p><p>When the fire went in that evening the difference was immediate. "Good clay," Joost said. "Riet found it," Mieke said. Riet, still faintly grey around the ears despite two washings, accepted this credit with the serenity of someone who knew her own worth.</p><hr/><p>They extended the tent on the fourth day — pulling the canvas out and restringing it between two more pines, a second room that gave them space to stand up and move. Mieke claimed the new section immediately and spent an hour arranging pine needles into a floor. Pip helped. His contributions were enthusiastic and geometrically unconventional and Mieke incorporated them without comment.</p><hr/><p>They saw the buffalo on the fifth evening.</p><p>Not close — a quarter mile out, moving slowly north in a group of eight or nine, dark shapes in the gold light. Joost counted. Tor sat at Mieke's side watching with the careful stillness of an animal doing calculations.</p><p>The smallest one was four times the size of a man.</p><p>Joost looked at the tent. He looked at the plains. He looked at the tent again. The canvas would stop rain and wind and cold. It would not stop a buffalo that had decided, for any of the reasons buffalo decide things, to walk through it.</p><p>"We need walls," Elisabeth said. Not a question. Not a suggestion.</p><p>"Yes," Joost said.</p><p>Pip said "they're enormous" in a voice that was mostly delight and only slightly afraid, which was about the right proportion for Pip.</p><p>"Tomorrow," Joost said. "We start on something real."</p>` },
      { heading: "Chapter Five — Something Real", content: `<p>Joost found the cliff on the first morning of looking.</p><p>A face of pale granite rising thirty feet straight up out of the slope, flat at the base, overhung slightly at the top so that the ground beneath it was dry even after rain. He stood at the base and put his hand on it. Cold. Solid. The kind of solid that had been there ten thousand years and intended to continue.</p><p>He turned around. The treeline was forty feet ahead. The approach from below was open enough to see anyone coming. Not perfect. Good enough to build on.</p><p>"Here," he said. Cas looked at the cliff, the trees, the ground. He was already pacing out dimensions.</p><hr/><p>They built the back wall first, which was no wall at all — just the cliff face, mortared with clay along the base. The side walls went up log by log, Joost notching each corner while Cas dragged timber from the deadfall. Pip carried nails and kept count of every nail, announcing the running total at intervals.</p><p>"How many?" Joost said. "Forty-something," Pip said. "Or sixty. One of those." Mieke, passing with an armload of clay, said "fifty-three" without breaking stride.</p><p>The front wall went up last, with a doorframe Joost cut square and true, a door on leather hinges. When he pushed it closed the first time and the wind outside became nothing, Pip walked through the doorway four times in a row. "Pip." "I'm testing the hinge." "You're not." "The second time felt different." "Pip." Pip stopped. The hinge was excellent.</p><hr/><p>The kitchen was Elisabeth's from the start. The firebox was built up from flat stones, clay-lined inside and out, with a proper flue that ran up the cliff face and out above the overhang. It drew on the first try. Joost watched the smoke go straight up and out and disappear and said nothing because there was nothing to say that the smoke wasn't already saying.</p><p>She had a counter by the end of the second day — split log, surface smoothed with the chisel — and she stood at it that evening and worked in a way she hadn't been able to work since they'd left home.</p><hr/><p>The stream was Cas's idea. There was water higher up — they'd heard it from the first day. Cas went up alone and came back with mud on his boots and a look on his face that meant he'd figured something out.</p><p>"There's a natural channel in the rock that runs almost the whole way down. If we extend it with clay — pack it tight, keep the grade — it'll come to us."</p><p>It took four days. On the morning of the fifth day Joost pulled the last clay plug and stepped back. The water came down the rock in a clean line and ran out through a spout Cas had fitted into the kitchen wall — a small steady stream, cold and clear, running directly into the stone basin below it.</p><p>Pip watched this for a long moment. "It just comes." "Yes," Cas said. "By itself." "That's how water works." Pip continued watching it with the expression of someone who understood perfectly well how water worked and was choosing to find it remarkable anyway.</p><p>Elisabeth filled the pot without moving from the counter. She didn't say anything. She didn't need to.</p>` },
      { heading: "Chapter Six — Up", content: `<p>It was Mieke who asked first. She'd been looking at the mountain every morning since they'd arrived with the focused attention of someone reading a book they intended to finish. On the morning after the water came through the spout she said, "Can we go up?"</p><p>Joost looked at the slope. Then at the sky. Then at Elisabeth. "I'll stay with Riet," Elisabeth said, before he could ask. "Go."</p><hr/><p>They went up in a loose group — Joost first, then Cas, then Mieke, then Pip, then Tor. The slope was steep for the first hundred feet, then leveled into a long traverse through old-growth timber, the trees here enormous and widely spaced.</p><p>Pip found the berries first. A whole hillside of low bushes, last year's canes still holding clusters of dried fruit, and beneath them — Mieke pushed the dead leaves aside — the first green shoots of this year's growth. "In a month," Joost said. "Not much more," Mieke said. She was usually right about things like this.</p><p>Joost filled his pockets. Pip had already eaten a considerable number and was studying a bush with the critical eye of a man with professional opinions. "These are the best ones," Pip said. "They're all the same bush," Cas said. "They're not, though," Pip said, and moved to the next one.</p><hr/><p>The meadow appeared without warning — a flat open space the size of a large field, south-facing, protected on three sides by the slope and a long rocky ridge to the north. The grass already green, fed by snowmelt running in thin clear threads across the surface.</p><p>Joost stood at the edge and felt something shift in his thinking. Good grass. South-facing. Protected. Water already present.</p><p>"Papa," Cas said, quietly. "I see it," Joost said. He stopped that thought and filed it away for later and kept walking.</p><hr/><p>The cave was Pip's find, and for once he discovered it by accident. He'd sat down to retie his boot against the rocky ridge when he stood up and turned and there was a gap in the rock face behind him, exhaling a breath of cool air that smelled of stone and darkness.</p><p>"There's a hole," Pip said.</p><p>Inside it opened — maybe twenty feet across, the ceiling high enough to stand in the center. Dry. Flat stone floor covered in fine dust showing animal prints: deer, and something smaller. Old prints. Nobody home. At the back, a natural shelf of rock ran the full width of the cave at waist height.</p><p>"Deer," Pip announced. "Yes." "Big ones." "Yes." "They have good taste," Pip said, looking around with approval.</p><hr/><p>Near the top of the meadow, Mieke stopped at a cluster of dead stalks heavy with seeds. She broke one open and held it out to Joost without saying anything. He looked at it — then at the south-facing patch between the kitchen wall and the treeline, sheltered, the runoff from the channel keeping it damp.</p><p>"All of them," he said. They stripped every stalk they could reach, Pip collecting seeds in his cupped hands with extraordinary concentration. Mieke found three more varieties along the meadow's edge.</p><p>"We won't know what they are until they come up," Cas said. "We'll know when they come up," Mieke said.</p><p>On the way down Joost stopped at the south-facing patch. "Garden," he said to Cas. "How big?" Joost measured it with his eyes. "As big as we can make it."</p><hr/><p>They came down in the late afternoon with full pockets — dried berries, herbs, three good flat stones, a piece of quartz the size of Pip's fist that had no practical purpose and was coming anyway.</p><p>When they came through the door and Elisabeth looked at his face she said, "What did you find?" Joost set the berries on the counter. "Quite a lot," he said.</p>` },
      { heading: "Chapter Seven — The Second House", content: `<p>The garden came first. Joost and Cas turned the south-facing patch with the chisel and the saw handle until it was loose enough to plant in. Mieke made the border herself, half-buried stones pressed tight into the earth. She did it with the patience of someone who understood that the difference between a garden and a patch of dirt was mostly this kind of attention.</p><p>They planted by feel and memory and Mieke's nose. The pod plant went in last, in the corner, because nobody was sure about it and the corner was a good place for experiments. Pip planted three seeds in a spot he'd selected himself, on grounds he declined to share. When Joost asked what he expected, Pip said he didn't know but he had a feeling. This was accepted.</p><p>"Now we wait," Mieke said. "Now we wait," Joost said.</p><hr/><p>The cave door was Joost's next project. The entrance was low and wide, irregular at the edges. He spent a morning with the chisel squaring it enough to fit a frame. The frame went in tight — pine, green enough to swell with the season and grip the rock on its own over time. The door he hung on iron pins, heavy enough to stay closed against wind, light enough for Mieke to open alone.</p><p>When he swung it shut for the first time the meadow went silent. He stood in the dark with his hand on the door and felt the difference between a hole in a mountain and a room.</p><hr/><p>They furnished it over the following week, making two trips up the slope every day. Lamps first — hollowed stone cups, wicked with twisted bark, filled with rendered fat. Joost drove iron pins into the cave walls at head height and hung them at the four corners, and when they were lit the cave became something entirely different: warm-walled, shadow-filled, the ceiling moving with the light.</p><p>"Oh," Mieke said, when she saw it. Pip said nothing, which was rarer and meant more.</p><p>The shelf at the back became the pantry. Salt went there first. Joost had found it not looking for it — following a dry gully to where the rock changed color, pale and crumbly, and when he'd put his finger to it and tasted it, he'd stood very still. A seam of salt in the rock face, enough to scrape free in useful quantities. He'd come back and set it on the counter without a word and let Elisabeth find it.</p><p>She'd looked at it. Tasted it. Looked at him. "Where?" He showed her the next morning.</p><p>Beside the salt: dried meat, smoked over the kitchen fire, packed tight. The snares had been generous — and Cas had come back one afternoon with something larger from the upper woods that smoked well and kept.</p><p>The water tank was last and hardest — flat stones mortared with clay, inside the cave against the right wall, four feet across, three feet deep, the inside coated in so many layers of clay it had gone almost glassy. They filled it by hand over two days.</p><p>Joost crouched beside it and looked at the surface. His own face looked back. "How long will it last?" Cas asked. "The six of us? Four days. Five if we're careful. Long enough."</p><hr/><p>On the last evening of outfitting the cave Joost stood at the door. Lamps at the four corners. Salt and smoked meat on the shelf. Full water tank. Bedrolls stacked against the left wall. The door solid in its frame. Everything here that wasn't also at the house.</p><p>He pulled the cave door shut and tested the latch. Solid.</p><p>They walked down the slope in the long evening light, the house visible below through the trees, smoke coming from the kitchen flue in a thin straight line. From up here you could see the garden — just a dark rectangle of turned earth beside the wall, nothing showing yet, but there.</p><p>Joost watched it for a moment. It would show. Everything showed, eventually.</p>` },
      { heading: "Chapter Eight — The Smoke", content: `<p>It was Cas who saw it first, and only because he was looking at something else.</p><p>He'd been watching a hawk work the updrafts above the plains when his eye caught the thin vertical line rising at the edge of visibility. Not the hawk. Something beyond the hawk. Something on the ground.</p><p>He stood very still. "Papa."</p><p>Joost followed Cas's line of sight and found it — a column of smoke, pale grey, rising straight in the still morning air and then bending gently at the top where the high wind caught it. Thin. Controlled. Not a grass fire. Not an accident.</p><p>"How long has that been there?" Elisabeth said, from the doorway.</p><p>Nobody answered, because the answer was the strange part. Joost looked at it and felt the peculiar sensation of recognizing something he had never seen before — the steadiness of it, the color. Something about it said <em>permanent.</em> Said <em>always.</em></p><p>"I think," Mieke said slowly, "that it's always been there." Joost said nothing. She wasn't wrong.</p><hr/><p>They watched it for the rest of that day, taking turns so there was always someone looking. It didn't change. It rose at the same rate all morning, thinning as the day warmed, thickening again toward evening. The behavior of a fire being managed. Tended by someone who knew what they were doing.</p><p>At supper Joost said, "Indians," and nobody disagreed, because by then it felt obvious — the kind of obvious that had been true all along and simply unnoticed.</p><p>"How far?" Cas said. "Two miles. Maybe three. Far enough that they haven't seen our smoke." "Or they have," Elisabeth said, "and they're not concerned." The table was quiet. "Either way," Joost said. "Either way," she agreed.</p><hr/><p>The smoke kept up for three days, then four, then a week, and with each day it became more ordinary and more unsettling at the same time.</p><p>Tor had known before any of them. The careful watch of an animal that had catalogued something and filed it under <em>present but not threatening, monitor ongoing.</em></p><p>On the fifth day Mieke came to him and said, "If they come, we go up." Not a question. "Yes," Joost said. "All of us. Riet and everything." "Yes." She nodded. "I want to know the path in the dark. I want to walk it at night so I know it."</p><p>"Tonight," he said. "We all walk it tonight."</p><hr/><p>They went up after supper — all of them, no lamp, the moon giving just enough. Tor led. He went up the slope as if he'd done it a hundred times in the dark. At the meadow he turned north without hesitation and stopped at the cave door.</p><p>Joost opened it. They went in. He lit one lamp. The cave looked the same — the shelf, the salt, the water tank, the bedrolls. Ready.</p><p>Then Pip said, "Can we sleep here tonight?" "No," Joost said. "Just asking."</p><p>They filed back out. On the way down Mieke didn't need to watch her feet. She knew the path. That was the point.</p><p>The smoke was invisible in the dark, but Joost knew where to look, and when the clouds shifted and the moonlight came through clean he found the faint smudge of it against the stars — barely there, banked for the night, but there. Always there.</p>` },
      { heading: "Chapter Nine — The Surprise", content: `<p>It was Pip who brought it up, which meant it had been Mieke's idea. That was how it usually worked — Mieke would think of something, say nothing, and then Pip would announce it as if it had just occurred to him, and Mieke would let him, because she understood that certain requests landed better when they came from Pip.</p><p>"We want to walk along the mountain," Pip said at breakfast. "Just the three of us. Well, four with Tor."</p><p>Joost looked at Mieke. Mieke looked at her bowl.</p><p>"Back before dark," Joost said. "Tor stays close. All three of you together. No splitting up." "Yes, Papa." Joost picked up his cup. "Go." They were out the door before he'd finished the word.</p><hr/><p>They walked east along the mountain base for an hour. Tor moved ten feet ahead in a constant patient sweep. It was Mieke who stopped — at a section of cliff that had a darkness in it that went back further than it should. She stepped closer. Put her hand in. Air on the other side, cool and still. "Here," she said.</p><p>Inside it opened — twice the size of their own cave, walls coated in a pale mineral crust. Empty, completely and obviously, the emptiness of somewhere nothing had been for a very long time. No prints in the dust. No smell of animals.</p><p>Mieke was already moving toward the back. The floor changed — softer, darker. She crouched at the back corner and held the light down. A depression in the rock, bowl-shaped, four feet across. In the depression: liquid. Black, still, faintly gleaming.</p><p>Cas dipped his finger and rubbed it against his thumb. Smelled it. Set the flint carefully aside so the flame was nowhere near his hand. "Oil," he said.</p><p>Above the depression the rock overhung in a natural shelf that covered it completely — no rain, no debris. Whatever was in that hollow had been accumulating for a very long time, undisturbed, protected by the mountain itself.</p><p>Cas stood up and looked at Mieke. She was already looking at him with the expression she wore when she'd thought of something she hadn't said yet. "How much would we need?" she said. "Depends on the barrel." "And the barrel?" "I can make a barrel." Pip looked between them. "What are we making?" "A surprise," Cas said.</p><hr/><p>Eleven days. They came home each evening with oil-stained hands and said nothing except that it was going well. Cas built the barrel first — staved pine, clay-sealed. The gun took the rest of the time: a clay-lined chamber, a pump mechanism, a clay-sealed nozzle. He tested it with water, then with oil.</p><p>The result was not subtle. "Oh," Pip said. "Yes," Cas said. "That's—" "Yes."</p><hr/><p>They came home on the eleventh evening with the barrel on the sled and the gun wrapped in canvas. Cas unwrapped it and explained, briefly and without embellishment, what the oil was, where it was, and what the gun did.</p><p>Joost crouched and looked at the gun for a long time. "Show me," he said.</p><p>They went to the edge of the treeline. Cas pumped the chamber and opened the valve and the result was, if anything, more impressive in daylight. Joost put his hand on his son's shoulder.</p><p>"Fourteen years old," he said finally. "Almost fifteen," Cas said. Joost almost smiled. "Almost fifteen."</p><p>Elisabeth made everything she could think of that evening. They ate outside in the last of the light with the barrel sitting at the treeline and the gun leaning against the house wall. Pip explained everything to Riet using a stick. Riet put the stick in her mouth, which Pip accepted as appreciation.</p><p>Mieke sat beside her father and looked at the plains. The smoke was there, faint at the horizon, same as always. "It's better now," she said. Joost looked at the gun. Looked at the smoke. "Yes," he said. "It is."</p>` },
      { heading: "Chapter Ten — Home", content: `<p>Six months passed the way good months do — quickly, and with the feeling afterward that you hadn't looked enough.</p><p>The garden came up in May, tentative at first and then all at once. The pod plant turned out to be a variety of pea that Mieke declared the best thing they'd grown. Pip's three mystery seeds produced a plant nobody could identify that grew to four feet tall, flowered yellow, and then stopped doing anything interesting. Pip maintained it had potential.</p><p>The berries on the upper slope ripened in June. The cave shelf filled up. The salt seam gave steadily. Cas refined the oil gun over two quiet months — improving the pump, extending the range. The smoke on the plains never came closer. Twice they saw riders at the edge of visibility, moving parallel to the mountain, not toward it. They passed and didn't come back.</p><p>Mieke turned ten in July. She announced it at breakfast matter-of-factly, as if reporting the weather. Pip gave her a carved figure he'd been working on in secret for two weeks — the longest Pip had ever kept a secret. Mieke kept it on the shelf above her bedroll.</p><p>Riet learned to walk in August, quietly, without announcement, simply doing it one morning as if she'd always known how. Pip tried to teach her to run immediately. This was not yet successful.</p><p>The nights got longer. The plains went gold, then brown. The mountains turned and the aspens on the upper slopes went yellow and the cave felt, if anything, more like somewhere you'd chosen on purpose.</p><hr/><p>It was Joost who said it first, which surprised everyone including Joost. He said it on an October evening, sitting at the outside fire after supper. He said it quietly, as if testing the words.</p><p>"I want to go home."</p><p>Nobody spoke. "This is good," he said. "I wouldn't have chosen it, but it's good. And I want to go home."</p><p>Elisabeth looked at the fire. "My mother doesn't know if we're alive." "No." "The house is empty." "Probably."</p><p>Mieke said, "We could come back." Everyone looked at her. "It's here. It'll still be here. We could bring people. Show them the cave, the oil, the meadow. It doesn't stop being ours just because we leave."</p><p>Pip said, "I want to show Willem the oil gun." Cas said nothing for a while. Then: "If we're going south, we need a way to carry what we need. We can't walk it. Not with Riet." "So we build something," Joost said.</p><hr/><p>The wagon took three weeks. Cas drew the plans in charcoal — four wheels, a flat bed, the oil engine mounted at the rear. Joost cut the timber. Elisabeth and Mieke fitted the cover frame, stretching the remaining canvas over it. Pip was in charge of wheels, spending two full days selecting trunk sections before Cas redirected him toward the pre-cut rounds Joost had already prepared.</p><p>"These are better," Cas said. Pip examined them. "I was going to say that," he said.</p><p>They tested it in the meadow. It moved — slowly, unevenly — but it moved, under its own power. When Cas opened the valve a little more it moved faster. Pip made a sound not unlike the one he'd made when the oil gun first fired.</p><hr/><p>They packed the wagon in an hour. What they needed for the road: food, bedrolls, the good knife, the spare flint. The oil gun, because Cas wasn't leaving the oil gun. One small barrel of oil — enough for the engine and enough for the gun if it came to it. Everything else stayed. The salt. The tools. The preserves. The second barrel.</p><p>"We're leaving all of it?" Pip said. "We're leaving it <em>here</em>," Joost said. "There's a difference." Pip considered this. "When we come back with Willem—" "It'll all be here." Pip nodded. Willem was going to find this extremely impressive.</p><p>On the last morning Joost walked up to the cave alone. The shelf still full — salt, preserves, dried meat, the spare tools. The water tank still and cold. Everything ready for whoever came next, which would be them, with friends, before the year was out.</p><p>He left the lamp burning. He pulled the door shut. He tested the latch. Solid.</p><p>They left at first light, the wagon moving south across the frost-stiff grass, the mountain behind them going pink at the peaks. Mieke sat at the back and watched it get smaller. Riet sat beside her. "It'll still be there," Pip said. "I know," Mieke said.</p><p>Tor jumped in uninvited and settled between the children. Joost drove. He opened the fuel valve. The engine turned. The wheels found their rhythm. They went home.</p>` },
      { heading: "Chapter Eleven — Dust", content: `<p>They came into town on a Wednesday, which was market day, and half the town was in the square when the oil-engine wagon came rattling down the main road making a noise nobody had heard before. People stopped. Stared. Someone dropped a basket.</p><p>Joost brought the wagon to a stop in front of the house and cut the fuel valve and the engine ticked down into silence. Then Pip stood up in the wagon bed and shouted "WILLEM!" at a volume that resolved the question of whether anyone in town had missed them.</p><p>Willem appeared from behind a market stall at a dead run. Two seconds later Pip was on the ground and they were doing the thing boys do when they haven't seen each other in a year, which involves a great deal of noise and no useful communication whatsoever.</p><p>Joost lifted Riet down from the wagon. She looked at the town with profound suspicion. She'd been eight months old when they left. This was, from her perspective, entirely new. "Home," Joost told her. Riet looked at a pigeon. The pigeon looked back. Neither was convinced.</p><hr/><p>The house had the smell of somewhere that had been closed too long. Elisabeth opened every window. Joost found the brooms. Mieke took one without being asked and started in the back rooms, and for the next two hours the house filled with the sound of sweeping and the slow return of air.</p><p>The neighbors — the Brandts, who'd taken the animals — appeared before they'd been back an hour. Mevrouw Brandt took one look at Elisabeth and pulled her in by both hands and that was a conversation that lasted until supper. Mijnheer Brandt shook Joost's hand for a long time without saying much, and then went and got the animals.</p><p>The goats came back unimpressed. The chickens came back in a crate, regarding everyone with the blank hostility chickens reserve for all situations. The old horse walked back into his stall and stood there as if he'd never left.</p><p>Willem had approximately nine hundred questions about the wagon and the gun, which Cas answered with the patience of someone who had been expecting this. "Is it really made of oil?" "Runs on it. And throws it." "Throws it <em>on fire?</em>" "On fire." Willem looked at Pip. "We're going back." "Next month," Pip said. "I already told you."</p><hr/><p>The planning happened fast. Six families in the end — enough adults to be useful and enough young people to make it interesting. Joost drew a map from memory on the back of a flour sack. Cas built a second barrel. Mieke made a list of what the cave still had and what they'd need to bring. Elisabeth organized food for fourteen people over three weeks. Pip told Willem everything. This took four days.</p>` },
      { heading: "Chapter Twelve — Back", content: `<p>They left on a Saturday, two wagons and six horses and fourteen people and Tor, who rode in the supply wagon with the authority of an animal who had done this before and knew how it went.</p><p>The plains were different in November — wider somehow, the grass short and silver, the sky enormous. The children from the other families had never seen anything like it. Willem stood in the wagon bed for the first three hours watching the horizon with an expression Pip recognized: the one you wear when the world turns out to be larger than you'd been told.</p><p>"How far?" Willem said. "You'll see it before we get there. The mountain. It just appears." It appeared on the afternoon of the second day — suddenly, completely, with the confidence of something that had been there all along. Several people said things. Pip said nothing, just watched Willem's face. That was enough.</p><hr/><p>The cave was exactly as they'd left it. Joost pushed the door open and the lamp was still burning — low, almost out, but burning — and everyone who saw it went quiet for a moment.</p><p>"You left a lamp burning," Elisabeth said. "I didn't want it to be dark when we came back," Joost said. She went in and refilled it and it burned up bright and steady and lit the cave the way it always had.</p><hr/><p>They spent the first three days showing the others everything — the spring, the salt seam, the oil cave, the meadow. Cas demonstrated the gun in the open field and the reaction was everything Pip had promised Willem it would be.</p><p>The house was too small for fourteen people. The cave fit six comfortably. The arrangement became obvious: the family slept in the house, the friends slept in the cave. The friends did not consider this a hardship. By the second night they were calling it the best room they'd ever slept in. Pip told Willem this privately, and with considerable satisfaction.</p><p>The week went the way good weeks do. The children ranged the mountain in groups. Elisabeth and two of the other women did something ambitious with the last of the preserves that produced results nobody could fully explain but everyone ate immediately. Mieke showed anyone who wanted to see the meadow in the early morning, when the frost was still on the grass, and several people said they wanted to come back in the spring. "You can," Mieke said. "It'll be here."</p><p>On the last evening they made a fire outside, all fourteen of them, the plains dark and the stars doing what they always did out here — more of them than seemed strictly necessary. Someone had brought a fiddle.</p><p>Joost sat beside Elisabeth and watched the fire and the people around it and the mountain above them, dark against the stars. "Next summer," she said. "Next summer," he said.</p><p>Tor was asleep against Mieke's side. Riet was asleep in Elisabeth's lap. Pip and Willem were explaining something to each other with sticks. Cas sat at the edge of the firelight and looked at the plains the way he'd been looking at them for six months — not worried, just watching.</p><p>The smoke was gone from the horizon. Had been since they'd arrived. Joost had noticed on the first day and said nothing. He noticed it again now. Said nothing again.</p><p>Some things you just carry quietly, because they're yours and the night is good and there's a fiddle playing and everyone you love is warm. That was enough. That was everything.</p>` },
      { heading: "Chapter Thirteen — The Good Side", content: `<p>They found the men on the way home.</p><p>Not looking for them — just found them, the way you find things on open plains when the grass is short and the sky is clear and there's nowhere to be invisible. Four of them, camped at a dry creek bed two hours south of the mountain. One man standing when the wagons came over the rise.</p><p>Joost stopped the engine. The plains went quiet.</p><p>The man looked at the wagon. At the engine. At Cas, who had the oil gun across his knees in the way that didn't look like a threat and was.</p><p>Then the man looked at Joost, and Joost looked at the man, and it was the same man — the one who'd stood in their doorway before sunrise and said <em>get up</em> in the pleasant voice of someone who'd done this before.</p><p>Neither of them spoke for a moment.</p><p>Then Joost said, "We're going home." The man looked at the wagon. At the fourteen people in it. At the gun. "So are we," he said.</p><p>Joost held his eye for another moment. Then he opened the fuel valve and the engine turned and the wagon moved south and they didn't look back. Cas kept the gun across his knees for another hour. Then he set it down. Nobody said anything about it. There was nothing to say that the road south wasn't already saying.</p><hr/><p>They were home by Thursday.</p><p>Joost put the wagon in the barn beside the old horse, who regarded it without particular interest. He hung the oil gun on the wall above the workbench — not hidden, not displayed, just there, the way useful things are. He stood in the barn for a moment in the quiet.</p><p>Then he went inside, where Elisabeth was already at the stove and something good was already happening, and Mieke was at the table with her carved figure from the cave shelf, and Pip was in the yard explaining the entire trip to the goats, who were listening with the focused attention of animals who understood that food was sometimes involved in these conversations.</p><p>Riet was sitting in the middle of the kitchen floor, watching the door. Joost crouched down to her. "What are you looking at?" Riet looked at the door. Then at him. Then at the door again. "I know," he said. "Me too."</p><p>He picked her up and stood at the window and looked out at the street, the ordinary Wednesday street, the neighbor's cat, the familiar stones.</p><p>And beyond them, somewhere north, past the edge of what you could see from here — the mountain, the meadow, the cave with the lamp in it, the salt seam in the rock, the oil in the dark, the door solid in its frame.</p><p>It would all still be there in the spring. It was enough. It was everything. It was theirs.</p><p style="text-align:center;font-style:italic;margin-top:2rem;color:#8a6020;font-size:1.1rem;">— The End —</p>` },

  document.getElementById('readerNav').style.display = 'flex';
  render();
}

function render() {
  const story = stories[currentStory];
  const page = story.pages[currentPage];
  document.getElementById('content').innerHTML =
    `<div class="chapter-heading">${page.heading}</div>${page.content}`;
  document.getElementById('pageInfo').textContent =
    `${currentPage + 1} / ${story.pages.length}`;
  document.getElementById('prev').disabled = currentPage === 0;
  document.getElementById('next').disabled = currentPage === story.pages.length - 1;
  window.scrollTo(0, 0);
}

function toggleSpeak() {
  const btn = document.getElementById('speakBtn');
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btn.textContent = '▶ Speak';
    return;
  }
  const text = document.getElementById('content').innerText;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  utt.onend = () => { btn.textContent = '▶ Speak'; };
  btn.textContent = '■ Stop';
  speechSynthesis.speak(utt);
}

function changePage(dir) {
  speechSynthesis.cancel();
  document.getElementById('speakBtn').textContent = '▶ Speak';
  const s = stories[currentStory];
  currentPage = Math.max(0, Math.min(s.pages.length - 1, currentPage + dir));
  render();
}

// Build home cards
const grid = document.getElementById('cardGrid');
stories.forEach((s, i) => {
  grid.innerHTML += `<div class="card-home" onclick="openStory(${i})">
    ${s.cover ? s.cover : ''}
    <h2>${s.title}</h2>
    <p>${s.blurb}</p>
    <span class="card-badge">${s.pages.length} pages</span>
  </div>`;
});
</script>
</body>
</html>
